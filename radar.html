<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>FINDER | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="images/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --white: #FDFDFD;
            --font-title: 'Archivo Black', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        html, body {
            margin: 0; padding: 0;
            background-color: var(--dark);
            color: var(--white);
            font-family: var(--font-body);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(4, 4, 4, 0.6), rgba(4, 4, 4, 0.9)), url('images/image_c3c605.jpg');
            background-size: cover; background-position: center; z-index: 0;
        }

        header { position: relative; padding: 60px 0 40px 0; text-align: center; z-index: 100; }
        .logo-trigger { 
            height: 85px; cursor: pointer; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .logo-trigger:hover { transform: scale(1.1); filter: drop-shadow(0 0 15px var(--neon)); }

        .nv-menu {
            height: 100%; width: 0; position: fixed; z-index: 9999;
            top: 0; left: 0; background-color: rgba(4, 4, 4, 0.98); 
            overflow: hidden; transition: 0.5s; 
            display: flex; align-items: center; justify-content: center;
        }
        .nv-links a { 
            font-family: var(--font-title); font-size: 2.5rem; color: var(--white); 
            text-decoration: none; display: block; margin: 20px; text-transform: uppercase; 
        }
        .nv-links a:hover { color: var(--neon); transform: scale(1.05); }
        .nv-close { position: absolute; top: 30px; right: 45px; font-size: 50px; color: var(--neon); text-decoration: none; }

        .main-wrapper { position: relative; z-index: 10; padding: 40px 20px 80px 20px; text-align: center; }
        
        .nv-title { font-family: var(--font-title); font-size: clamp(2.5rem, 8vw, 4.5rem); text-transform: uppercase; letter-spacing: -2px; margin: 0; line-height: 1; }
        .nv-subtitle { color: var(--neon); font-weight: 700; text-transform: uppercase; letter-spacing: 12px; margin-bottom: 60px; font-size: 0.75rem; }

        .radar-panel {
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 35px;
            padding: 30px;
            backdrop-filter: blur(10px);
            margin-bottom: 40px;
        }
        
        #radarMap { 
            height: 380px; 
            border-radius: 24px; 
            background: #0d0d0d; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .leaflet-popup-content-wrapper { background: #0c0c0c !important; color: white !important; border: 1px solid var(--neon); border-radius: 12px; font-family: var(--font-body); }
        .leaflet-popup-tip { background: #0c0c0c !important; border-left: 1px solid var(--neon); border-bottom: 1px solid var(--neon); }

        .filter-bar {
            display: flex; justify-content: space-between; align-items: center; 
            flex-wrap: wrap; gap: 20px; margin-top: 25px; text-align: left;
        }
        .filter-group label {
            font-size: 0.65rem; color: var(--white); opacity: 0.4;
            letter-spacing: 2px; font-weight: 800; margin-bottom: 8px; display: block; text-transform: uppercase;
        }
        
        .filter-select, .form-control-custom { 
            background: rgba(4, 4, 4, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); color: white !important; 
            padding: 14px 24px; border-radius: 15px; outline: none; transition: 0.3s; font-size: 0.85rem;
        }
        .filter-select:focus, .form-control-custom:focus { border-color: var(--neon); background: rgba(4, 4, 4, 0.9); }

        .match-card {
            background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 35px;
            padding: 40px 25px;
            height: 100%;
            transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column; justify-content: space-between;
            position: relative; text-align: left;
        }
        .match-card:hover {
            background: rgba(63, 240, 0, 0.03);
            border-color: var(--neon);
            transform: translateY(-8px);
        }

        .match-badge { 
            position: absolute; top: 30px; right: 25px; 
            background: rgba(63, 240, 0, 0.1); color: var(--neon); 
            padding: 4px 14px; border-radius: 30px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; 
        }
        
        .match-club { 
            font-family: var(--font-body); font-size: 0.95rem; 
            text-transform: uppercase; letter-spacing: 2px; font-weight: 800;
            margin-bottom: 20px; color: var(--white); padding-right: 55px;
        }
        
        .match-info { font-size: 0.9rem; opacity: 0.5; margin-bottom: 10px; display: flex; align-items: center; gap: 10px; font-weight: 300; }
        
        .players-needed { font-size: 0.9rem; font-weight: 700; color: var(--white); margin: 20px 0; display: flex; align-items: center; gap: 10px; }
        .players-count { background: var(--white); color: var(--dark); width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.75rem; font-weight: 800; }

        .btn-action-nevera {
            font-family: var(--font-title); background: var(--neon); color: var(--dark);
            padding: 16px 35px; border-radius: 50px; text-decoration: none;
            display: inline-block; font-size: 0.8rem; transition: 0.3s; text-transform: uppercase; border: none;
        }
        .btn-action-nevera:hover { 
            transform: scale(1.03); 
            box-shadow: 0 0 25px rgba(63, 240, 0, 0.3);
            color: var(--dark); cursor: pointer;
        }

        .card-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 15px; }

        .btn-join-match {
            border: 1px solid rgba(255,255,255,0.2); color: var(--white);
            font-family: var(--font-title); font-size: 0.75rem; text-transform: uppercase;
            padding: 14px; border-radius: 50px; width: 100%; text-align: center; text-decoration: none; display: block; transition: 0.3s;
        }
        .btn-join-match:hover { background: rgba(255,255,255,0.1); border-color: white; color: white; }

        .btn-link-app {
            background: rgba(63, 240, 0, 0.1); border: 1px solid rgba(63, 240, 0, 0.3); color: var(--neon);
            font-family: var(--font-title); font-size: 0.75rem; text-transform: uppercase;
            padding: 14px; border-radius: 50px; width: 100%; text-align: center; text-decoration: none; display: block; transition: 0.3s;
        }
        .btn-link-app:hover { background: var(--neon); border-color: var(--neon); color: var(--dark); }

        .autocomplete-wrapper { position: relative; }
        .autocomplete-results {
            position: absolute; top: calc(100% - 15px); left: 0; width: 100%;
            background: #0d0d0d; border: 1px solid rgba(255,255,255,0.15);
            border-bottom-left-radius: 15px; border-bottom-right-radius: 15px;
            z-index: 9999; max-height: 180px; overflow-y: auto; display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        .autocomplete-item { padding: 12px 15px; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.7); text-align: left; }
        .autocomplete-item:hover { background: var(--neon); color: var(--dark); font-weight: 600; }

        .cta-section { margin: 80px 0 20px 0; }
        .btn-logout-radar { font-size: 0.75rem; text-transform: uppercase; opacity: 0.3; color: white; text-decoration: none; transition: 0.3s; font-weight: 600; letter-spacing: 1px; }
        .btn-logout-radar:hover { opacity: 1; color: #FF4444; }

        .modal-content { background: #0c0c0c; border: 1px solid rgba(255,255,255,0.08); border-radius: 35px; color: white; padding: 25px; }
        .modal-title { font-family: var(--font-title); text-transform: uppercase; font-size: 1.2rem; }
        .modal-body label { font-size: 0.65rem; font-weight: 800; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; display: block; text-align: left; }

        .nv-footer { 
            position: relative; z-index: 10; padding: 100px 20px 60px; 
            background-color: var(--dark); 
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .footer-container {
            max-width: 1050px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: flex-start;
            flex-wrap: wrap; gap: 50px; text-align: left;
        }
        .footer-brand { flex: 1; min-width: 200px; }
        .footer-logo-mini { height: 75px; opacity: 0.5; margin-bottom: 15px; }
        .footer-nav { display: flex; gap: 60px; }
        .f-col { display: flex; flex-direction: column; gap: 10px; }
        .f-label { font-size: 0.6rem; color: var(--neon); letter-spacing: 2px; font-weight: 800; margin-bottom: 10px; }
        .f-link { font-size: 0.85rem; color: white !important; opacity: 0.3; transition: 0.3s; }
        .f-link:hover { opacity: 1; color: var(--neon) !important; }
        .copyright { margin-top: 80px; opacity: 0.15; font-size: 0.55rem; letter-spacing: 5px; text-align: center; width: 100%; }

        @media (max-width: 768px) {
            .footer-container { flex-direction: column; text-align: center; }
            .footer-nav { width: 100%; justify-content: space-around; }
            .footer-brand { width: 100%; margin-bottom: 20px; }
            .filter-bar { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

    <div id="bg"></div>

    <header>
        <img src="images/logo.png" class="logo-trigger" onclick="openM()">
    </header>

    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" class="nv-close" onclick="closeM()">&times;</a>
        <div class="nv-links">
            <a href="index.html" onclick="closeM()">HOME</a>

    <main class="main-wrapper container">
        <h1 class="nv-title">FINDER</h1>
        <p class="nv-subtitle">ready set play</p>

        <div class="radar-panel">
            <div id="radarMap"></div>
            
            <div class="filter-bar">
                <div class="filter-group">
                    <label>MATCH RADAR</label>
                    <select id="geoFilter" class="filter-select" onchange="loadMatches()">
                        <option value="ALL">Tutte le province</option>

                </button>

    <div class="modal fade" id="newMatchModal" tabindex="-1" aria-hidden="true">

            <div class="modal-content">

                        </div>

                        <input type="hidden" id="matchProvince">
                        <input type="hidden" id="matchLat">
                        <input type="hidden" id="matchLng">
                        
                        <div id="locationFeedback" class="small mb-3 text-uppercase fw-bold text-center" style="color: var(--neon); display:none; font-size:0.7rem; letter-spacing: 1px;"></div>

                        <label>Data e Ora</label>
                        <input type="datetime-local" id="matchDate" class="form-control-custom w-100 mb-3" required>
                        
                        <label>Giocatori Mancanti</label>

        </div>
    </div>

    <footer class="nv-footer">
        <div class="footer-container">
            <div class="footer-brand">
                <img src="images/logo.png" class="footer-logo-mini">
                <p style="font-size:0.6rem; opacity:0.2; letter-spacing:3px; font-weight:700;">PRECISION IN PERFORMANCE.</p>
            </div>
            
            <div class="footer-nav">
                <div class="f-col">
                    <span class="f-label">NAVIGAZIONE</span>
                    <a href="index.html" class="f-link">HOME</a>

                <div class="f-col">
                    <span class="f-label">SOCIAL</span>
                    <a href="https://www.instagram.com/neverasports.it/" class="f-link">INSTAGRAM</a>
                    <a href="https://chat.whatsapp.com/GItl3C5mrgxJxXAPhHHRFh" class="f-link">WHATSAPP</a>
                </div>
            </div>
        </div>
        <p class="copyright">© 2026 NEVERA SPORTS | BORN UNDER PRESSURE</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const SUPABASE_URL = "https://ennpbtrthwdxsvdbqbmn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVubnBidHJ0aHdkeHN2ZGJxYm1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNjU0NzUsImV4cCI6MjA5NDY0MTQ3NX0.JL-w7qkp6bktVJMrJ7O0Uw1phxaBpBc9BiP3cH8Q4-0";
        const dbClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

        let currentUser = null;
        let map = null;
        let markerLayer = null;
        let searchTimeout = null;

        const PROVINCE_COORDS = {
            "MI": [45.4642, 9.1900], "BG": [45.6983, 9.6773], "BS": [45.5416, 10.2118],
            "CO": [45.8081, 9.0852], "LC": [45.8566, 9.3973], "MB": [45.5845, 9.2735], "VA": [45.8175, 8.8262]
        };

        function openM() { document.getElementById("m").style.width = "100%"; }
        function closeM() { document.getElementById("m").style.width = "0"; }

        function initMap() {
            map = L.map('radarMap', { zoomControl: false }).setView([45.65, 9.5], 8);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO'
            }).addTo(map);
            markerLayer = L.layerGroup().addTo(map);
        }

        window.onload = async function() {
            if (!dbClient) return;
            initMap();

            const { data: { session } } = await dbClient.auth.getSession();
            if (!session) {
                window.location.href = "login.html";
            } else {
                currentUser = session.user;
                const userProvince = currentUser.user_metadata?.province;
                if (userProvince) {
                    document.getElementById("geoFilter").value = userProvince;
                    if(PROVINCE_COORDS[userProvince]) map.setView(PROVINCE_COORDS[userProvince], 9);
                }
                loadMatches();
            }
        }

        async function handleLogout() {
            if (confirm("Vuoi scollegarti dal radar?")) {
                await dbClient.auth.signOut();
                window.location.href = "login.html";
            }
        }

        function searchClub(query) {
            clearTimeout(searchTimeout);
            const resultsBox = document.getElementById("autocompleteResults");
            const feedback = document.getElementById("locationFeedback");
            
            if (query.length < 3) {
                resultsBox.style.display = "none";
                return;
            }

            const userProv = currentUser?.user_metadata?.province || "MI";
            document.getElementById("matchProvince").value = userProv;

            searchTimeout = setTimeout(async () => {
                const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + " Lombardia")}&countrycodes=it&addressdetails=1&limit=5`;
                
                try {
                    const response = await fetch(url, { 
                        headers: { 
                            'Accept-Language': 'it',
                            'User-Agent': 'NeveraSportsApp/1.0 (info@neverasports.com)'
                        } 
                    });
                    const data = await response.json();
                    
                    if (!data || data.length === 0) {
                        resultsBox.innerHTML = `<div class="autocomplete-item" style="opacity:0.6;">Centro non registrato? Conferma inserimento manuale</div>`;
                        resultsBox.style.display = "block";
                        resultsBox.firstChild.onclick = () => {
                            resultsBox.style.display = "none";
                            feedback.innerText = `📍 Inserimento libero attivo (${userProv})`;
                            feedback.style.display = "block";
                        };
                        return;
                    }

                    resultsBox.innerHTML = "";
                    data.forEach(item => {
                        const div = document.createElement("div");
                        div.className = "autocomplete-item";
                        const parts = item.display_name.split(',');
                        const displayName = parts[0] + (parts[1] ? `, ${parts[1].trim()}` : '') + (parts[2] ? ` (${parts[2].trim()})` : '');
                        
                        div.innerText = displayName;
                        div.onclick = () => selectClub(item);
                        resultsBox.appendChild(div);
                    });
                    resultsBox.style.display = "block";
                } catch (e) {
                    console.error(e);
                    feedback.innerText = `📍 Inserimento manuale attivo (${userProv})`;
                    feedback.style.display = "block";
                }
            }, 500);
        }

        function selectClub(item) {
            document.getElementById("matchClub").value = item.display_name.split(',')[0] + " (" + item.display_name.split(',')[1].trim() + ")";
            document.getElementById("matchLat").value = item.lat;
            document.getElementById("matchLng").value = item.lon;
            document.getElementById("autocompleteResults").style.display = "none";

            let provinceSigla = "MI"; 
            if (item.address && item.address.province) {
                const provNome = item.address.province.toLowerCase();
                if (provNome.includes("bergamo")) provinceSigla = "BG";
                else if (provNome.includes("brescia")) provinceSigla = "BS";
                else if (provNome.includes("como")) provinceSigla = "CO";
                else if (provNome.includes("lecco")) provinceSigla = "LC";
                else if (provNome.includes("monza")) provinceSigla = "MB";
                else if (provNome.includes("milano")) provinceSigla = "MI";
                else if (provNome.includes("varese")) provinceSigla = "VA";
            }
            document.getElementById("matchProvince").value = provinceSigla;

            const feedback = document.getElementById("locationFeedback");
            feedback.innerText = `📍 Agganciato: ${provinceSigla} (GPS Online)`;
            feedback.style.display = "block";
        }

        async function loadMatches() {
            const grid = document.getElementById("matchesGrid");
            const selectedProvince = document.getElementById("geoFilter").value;
            
            grid.innerHTML = `<div class="text-center opacity-50 py-5 w-100"><i class="fa-solid fa-circle-notch fa-spin fa-2x mb-3" style="color:var(--neon)"></i><br><span style="font-size:0.75rem; letter-spacing:2px; font-weight:800; text-transform:uppercase;">Finding your next match...</span></div>`;
            markerLayer.clearLayers();

            // Sincronizzato su 'matches' minuscolo
            let query = dbClient.from('matches').select('*').order('date_time', { ascending: true });

            if (selectedProvince !== "ALL") {
                query = query.eq('province', selectedProvince);
                if (PROVINCE_COORDS[selectedProvince]) map.flyTo(PROVINCE_COORDS[selectedProvince], 10);
            } else {
                map.flyTo([45.65, 9.5], 8);
            }

            const { data: matches, error } = await query;
            if (error || !matches || matches.length === 0) {
                grid.innerHTML = `<div class="text-center opacity-30 py-5 w-100"><i class="fa-solid fa-satellite-dish fa-3x mb-3"></i><br><span style="font-size:0.75rem; letter-spacing:2px; font-weight:800; text-transform:uppercase;">Nessun match in questa zona</span></div>`;
                return;
            }

            grid.innerHTML = "";
            matches.forEach(match => {
                const dateObj = new Date(match.date_time);
                const dataFormattata = dateObj.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' });
                const oraFormattata = dateObj.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });

                const waMessage = encodeURIComponent(`Ciao, ti contatto tramite Nevera Sports per la partita del ${dataFormattata} al club ${match.club}. Avete ancora bisogno?`);
                const waUrl = `https://wa.me/${match.creator_phone || ''}?text=${waMessage}`;

                let lat = match.latitude;
                let lng = match.longitude;

                if (!lat || !lng) {
                    if(PROVINCE_COORDS[match.province]) {
                        lat = PROVINCE_COORDS[match.province][0];
                        lng = PROVINCE_COORDS[match.province][1];
                    }
                }

                if (lat && lng) {
                    const marker = L.circleMarker([lat, lng], {
                        radius: 8, fillColor: "#3FF000", color: "#040404", weight: 2, opacity: 1, fillOpacity: 0.9
                    });

                    marker.bindPopup(`
                        <strong style="color:var(--neon); text-transform:uppercase;">${match.club}</strong><br>
                        <span style="font-size:0.8rem;">📅 ${dataFormattata} alle ${oraFormattata}</span><br>
                        <span style="font-size:0.8rem; font-weight:bold;">👥 Mancano ${match.players_needed} giocatori</span><br>
                        <a href="${waUrl}" target="_blank" style="color:var(--neon); text-decoration:none; display:inline-block; margin-top:5px; font-weight:bold;">Candidati →</a>
                    `);
                    markerLayer.addLayer(marker);
                }

                let linkButtonHtml = "";
                if(match.match_link && match.match_link.trim() !== "") {
                    linkButtonHtml = `<a href="${match.match_link}" target="_blank" class="btn-link-app"><i class="fa-solid fa-bolt me-2"></i>Apri in App</a>`;
                }

                const col = document.createElement("div");
                col.className = "col-md-4";
                col.innerHTML = `
                    <div class="match-card">
                        <div>
                            <div class="match-badge">${match.province}</div>
                            <div class="match-club">${match.club}</div>
                            <div class="match-info"><i class="fa-regular fa-calendar-days"></i> ${dataFormattata}</div>
                            <div class="match-info"><i class="fa-regular fa-clock"></i> Ore ${oraFormattata}</div>
                            <div class="players-needed">
                                <div class="players-count">${match.players_needed}</div> <span>Slot scoperti</span>
                            </div>
                        </div>
                        <div class="card-actions">
                            ${linkButtonHtml}
                            <a href="${waUrl}" target="_blank" class="btn-join-match"><i class="fa-brands fa-whatsapp me-2"></i>Contatta su Whatsapp</a>
                        </div>
                    </div>
                `;
                grid.appendChild(col);
            });
        }

        async function createMatch(event) {
            event.preventDefault();
            
            const club = document.getElementById("matchClub").value;
            const province = document.getElementById("matchProvince").value || "MI"; 
            const lat = document.getElementById("matchLat").value ? parseFloat(document.getElementById("matchLat").value) : null;
            const lng = document.getElementById("matchLng").value ? parseFloat(document.getElementById("matchLng").value) : null;
            
            const dateTime = document.getElementById("matchDate").value;
            const playersNeeded = parseInt(document.getElementById("matchPlayers").value);
            const mLink = document.getElementById("matchLink").value || null;
            const creatorPhone = currentUser?.user_metadata?.phone || '';

            // Sincronizzato su 'matches' minuscolo
            const { error } = await dbClient.from('matches').insert([{
                club: club,
                province: province,
                latitude: lat,
                longitude: lng,
                date_time: dateTime,
                players_needed: playersNeeded,
                match_link: mLink,
                creator_phone: creatorPhone,
                user_id: currentUser?.id
            }]);

            if (error) {
                alert("Errore inserimento: " + error.message);
            } else {
                document.getElementById("newMatchForm").reset();
                document.getElementById("locationFeedback").style.display = "none";
                const modalEl = document.getElementById('newMatchModal');
                bootstrap.Modal.getInstance(modalEl).hide();
                loadMatches();
            }
        }

        document.addEventListener("click", function (e) {
            if (e.target.id !== "matchClub") {
                document.getElementById("autocompleteResults").style.display = "none";
            }
        });
    </script>
</body>
</html>
