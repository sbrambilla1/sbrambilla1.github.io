<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>FINDER | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="images/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --white: #FDFDFD;
            --font-title: 'Archivo Black', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        html, body {
            margin: 0; padding: 0; min-height: 100%;
            background-color: var(--dark); color: var(--white);
            font-family: var(--font-body); -webkit-font-smoothing: antialiased;
        }

        #bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(4, 4, 4, 0.85), rgba(4, 4, 4, 0.95)), url('images/image_c3c605.jpg');
            background-size: cover; background-position: center; z-index: 0;
        }

        /* Layout fluido e ampio identico a index / tracker */
        .container-custom { position: relative; z-index: 10; max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

        .radar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo-radar { height: 50px; }
        .btn-logout { background: none; border: none; color: #FF4444; font-size: 1.3rem; cursor: pointer; transition: 0.3s; }
        .btn-logout:hover { transform: scale(1.1); filter: drop-shadow(0 0 10px #FF4444); }

        .radar-title { font-family: var(--font-title); font-size: 2.5rem; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 5px; }
        .radar-subtitle { font-size: 0.9rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 40px; }

        /* Mappa panoramica e lussuosa */
        .map-container {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px; padding: 15px; margin-bottom: 40px; backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        #radarMap { height: 380px; border-radius: 20px; background: #0d0d0d; border: 1px solid rgba(255, 255, 255, 0.05); }

        .leaflet-popup-content-wrapper { background: #0c0c0c !important; color: white !important; border: 1px solid var(--neon); border-radius: 12px; font-family: var(--font-body); }
        .leaflet-popup-tip { background: #0c0c0c !important; border-left: 1px solid var(--neon); border-bottom: 1px solid var(--neon); }

        /* Barra dei filtri orizzontale coordinata */
        .filter-section {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px; padding: 25px; margin-bottom: 40px; backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;
        }
        .filter-group { display: flex; align-items: center; gap: 15px; }
        .filter-group label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; opacity: 0.5; letter-spacing: 1px; }
        
        .filter-select, .form-control-custom { 
            background: var(--dark); border: 1px solid rgba(255, 255, 255, 0.1); color: white !important; 
            padding: 12px 20px; border-radius: 12px; outline: none; transition: 0.3s;
        }
        .filter-select:focus, .form-control-custom:focus { border-color: var(--neon); }

        .btn-create {
            background: var(--neon); color: var(--dark); font-family: var(--font-title); font-size: 0.85rem;
            text-transform: uppercase; padding: 14px 28px; border-radius: 50px; border: none; font-weight: bold; transition: 0.3s;
        }
        .btn-create:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(63, 240, 0, 0.3); }

        /* Griglia dei Match Ampia a 2/3 colonne */
        .matches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .match-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px; padding: 25px; backdrop-filter: blur(10px); position: relative;
            transition: 0.3s ease; display: flex; flex-direction: column; justify-content: space-between;
        }
        .match-card:hover { border-color: var(--neon); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .match-badge { position: absolute; top: 22px; right: 25px; background: rgba(63, 240, 0, 0.1); color: var(--neon); padding: 5px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .match-club { font-family: var(--font-title); font-size: 1.2rem; text-transform: uppercase; margin-bottom: 8px; color: var(--white); padding-right: 60px; }
        .match-info { font-size: 0.9rem; opacity: 0.6; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        
        .players-needed { font-size: 0.95rem; font-weight: 700; color: var(--white); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .players-count { background: var(--white); color: var(--dark); width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.8rem; font-weight: 800; }

        .btn-join {
            background: transparent; border: 1px solid var(--neon); color: var(--neon);
            font-family: var(--font-title); font-size: 0.75rem; text-transform: uppercase;
            padding: 12px; border-radius: 12px; width: 100%; text-align: center; text-decoration: none; display: block; transition: 0.3s;
        }
        .btn-join:hover { background: var(--neon); color: var(--dark); box-shadow: 0 0 15px rgba(63, 240, 0, 0.2); }

        /* Autocomplete integrato nella tendina scura */
        .autocomplete-wrapper { position: relative; }
        .autocomplete-results {
            position: absolute; top: calc(100% - 15px); left: 0; width: 100%;
            background: #0d0d0d; border: 1px solid rgba(255,255,255,0.15);
            border-bottom-left-radius: 12px; border-bottom-right-radius: 12px;
            z-index: 9999; max-height: 180px; overflow-y: auto; display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        .autocomplete-item { padding: 12px 15px; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); }
        .autocomplete-item:hover { background: var(--neon); color: var(--dark); font-weight: 600; }

        .modal-content { background: #0c0c0c; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; color: white; padding: 20px; }
        .modal-title { font-family: var(--font-title); text-transform: uppercase; font-size: 1.3rem; }
        label { font-size: 0.75rem; font-weight: 600; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>

    <div id="bg"></div>

    <div class="container-custom">
        <div class="radar-header">
            <a href="index.html"><img src="images/logo.png" class="logo-radar" alt="Nevera Logo"></a>
            <button class="btn-logout" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>

        <h1 class="radar-title">FINDER</h1>
        <p class="radar-subtitle">READY SET PLAY</p>

        <div class="map-container">
            <div id="radarMap"></div>
        </div>

        <div class="filter-section">
            <div class="filter-group">
                <label>Filtra Provincia:</label>
                <select id="geoFilter" class="filter-select" onchange="loadMatches()">
                    <option value="ALL">Tutte le province</option>
                    <option value="BG">Bergamo</option>
                    <option value="BS">Brescia</option>
                    <option value="CO">Como</option>
                    <option value="LC">Lecco</option>
                    <option value="MB">Monza e Brianza</option>
                    <option value="MI">Milano</option>
                    <option value="VA">Varese</option>
                </select>
            </div>
            <button class="btn-create" data-bs-toggle="modal" data-bs-target="#newMatchModal">
                <i class="fa-solid fa-plus me-2"></i>Lancia un SOS
            </button>
        </div>

        <div id="matchesGrid" class="matches-grid"></div>
    </div>

    <div class="modal fade" id="newMatchModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title">Lancia un SOS Match</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="newMatchForm" onsubmit="createMatch(event)">
                    <div class="modal-body">
                        
                        <label>Cerca Centro Sportivo</label>
                        <div class="autocomplete-wrapper">
                            <input type="text" id="matchClub" class="form-control-custom w-100 mb-3" placeholder="Digita il nome del centro..." autocomplete="off" oninput="searchClub(this.value)" required>
                            <div id="autocompleteResults" class="autocomplete-results"></div>
                        </div>

                        <input type="hidden" id="matchProvince">
                        <input type="hidden" id="matchLat">
                        <input type="hidden" id="matchLng">
                        
                        <div id="locationFeedback" class="small mb-3 text-uppercase fw-bold text-center" style="color: var(--neon); display:none; font-size:0.75rem;"></div>

                        <label>Data e Ora della partita</label>
                        <input type="datetime-local" id="matchDate" class="form-control-custom w-100 mb-3" required>
                        
                        <label>Giocatori Mancanti</label>
                        <select id="matchPlayers" class="form-control-custom w-100 mb-3" required>
                            <option value="1">1 Giocatore mancante</option>
                            <option value="2">2 Giocatori mancanti</option>
                            <option value="3">3 Giocatori mancanti</option>
                        </select>
                    </div>
                    <div class="modal-footer border-0">
                        <button type="submit" id="publishBtn" class="btn-create w-100 m-0">Pubblica Chiamata</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const SUPABASE_URL = "https://ennpbtrthwdxsvdbqbmn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVubnBidHJ0aHdkeHN2ZGJxYm1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNjU0NzUsImV4cCI6MjA5NDY0MTQ3NX0.JL-w7qkp6bktVJMrJ7O0Uw1phxaBpBc9BiP3cH8Q4-0";
        const dbClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

        let currentUser = null;
        let map = null;
        let markerLayer = null;
        let searchTimeout = null;

        const PROVINCE_COORDS = {
            "MI": [45.4642, 9.1900], "BG": [45.6983, 9.6773], "BS": [45.5416, 10.2118],
            "CO": [45.8081, 9.0852], "LC": [45.8566, 9.3973], "MB": [45.5845, 9.2735], "VA": [45.8175, 8.8262]
        };

        function initMap() {
            map = L.map('radarMap', { zoomControl: false }).setView([45.65, 9.5], 8);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO'
            }).addTo(map);
            markerLayer = L.layerGroup().addTo(map);
        }

        window.onload = async function() {
            if (!dbClient) return;
            initMap();

            const { data: { session } } = await dbClient.auth.getSession();
            if (!session) {
                window.location.href = "login.html";
            } else {
                currentUser = session.user;
                const userProvince = currentUser.user_metadata?.province;
                if (userProvince) {
                    document.getElementById("geoFilter").value = userProvince;
                    if(PROVINCE_COORDS[userProvince]) map.setView(PROVINCE_COORDS[userProvince], 9);
                }
                loadMatches();
            }
        }

        async function handleLogout() {
            if (confirm("Vuoi davvero uscire dal radar?")) {
                await dbClient.auth.signOut();
                window.location.href = "login.html";
            }
        }

        function searchClub(query) {
            clearTimeout(searchTimeout);
            const resultsBox = document.getElementById("autocompleteResults");
            const feedback = document.getElementById("locationFeedback");
            
            if (query.length < 3) {
                resultsBox.style.display = "none";
                return;
            }

            const userProv = currentUser?.user_metadata?.province || "MI";
            document.getElementById("matchProvince").value = userProv;

            searchTimeout = setTimeout(async () => {
                const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + " Lombardia")}&countrycodes=it&addressdetails=1&limit=5`;
                
                try {
                    const response = await fetch(url, { 
                        headers: { 
                            'Accept-Language': 'it',
                            'User-Agent': 'NeveraSportsApp/1.0 (info@neverasports.com)'
                        } 
                    });
                    const data = await response.json();
                    
                    if (!data || data.length === 0) {
                        resultsBox.innerHTML = `<div class="autocomplete-item" style="opacity:0.6;">Centro non in lista? Clicca qui per confermarlo</div>`;
                        resultsBox.style.display = "block";
                        resultsBox.firstChild.onclick = () => {
                            resultsBox.style.display = "none";
                            feedback.innerText = `📍 Inserimento manuale attivo (${userProv})`;
                            feedback.style.display = "block";
                        };
                        return;
                    }

                    resultsBox.innerHTML = "";
                    data.forEach(item => {
                        const div = document.createElement("div");
                        div.className = "autocomplete-item";
                        const parts = item.display_name.split(',');
                        const displayName = parts[0] + (parts[1] ? `, ${parts[1].trim()}` : '') + (parts[2] ? ` (${parts[2].trim()})` : '');
                        
                        div.innerText = displayName;
                        div.onclick = () => selectClub(item);
                        resultsBox.appendChild(div);
                    });
                    resultsBox.style.display = "block";
                } catch (e) {
                    console.error(e);
                    feedback.innerText = `📍 Modalità manuale attiva (${userProv})`;
                    feedback.style.display = "block";
                }
            }, 500);
        }

        function selectClub(item) {
            document.getElementById("matchClub").value = item.display_name.split(',')[0] + " (" + item.display_name.split(',')[1].trim() + ")";
            document.getElementById("matchLat").value = item.lat;
            document.getElementById("matchLng").value = item.lon;
            document.getElementById("autocompleteResults").style.display = "none";

            let provinceSigla = "MI"; 
            if (item.address && item.address.province) {
                const provNome = item.address.province.toLowerCase();
                if (provNome.includes("bergamo")) provinceSigla = "BG";
                else if (provNome.includes("brescia")) provinceSigla = "BS";
                else if (provNome.includes("como")) provinceSigla = "CO";
                else if (provNome.includes("lecco")) provinceSigla = "LC";
                else if (provNome.includes("monza")) provinceSigla = "MB";
                else if (provNome.includes("milano")) provinceSigla = "MI";
                else if (provNome.includes("varese")) provinceSigla = "VA";
            }
            document.getElementById("matchProvince").value = provinceSigla;

            const feedback = document.getElementById("locationFeedback");
            feedback.innerText = `📍 Localizzato: ${provinceSigla} (GPS Connesso)`;
            feedback.style.display = "block";
        }

        async function loadMatches() {
            const grid = document.getElementById("matchesGrid");
            const selectedProvince = document.getElementById("geoFilter").value;
            
            grid.innerHTML = `<div class="text-center opacity-50 w-100 py-5"><i class="fa-solid fa-circle-notch fa-spin fa-2x mb-3"></i><br>Scansione radar...</div>`;
            markerLayer.clearLayers();

            let query = dbClient.from('matches').select('*').order('date_time', { ascending: true });

            if (selectedProvince !== "ALL") {
                query = query.eq('province', selectedProvince);
                if (PROVINCE_COORDS[selectedProvince]) map.flyTo(PROVINCE_COORDS[selectedProvince], 10);
            } else {
                map.flyTo([45.65, 9.5], 8);
            }

            const { data: matches, error } = await query;
            if (error || !matches || matches.length === 0) {
                grid.innerHTML = `<div class="text-center opacity-40 w-100 py-5"><i class="fa-solid fa-satellite-dish fa-3x mb-3" style="color: var(--neon)"></i><br>Nessun SOS attivo in zona.</div>`;
                return;
            }

            grid.innerHTML = "";
            matches.forEach(match => {
                const dateObj = new Date(match.date_time);
                const dataFormattata = dateObj.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' });
                const oraFormattata = dateObj.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });

                const waMessage = encodeURIComponent(`Ciao! Ho visto il tuo SOS su Nevera Sports per la partita del ${dataFormattata} al club ${match.club}. C'è ancora posto?`);
                const waUrl = `https://wa.me/${match.creator_phone || ''}?text=${waMessage}`;

                let lat = match.latitude;
                let lng = match.longitude;

                if (!lat || !lng) {
                    if(PROVINCE_COORDS[match.province]) {
                        lat = PROVINCE_COORDS[match.province][0];
                        lng = PROVINCE_COORDS[match.province][1];
                    }
                }

                if (lat && lng) {
                    const marker = L.circleMarker([lat, lng], {
                        radius: 8, fillColor: "#3FF000", color: "#040404", weight: 2, opacity: 1, fillOpacity: 0.9
                    });

                    marker.bindPopup(`
                        <strong style="color:var(--neon); text-transform:uppercase;">${match.club}</strong><br>
                        <span style="font-size:0.8rem;">📅 ${dataFormattata} alle ${oraFormattata}</span><br>
                        <span style="font-size:0.8rem; font-weight:bold;">👥 Mancano ${match.players_needed} giocatori</span><br>
                        <a href="${waUrl}" target="_blank" style="color:var(--neon); text-decoration:none; display:inline-block; margin-top:5px; font-weight:bold;">Contatta su WA →</a>
                    `);
                    markerLayer.addLayer(marker);
                }

                const card = document.createElement("div");
                card.className = "match-card";
                card.innerHTML = `
                    <div>
                        <div class="match-badge">${match.province}</div>
                        <div class="match-club">${match.club}</div>
                        <div class="match-info"><i class="fa-regular fa-calendar me-2"></i>${dataFormattata}</div>
                        <div class="match-info"><i class="fa-regular fa-clock me-2"></i>${oraFormattata}</div>
                        <div class="players-needed">
                            <div class="players-count">${match.players_needed}</div> <span>Giocatori mancanti</span>
                        </div>
                    </div>
                    <a href="${waUrl}" target="_blank" class="btn-join"><i class="fa-brands fa-whatsapp me-2"></i>Candidati Ora</a>
                `;
                grid.appendChild(card);
            });
        }

        async function createMatch(event) {
            event.preventDefault();
            
            const club = document.getElementById("matchClub").value;
            const province = document.getElementById("matchProvince").value || "MI"; 
            const lat = document.getElementById("matchLat").value ? parseFloat(document.getElementById("matchLat").value) : null;
            const lng = document.getElementById("matchLng").value ? parseFloat(document.getElementById("matchLng").value) : null;
            
            const dateTime = document.getElementById("matchDate").value;
            const playersNeeded = parseInt(document.getElementById("matchPlayers").value);
            const creatorPhone = currentUser?.user_metadata?.phone || '';

            const { error } = await dbClient.from('matches').insert([{
                club: club,
                province: province,
                latitude: lat,
                longitude: lng,
                date_time: dateTime,
                players_needed: playersNeeded,
                creator_phone: creatorPhone,
                user_id: currentUser?.id
            }]);

            if (error) {
                alert("Errore: " + error.message);
            } else {
                document.getElementById("newMatchForm").reset();
                document.getElementById("locationFeedback").style.display = "none";
                const modalEl = document.getElementById('newMatchModal');
                bootstrap.Modal.getInstance(modalEl).hide();
                loadMatches();
            }
        }

        document.addEventListener("click", function (e) {
            if (e.target.id !== "matchClub") {
                document.getElementById("autocompleteResults").style.display = "none";
            }
        });
    </script>
</body>
</html>
