<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>MATCH RADAR | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="images/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --white: #FDFDFD;
            --font-title: 'Archivo Black', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        html, body {
            margin: 0; padding: 0;
            background-color: var(--dark);
            color: var(--white);
            font-family: var(--font-body);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* SFONDO E OVERLAY (COERENTE CON TEMPLATE) */
        #bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(4, 4, 4, 0.6), rgba(4, 4, 4, 0.9)), url('images/image_c3c605.jpg');
            background-size: cover; background-position: center; z-index: 0;
        }

        /* HEADER */
        header { position: relative; padding: 60px 0 40px 0; text-align: center; z-index: 100; }
        .logo-trigger { 
            height: 85px; cursor: pointer; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .logo-trigger:hover { transform: scale(1.1); filter: drop-shadow(0 0 15px var(--neon)); }

        /* MENU OVERLAY */
        .nv-menu {
            height: 100%; width: 0; position: fixed; z-index: 9999;
            top: 0; left: 0; background-color: rgba(4, 4, 4, 0.98); 
            overflow: hidden; transition: 0.5s; 
            display: flex; align-items: center; justify-content: center;
        }
        .nv-links a { 
            font-family: var(--font-title); font-size: 2.5rem; color: var(--white); 
            text-decoration: none; display: block; margin: 20px; text-transform: uppercase; 
        }
        .nv-links a:hover { color: var(--neon); transform: scale(1.05); }
        .nv-close { position: absolute; top: 30px; right: 45px; font-size: 50px; color: var(--neon); text-decoration: none; }

        /* MAIN CONTENT */
        .main-wrapper { position: relative; z-index: 10; padding: 40px 20px 80px 20px; text-align: center; }
        
        .nv-title { font-family: var(--font-title); font-size: clamp(2.5rem, 8vw, 4.5rem); text-transform: uppercase; letter-spacing: -2px; margin: 0; line-height: 1; }
        .nv-subtitle { color: var(--neon); font-weight: 700; text-transform: uppercase; letter-spacing: 12px; margin-bottom: 60px; font-size: 0.75rem; }

        /* COMPONENTI SPECIFICI MATCH RADAR */
        .filter-box {
            margin: 0 auto 35px auto; max-width: 600px;
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 25px; padding: 25px; text-align: left;
            backdrop-filter: blur(10px);
        }
        .level-select {
            background: var(--dark); border: 1px solid rgba(255, 255, 255, 0.12); color: white;
            padding: 14px 18px; border-radius: 14px; font-weight: 600; width: 100%; margin-top: 10px;
            outline: none; transition: 0.3s;
        }
        .level-select:focus { border-color: var(--neon); }

        .btn-action {
            font-family: var(--font-title); background: transparent; color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.2); padding: 16px 40px; border-radius: 50px;
            text-decoration: none !important; font-size: 0.75rem; transition: 0.3s; text-transform: uppercase; 
            margin-bottom: 50px; cursor: pointer; display: inline-block; letter-spacing: 2px;
        }
        .btn-action:hover { border-color: var(--neon); color: var(--neon); background: rgba(63, 240, 0, 0.03); box-shadow: 0 0 15px rgba(63, 240, 0, 0.1); }

        /* GRIGLIA ED ELEMENTI DEL RADAR */
        #radarGrid { margin: 0 auto; max-width: 600px; width: 100%; }
        
        .radar-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; padding: 25px 30px; margin-bottom: 20px;
            display: flex; justify-content: space-between; align-items: center; text-align: left;
            transition: 0.4s ease; backdrop-filter: blur(10px);
        }
        .radar-card:hover { border-color: rgba(255,255,255,0.2); background: rgba(255, 255, 255, 0.04); }
        .match-info h4 { font-weight: 800; font-size: 1.25rem; margin: 0 0 6px 0; letter-spacing: -0.3px; text-transform: uppercase; }
        .match-info p { margin: 0; opacity: 0.5; font-size: 0.9rem; font-weight: 400; }
        .match-meta { display: flex; gap: 10px; margin-top: 12px; }
        
        .badge-radar { background: rgba(255,255,255,0.04); padding: 6px 14px; border-radius: 30px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); }
        .badge-neon { border-color: var(--neon); color: var(--neon); background: rgba(63, 240, 0, 0.02); }

        .btn-join {
            background: var(--neon); color: var(--dark); font-family: var(--font-title);
            padding: 12px 28px; border-radius: 50px; text-decoration: none !important;
            font-size: 0.75rem; text-transform: uppercase; transition: 0.2s; display: inline-block;
            letter-spacing: 1px;
        }
        .btn-join:hover { transform: scale(1.05); background: #35cc00; box-shadow: 0 0 15px rgba(63, 240, 0, 0.4); color: var(--dark); }

        /* POPUP MODALE FIXED LUXURY */
        .nv-modal {
            display: none; position: fixed; z-index: 999999; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 4, 4, 0.96); align-items: center; justify-content: center; padding: 20px;
            backdrop-filter: blur(8px);
        }
        .modal-content-box {
            background: #0d0d0d; border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 35px; border-radius: 30px; max-width: 460px; width: 100%; color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        .modal-content-box h3 { font-family: var(--font-title); font-size: 1.5rem; margin-bottom: 25px; text-transform: uppercase; letter-spacing: -0.5px; color: #FFF; }
        .modal-content-box input, .modal-content-box select {
            background: var(--dark) !important; border: 1px solid rgba(255, 255, 255, 0.12) !important; color: white !important;
            padding: 13px; border-radius: 12px; width: 100%; margin-bottom: 18px; outline: none; font-size: 0.95rem;
        }
        .modal-content-box input:focus, .modal-content-box select:focus { border-color: var(--neon); }
        .modal-content-box label { font-size: 0.8rem; font-weight: 600; opacity: 0.5; margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.5px; color: #FFF; }

        /* FOOTER A GRIGLIA (STILE HOME) */
        .nv-footer { 
            position: relative; z-index: 10; padding: 100px 20px 60px; 
            background-color: var(--dark); 
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .footer-container {
            max-width: 1050px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: flex-start;
            flex-wrap: wrap; gap: 50px; text-align: left;
        }
        .footer-brand { flex: 1; min-width: 200px; }
        .footer-logo-mini { height: 75px; opacity: 0.5; margin-bottom: 15px; }
        .footer-nav { display: flex; gap: 60px; }
        .f-col { display: flex; flex-direction: column; gap: 10px; }
        .f-col .f-label { font-size: 0.6rem; color: var(--neon); letter-spacing: 2px; font-weight: 800; margin-bottom: 10px; }
        .f-link { font-size: 0.85rem; color: white !important; opacity: 0.3; transition: 0.3s; text-decoration: none; }
        .f-link:hover { opacity: 1; color: var(--neon) !important; }
        .copyright { margin-top: 80px; opacity: 0.15; font-size: 0.55rem; letter-spacing: 5px; text-align: center; width: 100%; }

        @media (max-width: 768px) {
            .radar-card { flex-direction: column; align-items: flex-start; gap: 20px; padding: 20px; }
            .btn-join { width: 100%; text-align: center; }
            .footer-container { flex-direction: column; text-align: center; }
            .footer-nav { width: 100%; justify-content: space-around; }
            .footer-brand { width: 100%; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div id="bg"></div>

    <header>
        <img src="images/logo.png" class="logo-trigger" onclick="openM()" alt="Nevera Logo">
    </header>

    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" class="nv-close" onclick="closeM()">&times;</a>
        <div class="nv-links">
            <a href="index.html" onclick="closeM()">HOME</a>
            <a href="eventi.html" onclick="closeM()">EVENTI</a>
            <a href="community.html" onclick="closeM()">COMMUNITY</a>
            <a href="radar.html" onclick="closeM()">MATCH RADAR</a>
            <a href="partners.html" onclick="closeM()">PARTNERS</a>
            <a href="iniziative.html" onclick="closeM()">INIZIATIVE</a>
        </div>
    </div>

    <main class="main-wrapper container">
        <h1 class="nv-title">MATCH RADAR</h1>
        <p class="nv-subtitle">ready, set, play!</p>

        <div class="filter-box">
            <label style="font-weight: 600; font-size: 0.8rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.5px;">Il Tuo Livello Attuale:</label>
            <select id="userLevel" class="level-select" onchange="saveLevel()">
                <option value="all">Mostra tutti i match attivi</option>
                <option value="entry">Entry (Liv. 0.50 - 1.50)</option>
                <option value="principiante">Principiante (Liv. 1.50 - 2.50)</option>
                <option value="intermedio">Intermedio (Liv. 2.50 - 3.25)</option>
                <option value="intermedio-avanzato">Intermedio Avanzato(Liv. 3.25 - 4.50)</option>
                <option value="avanzato">Avanzato (Liv. 4.50 - 5.50)</option>
                <option value="pro">Pro (Liv. 5.50 - 7.00)</option>
            </select>
        </div>

        <div>
            <button class="btn-action" onclick="toggleModal(true)"><i class="fa-solid fa-plus me-2"></i> Lancia un SOS Match</button>
        </div>

        <div id="radarGrid">
            <p style="opacity:0.3; margin-top:20px;">Sincronizzazione radar in corso...</p>
        </div>
    </main>

    <div id="matchModal" class="nv-modal">
        <div class="modal-content-box text-start">
            <h3>Nuovo SOS Match</h3>
            
            <label>Circolo / Club Sportivo:</label>
            <input type="text" id="matchClub" placeholder="es. Nevera Sports Academy" required>
            
            <label>Data e Ora:</label>
            <input type="datetime-local" id="matchTime" required>
            
            <label>Livello:</label>
            <select id="matchLevel">
                <option value="entry">Entry (Liv. 0.50 - 1.50)</option>
                <option value="principiante">Principiante (Liv. 1.50 - 2.50)</option>
                <option value="intermedio">Intermedio (Liv. 2.50 - 3.25)</option>
                <option value="intermedio-avanzato">Intermedio Avanzato(Liv. 3.25 - 4.50)</option>
                <option value="avanzato">Avanzato (Liv. 4.50 - 5.50)</option>
                <option value="pro">Pro (Liv. 5.50 - 7.00)</option>
            </select>
            
            <label>Quanti giocatori mancano?</label>
            <input type="number" id="matchMissing" placeholder="es. 1" min="1" max="3" required>
            
            <label>Link Playtomic:</label>
            <input type="url" id="matchLink" placeholder="https://playtomic.io/match/..." required>
            
            <div class="d-flex gap-2 mt-4">
                <button class="btn-action" onclick="toggleModal(false)" style="margin: 0; padding: 12px 20px; font-size: 0.8rem;">Annulla</button>
                <button class="btn-join" onclick="createMatch()" style="flex: 1; padding: 14px 0; font-size: 0.8rem;">Pubblica</button>
                
            </div>
        </div>
    </div>

    <footer class="nv-footer">
        <div class="footer-container">
            <div class="footer-brand">
                <img src="images/logo.png" class="footer-logo-mini" alt="Logo Mini">
                <p style="font-size:0.6rem; opacity:0.2; letter-spacing:3px; font-weight:700;">PRECISION IN PERFORMANCE.</p>
            </div>
            
            <div class="footer-nav">
                <div class="f-col">
                    <span class="f-label">NAVIGAZIONE</span>
                    <a href="index.html" class="f-link">HOME</a>
                    <a href="eventi.html" class="f-link">EVENTI</a>
                    <a href="community.html" class="f-link">COMMUNITY</a>
                </div>
                <div class="f-col">
                    <span class="f-label">SOCIAL</span>
                    <a href="https://www.instagram.com/neverasports.it/" class="f-link">INSTAGRAM</a>
                    <a href="https://chat.whatsapp.com/GItl3C5mrgxJxXAPhHHRFh" class="f-link">WHATSAPP</a>
                </div>
            </div>
        </div>
        <p class="copyright">© 2026 NEVERA SPORTS | BORN UNDER PRESSURE</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        function openM() { document.getElementById("m").style.width = "100%"; }
        function closeM() { document.getElementById("m").style.width = "0"; }
        
        function toggleModal(show) {
            const modal = document.getElementById("matchModal");
            if (modal) { modal.style.display = show ? "flex" : "none"; }
        }

        const SUPABASE_URL = "https://ennpbtrthwdxsvdbqbmn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVubnBidHJ0aHdkeHN2ZGJxYm1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNjU0NzUsImV4cCI6MjA5NDY0MTQ3NX0.JL-w7qkp6bktVJMrJ7O0Uw1phxaBpBc9BiP3cH8Q4-0";
        
        const dbClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

        window.onload = function() {
            if(localStorage.getItem('nevera-level')) {
                document.getElementById('userLevel').value = localStorage.getItem('nevera-level');
            }
            if (dbClient) { fetchMatches(); }
        }

        function saveLevel() {
            localStorage.setItem('nevera-level', document.getElementById('userLevel').value);
            if (dbClient) fetchMatches();
        }

        
            async function fetchMatches() {
    if (!dbClient) return;
    const grid = document.getElementById("radarGrid");
    const filter = document.getElementById("userLevel").value;

    let { data: matches, error } = await dbClient
        .from('Matches')
        .select('*')
        .order('date', { ascending: true });

    if (error) {
        grid.innerHTML = `<p style="opacity:0.6; color: #FF4444; margin-top:20px; font-weight:600;"><i class="fa-solid fa-triangle-exclamation me-2"></i>Errore di sincronizzazione.</p>`;
        console.error(error);
        return;
    }

    grid.innerHTML = "";
    let hasMatches = false;

    matches.forEach((m) => {
        const mancanti = m.missing || 1;
        const liv = m.level || 'all';
        
        let dataFormattata = "In aggiornamento";
        if (m.date) {
            const d = new Date(m.date);
            dataFormattata = d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' }) + " ore " + d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
        }

        if (filter === "all" || liv === filter) {
            hasMatches = true;
            
            // Se nel database non c'è un link valido, usiamo un fallback o lo lasciamo vuoto
            const urlPartita = m.link || "#";

            grid.innerHTML += `
                <div class="radar-card">
                    <div class="match-info">
                        <h4>${m.club || 'Club Sportivo'}</h4>
                        <p><i class="fa-regular fa-clock me-2"></i>${dataFormattata}</p>
                        <div class="match-meta">
                            <span class="badge-radar badge-neon">${liv}</span>
                            <span class="badge-radar">Mancano: ${mancanti}</span>
                        </div>
                    </div>
                    <div>
                        <a href="${urlPartita}" target="_blank" class="btn-join">
                            <i class="fa-solid fa-arrow-up-right-from-square me-1"></i> Apri Link
                        </a>
                    </div>
                </div>
            `;
        }
    });

    if(!hasMatches) {
        grid.innerHTML = `<p style="opacity:0.4; margin-top:25px; font-size:0.95rem;">Nessun SOS inserito per questa categoria.</p>`;
    }
}

async function createMatch() {
    if (!dbClient) return;
    
    const club = document.getElementById("matchClub").value;
    const dataOraInput = document.getElementById("matchTime").value;
    const livello = document.getElementById("matchLevel").value;
    const giocatori_mancanti = document.getElementById("matchMissing").value;
    
    // Prendiamo il valore dal nuovo campo URL
    const partitaLink = document.getElementById("matchLink").value;

    if(!club || !dataOraInput || !partitaLink || !giocatori_mancanti) { 
        alert("Tutti i campi sono obbligatori!"); 
        return; 
    }

    const payload = {
        club: club,
        date: new Date(dataOraInput).toISOString(),
        level: livello,
        missing: parseInt(giocatori_mancanti),
        link: partitaLink // Salva direttamente l'URL di Playtomic nella colonna text 'link'
    };

    const { error } = await dbClient.from('Matches').insert([payload]);

    if (error) {
        alert("Errore d'inserimento: " + error.message);
        console.error(error);
    } else {
        toggleModal(false);
        document.getElementById("matchClub").value = "";
        document.getElementById("matchTime").value = "";
        document.getElementById("matchMissing").value = "";
        document.getElementById("matchLink").value = ""; // Svuota il campo link
        fetchMatches();
    }
}
    </script>
</body>
</html>
