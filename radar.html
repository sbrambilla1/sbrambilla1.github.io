<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>RADAR FINDER | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="images/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --white: #FDFDFD;
            --font-title: 'Archivo Black', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        html, body {
            margin: 0; padding: 0; min-height: 100%;
            background-color: var(--dark); color: var(--white);
            font-family: var(--font-body); -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            display: flex; flex-direction: column;
        }

        #bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(4, 4, 4, 0.85), rgba(4, 4, 4, 0.95)), url('images/image_c3c605.jpg');
            background-size: cover; background-position: center; z-index: 0;
        }

        /* --- HEADER & MENU UTENTE --- */
        header { position: relative; padding: 40px 0 20px 0; text-align: center; z-index: 100; }
        .logo-trigger { height: 70px; cursor: pointer; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .logo-trigger:hover { transform: scale(1.1); filter: drop-shadow(0 0 15px var(--neon)); }

        .auth-header-icon {
            position: absolute; top: 50%; right: 25px; transform: translateY(-50%);
            font-size: 1.35rem; color: rgba(255, 255, 255, 0.6); cursor: pointer;
            transition: 0.3s ease; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%; backdrop-filter: blur(5px);
        }
        .auth-header-icon:hover { color: var(--neon); border-color: var(--neon); box-shadow: 0 0 15px rgba(63, 240, 0, 0.2); }

        .user-profile-dropdown { position: absolute; right: 25px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; justify-content: center; z-index: 1000;}
        .avatar-btn { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-title); font-size: 0.85rem; color: var(--neon); cursor: pointer; text-transform: uppercase; border: 2px solid var(--neon); background: rgba(4, 4, 4, 0.8); }
        .nv-dropdown-menu { position: absolute; top: 55px; right: 0; background: rgba(12, 12, 12, 0.98); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; width: 240px; padding: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); backdrop-filter: blur(15px); display: none; opacity: 0; transform: translateY(-10px); transition: opacity 0.3s, transform 0.3s; }
        .nv-dropdown-menu.show { display: block; opacity: 1; transform: translateY(0); }
        .user-menu-header { border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; margin-bottom: 10px; text-align: left; }
        .user-menu-name { font-family: var(--font-title); font-size: 0.85rem; text-transform: uppercase; margin: 0; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .nv-dropdown-item { display: flex; align-items: center; gap: 12px; padding: 12px; color: rgba(255,255,255,0.6); font-size: 0.8rem; font-weight: 600; text-decoration: none; border-radius: 10px; transition: 0.2s; cursor: pointer; text-align: left; }
        .nv-dropdown-item:hover { background: rgba(255,255,255,0.04); color: var(--neon); }
        .btn-logout-new { border-top: 1px solid rgba(255,255,255,0.05); color: #FF4444 !important; margin-top: 5px; padding-top: 12px; }
        .btn-logout-new:hover { background: rgba(255, 68, 68, 0.05); color: #FF4444; }

        /* --- DASHBOARD LATERALE (OFFCANVAS) --- */
        .nv-offcanvas { position: fixed; top: 0; right: -450px; width: 100%; max-width: 420px; height: 100%; background: rgba(8, 8, 8, 0.96); border-left: 1px solid rgba(255,255,255,0.05); z-index: 10050; backdrop-filter: blur(20px); transition: right 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); padding: 40px 30px; display: flex; flex-direction: column; text-align: left; color: white; }
        .nv-offcanvas.open { right: 0; box-shadow: -15px 0 40px rgba(0,0,0,0.8); }
        .nv-offcanvas-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .nv-offcanvas-title { font-family: var(--font-title); font-size: 1.2rem; text-transform: uppercase; color: white; margin: 0; }
        .btn-close-offcanvas { background: none; border: none; color: var(--neon); font-size: 1.5rem; cursor: pointer; }
        .nv-offcanvas-body { flex: 1; overflow-y: auto; padding-right: 5px; }
        .profile-data-box, .my-match-item { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative; }
        .profile-label { font-size: 0.6rem; font-weight: 800; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
        .profile-value { font-size: 0.95rem; font-weight: 600; color: white; margin-bottom: 15px; }
        .my-match-club { font-weight: 700; font-size: 0.85rem; text-transform: uppercase; color: white; padding-right: 30px; }
        .my-match-time { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 5px; }
        .btn-delete-match { position: absolute; top: 15px; right: 15px; background: none; border: none; color: rgba(255,68,68,0.5); transition: 0.2s; font-size: 0.9rem; cursor: pointer; }
        .btn-delete-match:hover { color: #FF4444; transform: scale(1.1); }

        /* MENU NAVIGAZIONE GLOBALE */
        .nv-menu { height: 100%; width: 0; position: fixed; z-index: 9999; top: 0; left: 0; background-color: rgba(4, 4, 4, 0.98); overflow: hidden; transition: 0.5s; display: flex; align-items: center; justify-content: center; }
        .nv-links a { font-family: var(--font-title); font-size: 2.5rem; color: var(--white); text-decoration: none; display: block; margin: 20px; text-transform: uppercase; text-align: center; }
        .nv-links a:hover { color: var(--neon); transform: scale(1.05); }
        .nv-close { position: absolute; top: 30px; right: 45px; font-size: 50px; color: var(--neon); text-decoration: none; }

        /* --- STILI RADAR --- */
        .container-custom { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; padding: 10px 20px 40px; flex: 1; }

        .radar-title { font-family: var(--font-title); font-size: 2.5rem; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 5px; text-align: center;}
        .radar-subtitle { font-size: 0.9rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; text-align: center; }

        .map-container { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 30px; padding: 15px; margin-bottom: 40px; backdrop-filter: blur(10px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        #radarMap { height: 350px; border-radius: 20px; background: #0d0d0d; border: 1px solid rgba(255, 255, 255, 0.05); z-index: 1;}
        .leaflet-popup-content-wrapper { background: #0c0c0c !important; color: white !important; border: 1px solid var(--neon); border-radius: 12px; font-family: var(--font-body); }
        .leaflet-popup-tip { background: #0c0c0c !important; border-left: 1px solid var(--neon); border-bottom: 1px solid var(--neon); }

        .filter-section { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; padding: 20px; margin-bottom: 30px; backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
        .filter-group { display: flex; align-items: center; gap: 10px; }
        .filter-group label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; opacity: 0.6; }
        .filter-select { background: var(--dark); border: 1px solid rgba(255, 255, 255, 0.15); color: white; padding: 10px 20px; border-radius: 10px; outline: none; }
        .filter-select:focus { border-color: var(--neon); }

        .btn-create { background: var(--neon); color: var(--dark); font-family: var(--font-title); font-size: 0.8rem; text-transform: uppercase; padding: 12px 25px; border-radius: 50px; border: none; font-weight: bold; transition: 0.3s; }
        .btn-create:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(63, 240, 0, 0.3); }

        .matches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .match-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06); border-radius: 24px; padding: 25px; backdrop-filter: blur(10px); position: relative; transition: 0.3s ease; display: flex; flex-direction: column; justify-content: space-between; }
        .match-card:hover { border-color: var(--neon); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .match-badge { position: absolute; top: 20px; right: 20px; background: rgba(63, 240, 0, 0.1); color: var(--neon); padding: 5px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .match-club { font-family: var(--font-title); font-size: 1.2rem; text-transform: uppercase; margin-bottom: 5px; color: var(--white); padding-right: 60px; }
        .match-info { font-size: 0.9rem; opacity: 0.6; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .players-needed { font-size: 1rem; font-weight: 700; color: var(--white); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .players-count { background: var(--white); color: var(--dark); width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.8rem; }

        .btn-join { background: transparent; border: 1px solid var(--neon); color: var(--neon); font-family: var(--font-title); font-size: 0.75rem; text-transform: uppercase; padding: 12px; border-radius: 12px; width: 100%; text-align: center; text-decoration: none; display: block; transition: 0.3s; }
        .btn-join:hover { background: var(--neon); color: var(--dark); box-shadow: 0 0 15px rgba(63, 240, 0, 0.2); }
        
        .btn-playtomic { background: transparent; border: 1px solid #10b4f5; color: #10b4f5; font-family: var(--font-title); font-size: 0.75rem; text-transform: uppercase; padding: 12px; border-radius: 12px; width: 100%; text-align: center; text-decoration: none; display: block; transition: 0.3s; }
        .btn-playtomic:hover { background: #10b4f5; color: white; box-shadow: 0 0 15px rgba(16, 180, 245, 0.2); }

        /* Modal e Autocomplete Scuro Cyberpunk */
        .modal-content { background: #0c0c0c; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; color: white; padding: 20px; }
        .form-control-custom { background: var(--dark); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 15px; outline: none; }
        .form-control-custom:focus { border-color: var(--neon); color: white; background: var(--dark); }
        .modal-title { font-family: var(--font-title); text-transform: uppercase; font-size: 1.3rem; }

        /* Suggerimenti indirizzo */
        .autocomplete-wrapper { position: relative; }
        .autocomplete-results { position: absolute; top: calc(100% - 15px); left: 0; width: 100%; background: #121212; border: 1px solid rgba(255,255,255,0.15); border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; z-index: 9999; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.6); }
        .autocomplete-item { padding: 12px 15px; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); }
        .autocomplete-item:hover { background: var(--neon); color: var(--dark); font-weight: 600; }

        /* --- FOOTER --- */
        .nv-footer { border-top: 1px solid rgba(255,255,255,0.05); background: #040404; padding: 40px 0; margin-top: 40px; position: relative; z-index: 10; text-align: center; }
        .nv-footer-social a { color: white; font-size: 1.5rem; margin: 0 12px; transition: 0.3s; display: inline-block; }
        .nv-footer-social a:hover { color: var(--neon); transform: translateY(-3px) scale(1.1); filter: drop-shadow(0 0 10px var(--neon)); }

        @media (max-width: 768px) {
            .auth-header-icon, .user-profile-dropdown { right: 15px; }
            .filter-section { flex-direction: column; align-items: stretch; }
            .btn-create { width: 100%; }
        }
    </style>
</head>
<body>

    <div id="bg"></div>

    <header class="position-relative">
        <img src="images/logo.png" class="logo-trigger" onclick="openM()" alt="Nevera Logo">
        <div id="authHeaderBtn" class="auth-header-icon"><i class="fa-regular fa-user"></i></div>
    </header>

    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" class="nv-close" onclick="closeM()">&times;</a>
        <div class="nv-links">
            <a href="index.html" onclick="closeM()">HOME</a>
            <a href="eventi.html" onclick="closeM()">EVENTI</a>
            <a href="community.html" onclick="closeM()">COMMUNITY</a>
            <a href="radar.html" onclick="closeM()">FINDER</a>
            <a href="partners.html" onclick="closeM()">PARTNERS</a>
            <a href="iniziative.html" onclick="closeM()">INIZIATIVE</a>
        </div>
    </div>

    <div class="nv-offcanvas" id="userOffcanvas">
        <div class="nv-offcanvas-header">
            <h5 class="nv-offcanvas-title" id="offcanvasTitle">Dashboard</h5>
            <button class="btn-close-offcanvas" onclick="closeUserPanel()">&times;</button>
        </div>
        <div class="nv-offcanvas-body" id="offcanvasBody"></div>
    </div>

    <div class="container-custom">
        <h1 class="radar-title">SOS MATCH RADAR</h1>
        <p class="radar-subtitle">Trova o lancia una chiamata alle armi sui campi</p>

        <div class="map-container">
            <div id="radarMap"></div>
        </div>

        <div class="filter-section">
            <div class="filter-group">
                <label>Provincia attiva:</label>
                <select id="geoFilter" class="filter-select" onchange="loadMatches()">
                    <option value="ALL">Tutte le province</option>
                    <option value="BG">Bergamo</option>
                    <option value="BS">Brescia</option>
                    <option value="CO">Como</option>
                    <option value="LC">Lecco</option>
                    <option value="MB">Monza e Brianza</option>
                    <option value="MI">Milano</option>
                    <option value="VA">Varese</option>
                </select>
            </div>
            <button class="btn-create" data-bs-toggle="modal" data-bs-target="#newMatchModal"><i class="fa-solid fa-plus me-2"></i>Lancia un SOS</button>
        </div>

        <div id="matchesGrid" class="matches-grid"></div>
    </div>

    <div class="modal fade" id="newMatchModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Lancia un SOS Match</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="newMatchForm" onsubmit="createMatch(event)">
                    <div class="modal-body">
                        
                        <label class="small text-uppercase opacity-50 mb-1 fw-bold">Centro Sportivo</label>
                        <div class="autocomplete-wrapper">
                            <input type="text" id="matchClub" class="form-control-custom" placeholder="Es. Monviso Padel..." autocomplete="off" oninput="searchClub(this.value)" required>
                            <div id="autocompleteResults" class="autocomplete-results"></div>
                        </div>

                        <input type="hidden" id="matchProvince">
                        <input type="hidden" id="matchLat">
                        <input type="hidden" id="matchLng">
                        
                        <div id="locationFeedback" class="small mb-3 text-uppercase fw-bold" style="color: var(--neon); display:none;"></div>

                        <label class="small text-uppercase opacity-50 mb-1 fw-bold">Data e Ora</label>
                        <input type="datetime-local" id="matchDate" class="form-control-custom" required>
                        
                        <div class="row">
                            <div class="col-6">
                                <label class="small text-uppercase opacity-50 mb-1 fw-bold">Livello Gioco</label>
                                <select id="matchLevel" class="form-control-custom" required>
                                    <option value="Principiante (1 - 2.5)">Principiante (1 - 2.5)</option>
                                    <option value="Intermedio (2.5 - 3.5)">Intermedio (2.5 - 3.5)</option>
                                    <option value="Avanzato (3.5 - 4.5)">Avanzato (3.5 - 4.5)</option>
                                    <option value="Esperto (4.5+)">Esperto (4.5+)</option>
                                </select>
                            </div>
                            <div class="col-6">
                                <label class="small text-uppercase opacity-50 mb-1 fw-bold">Mancanti</label>
                                <select id="matchPlayers" class="form-control-custom" required>
                                    <option value="1">1 Giocatore</option>
                                    <option value="2">2 Giocatori</option>
                                    <option value="3">3 Giocatori</option>
                                </select>
                            </div>
                        </div>

                        <label class="small text-uppercase opacity-50 mb-1 fw-bold">Link Partita Playtomic (Opzionale)</label>
                        <input type="url" id="matchPlaytomic" class="form-control-custom" placeholder="https://playtomic.io/..." autocomplete="off">
                        
                    </div>
                    <div class="modal-footer">
                        <button type="submit" id="publishBtn" class="btn-create w-100">Pubblica Chiamata</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer class="nv-footer">
        <div class="container-custom" style="padding-bottom: 20px;">
            <img src="images/logo.png" alt="Nevera Sports Logo" style="height: 45px; margin-bottom: 20px;">
            <div class="nv-footer-social mb-3">
                <a href="#"><i class="fa-brands fa-instagram"></i></a>
                <a href="#"><i class="fa-brands fa-tiktok"></i></a>
                <a href="#"><i class="fa-brands fa-whatsapp"></i></a>
            </div>
            <p class="small text-uppercase opacity-50 mb-0" style="font-weight: 600; letter-spacing: 1px;">
                &copy; 2024 Nevera Sports. Play the future.
            </p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        // --- FUNZIONI MENU GLOBALE E UTENTE ---
        function openM() { document.getElementById("m").style.width = "100%"; }
        function closeM() { document.getElementById("m").style.width = "0"; }

        function toggleUserMenu(event) {
            event.stopPropagation();
            const menu = document.getElementById("userMenu");
            if(menu) menu.classList.toggle("show");
        }

        window.addEventListener('click', function(event) {
            const menu = document.getElementById("userMenu");
            if (menu && menu.classList.contains("show")) {
                if (!event.target.matches('.avatar-btn') && !event.target.closest('.nv-dropdown-menu')) {
                    menu.classList.remove("show");
                }
            }
        });

        function setupUserMenu(user) {
            const authBtn = document.getElementById('authHeaderBtn');
            const fullName = user.user_metadata?.full_name || user.email.split('@')[0];
            const initials = fullName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();

            authBtn.className = "user-profile-dropdown"; 
            authBtn.innerHTML = `
                <div class="avatar-btn" id="userAvatar" onclick="toggleUserMenu(event)">${initials}</div>
                <div class="nv-dropdown-menu" id="userMenu">
                    <div class="user-menu-header">
                        <span class="user-menu-name" id="menuUserName">${fullName}</span>
                    </div>
                    <div class="nv-dropdown-item" onclick="openUserPanel('info')">
                        <i class="fa-solid fa-user-gear"></i> Info Profilo
                    </div>
                    <div class="nv-dropdown-item" onclick="openUserPanel('matches')">
                        <i class="fa-solid fa-calendar-days"></i> I miei Match
                    </div>
                    <div class="nv-dropdown-item btn-logout-new" onclick="handleLogout()">
                        <i class="fa-solid fa-power-off"></i> Scollega
                    </div>
                </div>
            `;
        }

        async function openUserPanel(type) {
            const menu = document.getElementById("userMenu");
            if (menu) menu.classList.remove("show");
            
            const panel = document.getElementById("userOffcanvas");
            const title = document.getElementById("offcanvasTitle");
            const body = document.getElementById("offcanvasBody");

                title.innerText = "Info Profilo";

                        <div class="profile-value">${currentUser.email}</div>
                        <div class="profile-label">Numero WhatsApp</div>
                        <div class="profile-value">${phone}</div>
                        <div class="profile-label">Provincia di Base</div>
                        <div class="profile-value">${prov}</div>
                    </div>
                `;
            } 
            else if (type === 'matches') {
                title.innerText = "I miei Match";
                const { data: myMatches, error } = await dbClient.from('matches').select('*').eq('user_id', currentUser.id).order('date_time', { ascending: false });

                if (error || !myMatches || myMatches.length === 0) {
                    body.innerHTML = `<p class="text-center opacity-40 mt-5 small">Nessun match caricato al momento.</p>`;
                    return;
                }

                body.innerHTML = "";
                myMatches.forEach(m => {
                    let formatted = "Data non disponibile";
                    if(m.date_time) {
                        const d = new Date(m.date_time);
                        formatted = d.toLocaleDateString('it-IT') + " alle " + d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                    }
                    const div = document.createElement("div");
                    div.className = "my-match-item";
                    div.innerHTML = `
                        <div class="my-match-club">${m.club || 'Club'}</div>
                        <div class="my-match-time"><i class="fa-regular fa-calendar-days me-1"></i> ${formatted}</div>
                        <button class="btn-delete-match" onclick="deleteMatchFromPanel(${m.id}, this)">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    `;
                    body.appendChild(div);
                });
            }
        }

        function closeUserPanel() { document.getElementById("userOffcanvas").classList.remove("open"); }

        async function deleteMatchFromPanel(id, element) {
            if (confirm("Vuoi rimuovere questo match dal radar?")) {
                const { error } = await dbClient.from('matches').delete().eq('id', id);
                if (!error) { 
                    element.parentElement.remove(); 
                    loadMatches();
                } else {
                    alert("Errore durante l'eliminazione.");
                }
            }
        }

        async function handleLogout() {
            if (confirm("Vuoi davvero uscire dal radar?")) {
                await dbClient.auth.signOut();
                window.location.href = "login.html";
            }
        }

        // --- MAPPA E LOGICA ORIGINALE ---
        function initMap() {
            map = L.map('radarMap', { zoomControl: false }).setView([45.65, 9.5], 8);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO'
            }).addTo(map);
            markerLayer = L.layerGroup().addTo(map);
        }

        window.onload = async function() {
            if (!dbClient) return;
            initMap();

            const { data: { session } } = await dbClient.auth.getSession();
            if (!session) {
                window.location.href = "login.html";
            } else {
                currentUser = session.user;
                setupUserMenu(currentUser);
                
                const userProvince = currentUser.user_metadata?.province;
                if (userProvince) {
                    document.getElementById("geoFilter").value = userProvince;
                    if(PROVINCE_COORDS[userProvince]) map.setView(PROVINCE_COORDS[userProvince], 9);
                }
                loadMatches();
            }
        }

        function searchClub(query) {
            clearTimeout(searchTimeout);
            const resultsBox = document.getElementById("autocompleteResults");
            const feedback = document.getElementById("locationFeedback");
            
            if (query.length < 3) {
                resultsBox.style.display = "none";
                return;
            }

            const userProv = currentUser?.user_metadata?.province || "MI";
            document.getElementById("matchProvince").value = userProv;

            searchTimeout = setTimeout(async () => {
                const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + " Lombardia")}&countrycodes=it&addressdetails=1&limit=5`;
                
                try {
                    const response = await fetch(url, { 
                        headers: { 
                            'Accept-Language': 'it',
                            'User-Agent': 'NeveraSportsApp/1.0 (info@neverasports.com)'
                        } 
                    });
                    const data = await response.json();
                    
                    if (!data || data.length === 0) {
                        resultsBox.innerHTML = `<div class="autocomplete-item" style="opacity:0.6;">Centro non in lista? Clicca qui per inserirlo comunque</div>`;
                        resultsBox.style.display = "block";
                        
                        resultsBox.firstChild.onclick = () => {
                            resultsBox.style.display = "none";
                            feedback.innerText = `📍 Inserimento manuale attivo (${userProv})`;
                            feedback.style.display = "block";
                        };
                        return;
                    }

                    resultsBox.innerHTML = "";
                    data.forEach(item => {
                        const div = document.createElement("div");
                        div.className = "autocomplete-item";
                        
                        const parts = item.display_name.split(',');
                        const displayName = parts[0] + (parts[1] ? `, ${parts[1].trim()}` : '') + (parts[2] ? ` (${parts[2].trim()})` : '');
                        
                        div.innerText = displayName;
                        div.onclick = () => selectClub(item);
                        resultsBox.appendChild(div);
                    });
                    resultsBox.style.display = "block";
                } catch (e) {
                    console.error("Errore geocoding:", e);
                    feedback.innerText = `📍 Modalità manuale attiva (${userProv})`;
                    feedback.style.display = "block";
                }
            }, 500);
        }

        function selectClub(item) {
            document.getElementById("matchClub").value = item.display_name.split(',')[0] + " (" + item.display_name.split(',')[1].trim() + ")";
            document.getElementById("matchLat").value = item.lat;
            document.getElementById("matchLng").value = item.lon;
            document.getElementById("autocompleteResults").style.display = "none";

            let provinceSigla = "MI"; 
            if (item.address) {
                if (item.address.province) {
                    const provNome = item.address.province.toLowerCase();
                    if (provNome.includes("bergamo")) provinceSigla = "BG";
                    else if (provNome.includes("brescia")) provinceSigla = "BS";
                    else if (provNome.includes("como")) provinceSigla = "CO";
                    else if (provNome.includes("lecco")) provinceSigla = "LC";
                    else if (provNome.includes("monza")) provinceSigla = "MB";
                    else if (provNome.includes("milano")) provinceSigla = "MI";
                    else if (provNome.includes("varese")) provinceSigla = "VA";
                }
            }
            document.getElementById("matchProvince").value = provinceSigla;

            const feedback = document.getElementById("locationFeedback");
            feedback.innerText = `📍 Localizzato a: ${provinceSigla} (Pronto al posizionamento GPS)`;
            feedback.style.display = "block";
        }

        async function loadMatches() {
            const grid = document.getElementById("matchesGrid");
            const selectedProvince = document.getElementById("geoFilter").value;
            
            grid.innerHTML = `<div class="text-center opacity-50 w-100 py-5"><i class="fa-solid fa-circle-notch fa-spin fa-2x mb-3"></i><br>Scansione radar in corso...</div>`;
            markerLayer.clearLayers();

            let query = dbClient.from('matches').select('*').order('date_time', { ascending: true });

            if (selectedProvince !== "ALL") {
                query = query.eq('province', selectedProvince);
                if (PROVINCE_COORDS[selectedProvince]) map.flyTo(PROVINCE_COORDS[selectedProvince], 10);
            } else {
                map.flyTo([45.65, 9.5], 8);
            }

            const { data: matches, error } = await query;
            if (error || !matches || matches.length === 0) {
                grid.innerHTML = `<div class="text-center opacity-40 w-100 py-5"><i class="fa-solid fa-satellite-dish fa-3x mb-3" style="color: var(--neon)"></i><br>Nessun SOS attivo.</div>`;
                return;
            }

            grid.innerHTML = "";
            matches.forEach(match => {
                const dateObj = new Date(match.date_time);
                const dataFormattata = dateObj.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' });
                const oraFormattata = dateObj.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });

                const waMessage = encodeURIComponent(`Ciao! Ho visto il tuo SOS su Nevera Sports per la partita del ${dataFormattata} al club ${match.club}. C'è ancora posto?`);
                const waUrl = `https://wa.me/${match.creator_phone || ''}?text=${waMessage}`;

                let lat = match.latitude;
                let lng = match.longitude;

                if (!lat || !lng) {
                    if(PROVINCE_COORDS[match.province]) {
                        lat = PROVINCE_COORDS[match.province][0];
                        lng = PROVINCE_COORDS[match.province][1];
                    }
                }

                if (lat && lng) {
                    const marker = L.circleMarker([lat, lng], {
                        radius: 9, fillColor: "#3FF000", color: "#040404", weight: 2, opacity: 1, fillOpacity: 0.85
                    });

                    marker.bindPopup(`
                        <strong style="color:var(--neon); text-transform:uppercase;">${match.club}</strong><br>
                        <span style="font-size:0.8rem;">📅 ${dataFormattata} alle ${oraFormattata}</span><br>
                        <span style="font-size:0.8rem;">🎾 Livello: ${match.level || 'Non specificato'}</span><br>
                        <span style="font-size:0.8rem; font-weight:bold;">👥 Mancano ${match.players_needed} players</span><br>
                        <a href="${waUrl}" target="_blank" style="color:var(--neon); text-decoration:none; display:inline-block; margin-top:5px; font-weight:bold;">Candidati Ora →</a>
                    `);
                    markerLayer.addLayer(marker);
                }

                const playtomicBtnHtml = match.playtomic_link ? 
                    `<a href="${match.playtomic_link}" target="_blank" class="btn-playtomic mt-2"><i class="fa-solid fa-link me-2"></i>Apri su Playtomic</a>` : '';

                const card = document.createElement("div");
                card.className = "match-card";
                card.innerHTML = `
                    <div>
                        <div class="match-badge">${match.province}</div>
                        <div class="match-club">${match.club}</div>
                        <div class="match-info"><i class="fa-regular fa-calendar me-2"></i>${dataFormattata}</div>
                        <div class="match-info"><i class="fa-regular fa-clock me-2"></i>${oraFormattata}</div>
                        <div class="match-info"><i class="fa-solid fa-layer-group me-2"></i>Livello: ${match.level || 'N/A'}</div>
                        <div class="players-needed">
                            <div class="players-count">${match.players_needed}</div> <span>Giocatori mancanti</span>
                        </div>
                    </div>
                    <div class="d-flex flex-column gap-2 mt-3">
                        <a href="${waUrl}" target="_blank" class="btn-join"><i class="fa-brands fa-whatsapp me-2"></i>Candidati via WhatsApp</a>
                        ${playtomicBtnHtml}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function createMatch(event) {
            event.preventDefault();
            
            const club = document.getElementById("matchClub").value;
            const province = document.getElementById("matchProvince").value || "MI"; 
            const lat = document.getElementById("matchLat").value ? parseFloat(document.getElementById("matchLat").value) : null;
            const lng = document.getElementById("matchLng").value ? parseFloat(document.getElementById("matchLng").value) : null;
            
            const dateTime = document.getElementById("matchDate").value;
            const playersNeeded = parseInt(document.getElementById("matchPlayers").value);
            const level = document.getElementById("matchLevel").value;
            const playtomicLink = document.getElementById("matchPlaytomic").value;
            const creatorPhone = currentUser?.user_metadata?.phone || '';

            const { error } = await dbClient.from('matches').insert([{
                club: club,
                province: province,
                latitude: lat,
                longitude: lng,
                date_time: dateTime,
                players_needed: playersNeeded,
                level: level,
                playtomic_link: playtomicLink,
                creator_phone: creatorPhone,
                user_id: currentUser?.id
            }]);

            if (error) {
                alert("Errore: " + error.message);
            } else {
                document.getElementById("newMatchForm").reset();
                document.getElementById("locationFeedback").style.display = "none";
                const modalEl = document.getElementById('newMatchModal');
                bootstrap.Modal.getInstance(modalEl).hide();
                loadMatches();
            }
        }

        document.addEventListener("click", function (e) {
            if (e.target.id !== "matchClub") {
                document.getElementById("autocompleteResults").style.display = "none";
            }
        });
    </script>
</body>
</html>
