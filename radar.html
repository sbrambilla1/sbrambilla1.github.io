<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>RADER FINDER | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="images/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --white: #FDFDFD;
            --font-title: 'Archivo Black', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        html, body {
            margin: 0; padding: 0; min-height: 100%;
            background-color: var(--dark); color: var(--white);
            font-family: var(--font-body); -webkit-font-smoothing: antialiased;
        }

        #bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(4, 4, 4, 0.85), rgba(4, 4, 4, 0.95)), url('images/image_c3c605.jpg');
            background-size: cover; background-position: center; z-index: 0;
        }

        .container-custom { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        /* Header Navbar */
        .radar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo-radar { height: 50px; }
        .btn-logout { background: none; border: none; color: #FF4444; font-size: 1.5rem; cursor: pointer; transition: 0.3s; }
        .btn-logout:hover { transform: scale(1.1); filter: drop-shadow(0 0 10px #FF4444); }

        .radar-title { font-family: var(--font-title); font-size: 2.5rem; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 5px; }
        .radar-subtitle { font-size: 0.9rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }

        /* Filtri */
        .filter-section {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px; padding: 20px; margin-bottom: 30px; backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;
        }
        .filter-group { display: flex; align-items: center; gap: 10px; }
        .filter-group label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; opacity: 0.6; }
        .filter-select { background: var(--dark); border: 1px solid rgba(255, 255, 255, 0.15); color: white; padding: 10px 20px; border-radius: 10px; outline: none; }
        .filter-select:focus { border-color: var(--neon); }

        .btn-create {
            background: var(--neon); color: var(--dark); font-family: var(--font-title); font-size: 0.8rem;
            text-transform: uppercase; padding: 12px 25px; border-radius: 50px; border: none; font-weight: bold; transition: 0.3s;
        }
        .btn-create:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(63, 240, 0, 0.3); }

        /* Grid Match */
        .matches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        
        .match-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px; padding: 25px; backdrop-filter: blur(10px); position: relative;
            transition: 0.3s ease; display: flex; flex-direction: column; justify-content: space-between;
        }
        .match-card:hover { border-color: var(--neon); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .match-badge { position: absolute; top: 20px; right: 20px; background: rgba(63, 240, 0, 0.1); color: var(--neon); padding: 5px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .match-club { font-family: var(--font-title); font-size: 1.2rem; text-transform: uppercase; margin-bottom: 5px; color: var(--white); padding-right: 60px; }
        .match-info { font-size: 0.9rem; opacity: 0.6; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .players-needed { font-size: 1rem; font-weight: 700; color: var(--white); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .players-count { background: var(--white); color: var(--dark); width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.8rem; }

        .btn-join {
            background: transparent; border: 1px solid var(--neon); color: var(--neon);
            font-family: var(--font-title); font-size: 0.75rem; text-transform: uppercase;
            padding: 12px; border-radius: 12px; width: 100%; text-align: center; text-decoration: none; display: block; transition: 0.3s;
        }
        .btn-join:hover { background: var(--neon); color: var(--dark); box-shadow: 0 0 15px rgba(63, 240, 0, 0.2); }

        /* Modal di inserimento */
        .modal-content { background: #0c0c0c; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; color: white; padding: 20px; }
        .modal-header { border-bottom: none; }
        .modal-footer { border-top: none; }
        .form-control-custom { background: var(--dark); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 15px; outline: none; }
        .form-control-custom:focus { border-color: var(--neon); color: white; background: var(--dark); }
        .modal-title { font-family: var(--font-title); text-transform: uppercase; font-size: 1.3rem; }
    </style>
</head>
<body>

    <div id="bg"></div>

    <div class="container-custom">
        <div class="radar-header">
            <a href="index.html"><img src="images/logo.png" class="logo-radar" alt="Nevera Logo"></a>
            <button class="btn-logout" onclick="handleLogout()" title="Disconnetti"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>

        <h1 class="radar-title">SOS MATCH RADAR</h1>
        <p class="radar-subtitle">Trova o lancia una chiamata alle armi sui campi</p>

        <div class="filter-section">
            <div class="filter-group">
                <label>Provincia attiva:</label>
                <select id="geoFilter" class="filter-select" onchange="loadMatches()">
                    <option value="ALL">Tutte le province</option>
                    <option value="BG">Bergamo</option>
                    <option value="BS">Brescia</option>
                    <option value="CO">Como</option>
                    <option value="LC">Lecco</option>
                    <option value="MB">Monza e Brianza</option>
                    <option value="MI">Milano</option>
                    <option value="VA">Varese</option>
                </select>
            </div>
            <button class="btn-create" data-bs-toggle="modal" data-bs-target="#newMatchModal"><i class="fa-solid fa-plus me-2"></i>Lancia un SOS</button>
        </div>

        <div id="matchesGrid" class="matches-grid">
            </div>
    </div>

    <div class="modal fade" id="newMatchModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Lancia un SOS Match</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-with="modal" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="newMatchForm" onsubmit="createMatch(event)">
                    <div class="modal-body">
                        <label class="small text-uppercase opacity-50 mb-1 fw-bold">Nome del Club / Circolo</label>
                        <input type="text" id="matchClub" class="form-control-custom" placeholder="es. Nevera Sports Academy" required>
                        
                        <label class="small text-uppercase opacity-50 mb-1 fw-bold">Provincia del Circolo</label>
                        <select id="matchProvince" class="form-control-custom" required>
                            <option value="" disabled selected>Seleziona Provincia</option>
                            <option value="BG">Bergamo</option>
                            <option value="BS">Brescia</option>
                            <option value="CO">Como</option>
                            <option value="LC">Lecco</option>
                            <option value="MB">Monza e Brianza</option>
                            <option value="MI">Milano</option>
                            <option value="VA">Varese</option>
                        </select>

                        <label class="small text-uppercase opacity-50 mb-1 fw-bold">Data e Ora della partita</label>
                        <input type="datetime-local" id="matchDate" class="form-control-custom" required>
                        
                        <label class="small text-uppercase opacity-50 mb-1 fw-bold">Giocatori Mancanti</label>
                        <select id="matchPlayers" class="form-control-custom" required>
                            <option value="1">1 Giocatore mancante</option>
                            <option value="2">2 Giocatori mancanti</option>
                            <option value="3">3 Giocatori mancanti</option>
                        </select>
                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn-create w-100">Pubblica Chiamata</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://ennpbtrthwdxsvdbqbmn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVubnBidHJ0aHdkeHN2ZGJxYm1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNjU0NzUsImV4cCI6MjA5NDY0MTQ3NX0.JL-w7qkp6bktVJMrJ7O0Uw1phxaBpBc9BiP3cH8Q4-0";
        const dbClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

        let currentUser = null;

        // Controllo Sessione e Caricamento Profilo
        window.onload = async function() {
            if (!dbClient) return;
            
            const { data: { session }, error } = await dbClient.auth.getSession();
            if (!session) {
                // Non loggato -> Ritorna al login
                window.location.href = "login.html";
            } else {
                currentUser = session.user;
                
                // Prendi la provincia salvata nei metadati dell'utente registrato
                const userProvince = currentUser.user_metadata?.province;
                if (userProvince) {
                    // Imposta il filtro geografico sulla provincia dell'utente automaticamente
                    document.getElementById("geoFilter").value = userProvince;
                }
                
                // Carica i match filtrati
                loadMatches();
            }
        }

        // Forza il Logout
        async function handleLogout() {
            if (confirm("Vuoi davvero uscire dal radar?")) {
                await dbClient.auth.signOut();
                window.location.href = "login.html";
            }
        }

        // Caricamento dei Match filtrati per Provincia
        async function loadMatches() {
            const grid = document.getElementById("matchesGrid");
            const selectedProvince = document.getElementById("geoFilter").value;
            grid.innerHTML = `<div class="text-center opacity-50 w-100 py-5"><i class="fa-solid fa-circle-notch fa-spin fa-2x mb-3"></i><br>Scansione radar in corso...</div>`;

            let query = dbClient.from('sos_matches').select('*').order('date_time', { ascending: true });

            // Se il filtro non è su "ALL", applica il filtro per provincia
            if (selectedProvince !== "ALL") {
                query = query.eq('province', selectedProvince);
            }

            const { data: matches, error } = await query;

            if (error) {
                grid.innerHTML = `<div class="text-center text-danger w-100 py-5">Errore durante il caricamento del radar.</div>`;
                return;
            }

            if (!matches || matches.length === 0) {
                grid.innerHTML = `<div class="text-center opacity-40 w-100 py-5"><i class="fa-solid fa-satellite-dish fa-3x mb-3" style="color: var(--neon)"></i><br>Nessun SOS attivo in questa provincia al momento.</div>`;
                return;
            }

            grid.innerHTML = "";
            matches.forEach(match => {
                const dateObj = new Date(match.date_time);
                const dataFormattata = dateObj.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' });
                const oraFormattata = dateObj.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });

                // Link diretto a WhatsApp con messaggio precompilato (Usa il telefono dell'utente che ha creato il match, se salvato)
                const waMessage = encodeURIComponent(`Ciao! Ho visto il tuo SOS su Nevera Sports per la partita del ${dataFormattata} al club ${match.club}. C'è ancora posto?`);
                const waUrl = `https://wa.me/${match.creator_phone || ''}?text=${waMessage}`;

                const card = document.createElement("div");
                card.className = "match-card";
                card.innerHTML = `
                    <div>
                        <div class="match-badge">${match.province}</div>
                        <div class="match-club">${match.club}</div>
                        <div class="match-info"><i class="fa-regular fa-calendar me-2"></i>${dataFormattata}</div>
                        <div class="match-info"><i class="fa-regular fa-clock me-2"></i>${oraFormattata}</div>
                        <div class="players-needed">
                            <div class="players-count">${match.players_needed}</div> 
                            <span>${match.players_needed === 1 ? 'Giocatore mancante' : 'Giocatori mancanti'}</span>
                        </div>
                    </div>
                    <a href="${waUrl}" target="_blank" class="btn-join"><i class="fa-brands fa-whatsapp me-2"></i>Candidati Ora</a>
                `;
                grid.appendChild(card);
            });
        }

        // Creazione di un nuovo SOS Match
        async function createMatch(event) {
            event.preventDefault();
            
            const club = document.getElementById("matchClub").value;
            const province = document.getElementById("matchProvince").value;
            const dateTime = document.getElementById("matchDate").value;
            const playersNeeded = parseInt(document.getElementById("matchPlayers").value);

            // Recupera il numero di telefono del creatore dai suoi metadati
            const creatorPhone = currentUser?.user_metadata?.phone || '';

            const { error } = await dbClient.from('sos_matches').insert([{
                club: club,
                province: province,
                date_time: dateTime,
                players_needed: playersNeeded,
                creator_phone: creatorPhone,
                user_id: currentUser?.id
            }]);

            if (error) {
                alert("Errore nella pubblicazione dell'SOS: " + error.message);
            } else {
                // Reset form e chiusura modal
                document.getElementById("newMatchForm").reset();
                const modalEl = document.getElementById('newMatchModal');
                const modal = bootstrap.Modal.getInstance(modalEl);
                modal.hide();
                
                // Ricarica la griglia
                loadMatches();
            }
        }
    </script>
</body>
</html>
