<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>NEVERA SPORTS | Match Radar</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --white: #FDFDFD;
            --font-title: 'Archivo Black', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        html, body {
            margin: 0; padding: 0;
            background-color: var(--dark);
            color: var(--white);
            font-family: var(--font-body);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* HEADER & MENU LOGO */
        .nav-fix { 
            position: absolute; top: 0; width: 100%; padding: 25px 0; text-align: center; z-index: 100;
            background: linear-gradient(to bottom, rgba(4, 4, 4, 0.9) 0%, transparent 100%);
        }
        .logo-text {
            font-family: var(--font-title); font-size: 1.8rem; color: var(--white); 
            cursor: pointer; transition: 0.3s; letter-spacing: -1px; display: inline-block;
        }
        .logo-text span { color: var(--neon); }
        .logo-text:hover { transform: scale(1.05); text-shadow: 0 0 10px var(--neon); }

        /* MENU OVERLAY */
        .nv-menu {
            height: 100%; width: 0; position: fixed; z-index: 9999;
            top: 0; left: 0; background-color: rgba(4, 4, 4, 0.98); 
            overflow: hidden; transition: 0.4s; display: flex; align-items: center; justify-content: center;
        }
        .nv-links a { font-family: var(--font-title); font-size: 2.3rem; color: var(--white); text-decoration: none; display: block; margin: 20px; text-transform: uppercase; }
        .nv-links a:hover { color: var(--neon); }
        .nv-close { position: absolute; top: 30px; right: 45px; font-size: 50px; color: var(--neon); text-decoration: none; }

        /* MAIN WRAPPER */
        .main-wrapper { position: relative; z-index: 10; padding: 140px 20px 80px 20px; display: flex; flex-direction: column; align-items: center; }
        .nv-title { font-family: var(--font-title); font-size: clamp(2.3rem, 7vw, 4.2rem); text-transform: uppercase; letter-spacing: -2px; margin: 0; line-height: 0.9; text-align: center;}
        .nv-subtitle { color: var(--neon); font-weight: 700; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 40px; font-size: 0.8rem; text-align: center; }

        /* FILTRI */
        .profile-box {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px; padding: 20px; width: 100%; max-width: 800px; margin-bottom: 30px;
        }
        .level-select {
            background: var(--dark); border: 1px solid rgba(255, 255, 255, 0.1); color: white;
            padding: 12px 15px; border-radius: 12px; font-weight: 600; width: 100%; margin-top: 10px;
        }

        /* BOTTONE SOS */
        .btn-action {
            font-family: var(--font-title); background: transparent; color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.2); padding: 15px 35px; border-radius: 50px;
            text-decoration: none !important; font-size: 0.8rem; transition: 0.3s; text-transform: uppercase; 
            margin-bottom: 40px; cursor: pointer; display: inline-block;
        }
        .btn-action:hover { border-color: var(--neon); color: var(--neon); background: rgba(63, 240, 0, 0.02); }

        /* CARDS */
        .radar-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 25px; padding: 25px; margin-bottom: 20px; width: 100%; max-width: 800px;
            display: flex; justify-content: space-between; align-items: center; text-align: left;
        }
        .match-info h4 { font-weight: 800; font-size: 1.2rem; margin: 0 0 5px 0; }
        .match-info p { margin: 0; opacity: 0.6; font-size: 0.9rem; }
        .match-meta { display: flex; gap: 12px; margin-top: 10px; }
        .badge-radar { background: rgba(255,255,255,0.04); padding: 5px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.05); }
        .badge-neon { border-color: var(--neon); color: var(--neon); }

        .btn-join {
            background: var(--neon); color: var(--dark); font-family: var(--font-title);
            padding: 12px 25px; border-radius: 50px; text-decoration: none !important;
            font-size: 0.75rem; text-transform: uppercase; transition: 0.2s;
        }

        /* MODALE POPUP CORRETTA CON EXTRA PRIORITA' VISIVA */
        .nv-modal {
            display: none; position: fixed; z-index: 999999 !important; top:0; left:0; width:100%; height:100%;
            background: rgba(4,4,4,0.96); align-items: center; justify-content: center; padding: 20px;
        }
        .modal-content {
            background: #111 !important; border: 1px solid rgba(255,255,255,0.12) !important;
            padding: 35px; border-radius: 25px; max-width: 450px; width: 100%; color: white;
        }
        .modal-content h3 { font-family: var(--font-title); font-size: 1.4rem; margin-bottom: 20px; text-transform: uppercase; color: #FFF;}
        .modal-content input, .modal-content select {
            background: var(--dark) !important; border: 1px solid rgba(255,255,255,0.15) !important; color: white !important;
            padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 15px;
        }
        .modal-content label { font-size: 0.8rem; opacity: 0.6; margin-bottom: 5px; display: block; color: #FFF; }
    </style>
</head>
<body>

    <header class="nav-fix">
        <div class="logo-text" onclick="openM()">NEVERA<span>.</span></div>
    </header>

    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" class="nv-close" onclick="closeM()">&times;</a>
        <div class="nv-links">
            <a href="index.html">HOME</a>
            <a href="eventi.html">EVENTI</a>
            <a href="community.html">COMMUNITY</a>
            <a href="partners.html">SPONSOR</a>
            <a href="iniziative.html">INIZIATIVE</a>
        </div>
    </div>

    <main class="main-wrapper container text-center">
        <h1 class="nv-title">MATCH RADAR</h1>
        <p class="nv-subtitle">SOS QUARTO GIOCATORE</p>

        <div class="profile-box text-start">
            <label style="font-weight: 600; font-size: 0.85rem; opacity: 0.7; text-transform: uppercase;">Il Tuo Livello Attuale:</label>
            <select id="userLevel" class="level-select" onchange="saveLevel()">
                <option value="all">Mostra tutti i match</option>
                <option value="principiante">Principiante (Liv. 1.0 - 2.5)</option>
                <option value="intermedio">Intermedio (Liv. 3.0 - 4.0)</option>
                <option value="avanzato">Avanzato (Liv. 4.5 - 5.5)</option>
            </select>
        </div>

        <div>
            <button class="btn-action" onclick="toggleModal(true)"><i class="fa-solid fa-plus me-2"></i> Lancia un SOS Match</button>
        </div>

        <div id="matchList" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
            <p style="opacity:0.3; margin-top:20px;">Caricamento bacheca radar in corso...</p>
        </div>
    </main>

    <div id="matchModal" class="nv-modal">
        <div class="modal-content text-start">
            <h3>Nuovo SOS Match</h3>
            
            <label>Circolo / Club Sportivo:</label>
            <input type="text" id="matchClub" placeholder="es. Padel Hub Milano" required>
            
            <label>Data e Ora Partita:</label>
            <input type="datetime-local" id="matchTime" required>
            
            <label>Livello Richiesto:</label>
            <select id="matchLevel">
                <option value="principiante">Principiante</option>
                <option value="intermedio">Intermedio</option>
                <option value="avanzato">Avanzato</option>
            </select>
            
            <label>Giocatori Mancanti:</label>
            <input type="number" id="matchMissing" placeholder="es. 1" min="1" max="3" required>
            
            <label>Tuo Numero WhatsApp:</label>
            <input type="tel" id="matchPhone" placeholder="es. 3331234567" required>
            
            <div class="d-flex gap-2 mt-3">
                <button class="btn-join" onclick="createMatch()" style="flex: 1;">Pubblica</button>
                <button class="btn-action" onclick="toggleModal(false)" style="margin: 0; padding: 10px 20px;">Annulla</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        function openM() { document.getElementById("m").style.width = "100%"; }
        function closeM() { document.getElementById("m").style.width = "0"; }
        
        function toggleModal(show) {
            const modal = document.getElementById("matchModal");
            if (modal) {
                modal.style.display = show ? "flex" : "none";
            }
        }

        const SUPABASE_URL = "https://ennpbtrthwdxsvdbqbmn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVubnBidHJ0aHdkeHN2ZGJxYm1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNjU0NzUsImV4cCI6MjA5NDY0MTQ3NX0.JL-w7qkp6bktVJMrJ7O0Uw1phxaBpBc9BiP3cH8Q4-0";
        
        let supabase = null;

        try {
            if (window.supabase) {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch (e) {
            console.error("Connessione fallita:", e);
        }

        window.onload = function() {
            if(localStorage.getItem('nevera-level')) {
                document.getElementById('userLevel').value = localStorage.getItem('nevera-level');
            }
            if (supabase) {
                fetchMatches();
            }
        }

        function saveLevel() {
            localStorage.setItem('nevera-level', document.getElementById('userLevel').value);
            if (supabase) fetchMatches();
        }

        async function fetchMatches() {
            if (!supabase) return;
            const list = document.getElementById("matchList");
            const filter = document.getElementById("userLevel").value;

            let { data: matches, error } = await supabase
                .from('matches')
                .select('*')
                .order('date', { ascending: true });

            if (error) {
                list.innerHTML = `<p style="opacity:0.5; color: #FF4444; margin-top:20px;"><i class="fa-solid fa-triangle-exclamation me-2"></i>Sincronizzazione fallita: sblocca le policy RLS su Supabase.</p>`;
                return;
            }

            list.innerHTML = "";
            let hasMatches = false;

            matches.forEach((m) => {
                const mancanti = m.missing || 1;
                const liv = m.level || 'all';
                
                let dataFormattata = "Da definire";
                if (m.date) {
                    const d = new Date(m.date);
                    dataFormattata = d.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' }) + " ore " + d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                }

                if (filter === "all" || liv === filter) {
                    hasMatches = true;
                    list.innerHTML += `
                        <div class="radar-card" id="card-${m.id}">
                            <div class="match-info">
                                <h4>${m.club || 'Club Sportivo'}</h4>
                                <p><i class="fa-regular fa-clock me-2"></i>${dataFormattata}</p>
                                <div class="match-meta">
                                    <span class="badge-radar badge-neon">${liv}</span>
                                    <span class="badge-radar">Mancano: ${mancanti}</span>
                                </div>
                            </div>
                            <div>
                                <a href="https://wa.me/${m.link}?text=Ciao!%20Ho%20visto%20il%20tuo%20annuncio%20su%20Match%20Radar%20Nevera!" target="_blank" class="btn-join">
                                    <i class="fa-brands fa-whatsapp me-1"></i> Unisciti
                                </a>
                            </div>
                        </div>
                    `;
                }
            });

            if(!hasMatches) {
                list.innerHTML = `<p style="opacity:0.4; margin-top:20px;">Nessun SOS attivo per questo livello.</p>`;
            }
        }

        async function createMatch() {
            if (!supabase) return;
            
            const club = document.getElementById("matchClub").value;
            const dataOraInput = document.getElementById("matchTime").value;
            const livello = document.getElementById("matchLevel").value;
            const giocatori_mancanti = document.getElementById("matchMissing").value;
            let phone = document.getElementById("matchPhone").value;

            if(!club || !dataOraInput || !phone) { alert("Tutti i campi sono obbligatori!"); return; }
            
            phone = phone.replace(/\s+/g, '');
            if(!phone.startsWith('39') && !phone.startsWith('+39')) phone = '39' + phone;

            const payload = {
                club: club,
                date: new Date(dataOraInput).toISOString(),
                level: livello,
                missing: parseInt(giocatori_mancanti),
                link: phone
            };

            const { error } = await supabase.from('matches').insert([payload]);

            if (error) {
                alert("Errore d'inserimento. Verifica i permessi RLS su Supabase: " + error.message);
            } else {
                toggleModal(false);
                document.getElementById("matchClub").value = "";
                document.getElementById("matchTime").value = "";
                document.getElementById("matchPhone").value = "";
                fetchMatches();
            }
        }
    </script>
</body>
</html>
