<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>FINDER | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="images/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --white: #FDFDFD;
            --font-title: 'Archivo Black', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        /* REGOLA GLOBALE PER EVITARE SBORDAMENTI */
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0; padding: 0; min-height: 100%;
            background-color: var(--dark); color: var(--white);
            font-family: var(--font-body); -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        #bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(4, 4, 4, 0.85), rgba(4, 4, 4, 0.95)), url('images/image_c3c605.jpg');
            background-size: cover; background-position: center; z-index: 0;
        }

        /* --- HEADER & MENU UTENTE --- */
        header { position: relative; padding: 40px 0 20px 0; text-align: center; z-index: 100; }
        .logo-trigger { height: 70px; cursor: pointer; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .logo-trigger:hover { transform: scale(1.1); filter: drop-shadow(0 0 15px var(--neon)); }

        .auth-header-icon {
            position: absolute; top: 50%; right: 25px; transform: translateY(-50%);
            font-size: 1.35rem; color: rgba(255, 255, 255, 0.6); cursor: pointer;
            transition: 0.3s ease; width: 45px; height: 45px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50%; backdrop-filter: blur(5px);
        }
        .auth-header-icon:hover { color: var(--neon); border-color: var(--neon); box-shadow: 0 0 15px rgba(63, 240, 0, 0.2); }

        .user-profile-dropdown { position: absolute; right: 25px; top: 50%; transform: translateY(-50%); display: flex; align-items: center; justify-content: center; z-index: 1000;}
        .avatar-btn { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: var(--font-title); font-size: 0.85rem; color: var(--neon); cursor: pointer; text-transform: uppercase; border: 2px solid var(--neon); background: rgba(4, 4, 4, 0.8); }
        .nv-dropdown-menu { position: absolute; top: 55px; right: 0; background: rgba(12, 12, 12, 0.98); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; width: 240px; padding: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.8); backdrop-filter: blur(15px); display: none; opacity: 0; transform: translateY(-10px); transition: opacity 0.3s, transform 0.3s; }
        .nv-dropdown-menu.show { display: block; opacity: 1; transform: translateY(0); }
        .user-menu-header { border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; margin-bottom: 10px; text-align: left; }
        .user-menu-name { font-family: var(--font-title); font-size: 0.85rem; text-transform: uppercase; margin: 0; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .nv-dropdown-item { display: flex; align-items: center; gap: 12px; padding: 12px; color: rgba(255,255,255,0.6); font-size: 0.8rem; font-weight: 600; text-decoration: none; border-radius: 10px; transition: 0.2s; cursor: pointer; text-align: left; }
        .nv-dropdown-item:hover { background: rgba(255,255,255,0.04); color: var(--neon); }
        .btn-logout-new { border-top: 1px solid rgba(255,255,255,0.05); color: #FF4444 !important; margin-top: 5px; padding-top: 12px; }
        .btn-logout-new:hover { background: rgba(255, 68, 68, 0.05); color: #FF4444; }

        /* --- DASHBOARD LATERALE (OFFCANVAS) --- */
        .nv-offcanvas { position: fixed; top: 0; right: -450px; width: 100%; max-width: 420px; height: 100%; background: rgba(8, 8, 8, 0.96); border-left: 1px solid rgba(255,255,255,0.05); z-index: 10050; backdrop-filter: blur(20px); transition: right 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); padding: 40px 30px; display: flex; flex-direction: column; text-align: left; color: white; }
        .nv-offcanvas.open { right: 0; box-shadow: -15px 0 40px rgba(0,0,0,0.8); }
        .nv-offcanvas-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .nv-offcanvas-title { font-family: var(--font-title); font-size: 1.2rem; text-transform: uppercase; color: white; margin: 0; }
        .btn-close-offcanvas { background: none; border: none; color: var(--neon); font-size: 1.5rem; cursor: pointer; }
        .nv-offcanvas-body { flex: 1; overflow-y: auto; padding-right: 5px; }
        .profile-data-box, .my-match-item { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; margin-bottom: 15px; position: relative; }
        .profile-label { font-size: 0.6rem; font-weight: 800; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
        .profile-value { font-size: 0.95rem; font-weight: 600; color: white; margin-bottom: 15px; }
        .my-match-club { font-weight: 700; font-size: 0.85rem; text-transform: uppercase; color: white; padding-right: 30px; }
        .my-match-time { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 5px; }
        .btn-delete-match { position: absolute; top: 15px; right: 15px; background: none; border: none; color: rgba(255,68,68,0.5); transition: 0.2s; font-size: 0.9rem; cursor: pointer; }
        .btn-delete-match:hover { color: #FF4444; transform: scale(1.1); }

        /* MENU NAVIGAZIONE GLOBALE */
        .nv-menu { height: 100%; width: 0; position: fixed; z-index: 9999; top: 0; left: 0; background-color: rgba(4, 4, 4, 0.98); overflow: hidden; transition: 0.5s; display: flex; align-items: center; justify-content: center; }
        .nv-links a { font-family: var(--font-title); font-size: 2.5rem; color: var(--white); text-decoration: none; display: block; margin: 20px; text-transform: uppercase; text-align: center; }
        .nv-links a:hover { color: var(--neon); transform: scale(1.05); }
        .nv-close { position: absolute; top: 30px; right: 45px; font-size: 50px; color: var(--neon); text-decoration: none; }

        /* --- STILI RADAR --- */
        .container-custom { position: relative; z-index: 10; max-width: 1200px; margin: 0 auto; padding: 10px 20px 80px; flex: 1; width: 100%; }

        .radar-title { font-family: var(--font-title); font-size: 2.5rem; text-transform: uppercase; letter-spacing: -1px; margin-bottom: 5px; text-align: center;}
        .radar-subtitle { font-size: 0.9rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; text-align: center; }

        .map-container {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px; padding: 15px; margin-bottom: 40px; backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        #radarMap { height: 350px; border-radius: 20px; background: #0d0d0d; border: 1px solid rgba(255, 255, 255, 0.05); z-index: 1;}

        .leaflet-popup-content-wrapper { background: #0c0c0c !important; color: white !important; border: 1px solid var(--neon); border-radius: 12px; font-family: var(--font-body); }
        .leaflet-popup-tip { background: #0c0c0c !important; border-left: 1px solid var(--neon); border-bottom: 1px solid var(--neon); }

        .filter-section {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px; padding: 20px; margin-bottom: 30px; backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;
        }
        .filter-group label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; opacity: 0.6; }
        .filter-select { background: var(--dark); border: 1px solid rgba(255, 255, 255, 0.15); color: white; padding: 10px 20px; border-radius: 10px; outline: none; }
        .filter-select:focus { border-color: var(--neon); }

        .btn-create {
            background: var(--neon); color: var(--dark); font-family: var(--font-title); font-size: 0.8rem;
            text-transform: uppercase; padding: 12px 25px; border-radius: 50px; border: none; font-weight: bold; transition: 0.3s;
        }
        .btn-create:hover { transform: scale(1.03); box-shadow: 0 0 20px rgba(63, 240, 0, 0.3); }

        /* --- CENTRAMENTO ELENCO PARTITE --- */
        .matches-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 350px)); 
            justify-content: center;
            gap: 25px; 
        }
        
        .match-card {
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px; padding: 25px; backdrop-filter: blur(10px); position: relative;
            transition: 0.3s ease; display: flex; flex-direction: column; justify-content: space-between;
        }
        .match-card:hover { border-color: var(--neon); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        .match-badge { position: absolute; top: 20px; right: 20px; background: rgba(63, 240, 0, 0.1); color: var(--neon); padding: 5px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .match-club { font-family: var(--font-title); font-size: 1.2rem; text-transform: uppercase; margin-bottom: 5px; color: var(--white); padding-right: 60px; }
        .match-info { font-size: 0.9rem; opacity: 0.6; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        
        .players-needed { font-size: 1rem; font-weight: 700; color: var(--white); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .players-count { background: var(--white); color: var(--dark); width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 0.8rem; }

        .action-buttons-wrapper { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .btn-join {
            background: transparent; border: 1px solid var(--neon); color: var(--neon);
            font-family: var(--font-title); font-size: 0.75rem; text-transform: uppercase;
            padding: 12px; border-radius: 12px; width: 100%; text-align: center; text-decoration: none; display: block; transition: 0.3s;
        }
        .btn-join:hover { background: var(--neon); color: var(--dark); box-shadow: 0 0 15px rgba(63, 240, 0, 0.2); }
        
        .btn-playtomic {
            background: #1062FE; border: 1px solid #1062FE; color: white !important;
            font-family: var(--font-title); font-size: 0.75rem; text-transform: uppercase;
            padding: 12px; border-radius: 12px; width: 100%; text-align: center; text-decoration: none; display: block; transition: 0.3s;
        }
        .btn-playtomic:hover { background: #0049D0; box-shadow: 0 0 15px rgba(16, 98, 254, 0.3); }

        /* Modal e Autocomplete */
        .modal-content { background: #0c0c0c; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; color: white; padding: 20px; }
        .form-control-custom { background: var(--dark); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 15px; outline: none; }
        .form-control-custom:focus { border-color: var(--neon); color: white; background: var(--dark); }
        .modal-title { font-family: var(--font-title); text-transform: uppercase; font-size: 1.3rem; }

        .autocomplete-wrapper { position: relative; }
        .autocomplete-results {
            position: absolute; top: calc(100% - 15px); left: 0; width: 100%;
            background: #121212; border: 1px solid rgba(255,255,255,0.15);
            border-bottom-left-radius: 12px; border-bottom-right-radius: 12px;
            z-index: 9999; max-height: 200px; overflow-y: auto; display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        .autocomplete-item { padding: 12px 15px; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); color: rgba(255,255,255,0.8); }
        .autocomplete-item:hover { background: var(--neon); color: var(--dark); font-weight: 600; }

        /* --- STILI ORIGINALI DEL TUO FOOTER RICHIESTO --- */
        .nv-footer { padding: 100px 20px 60px; border-top: 1px solid rgba(255, 255, 255, 0.05); background: var(--dark); position: relative; z-index: 10; margin-top: auto; width: 100%; }
        .footer-container { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 40px; }
        .footer-brand { flex: 1; text-align: left; min-width: 250px; }
        .footer-logo-mini { height: 70px; opacity: 0.4; margin-bottom: 15px; }
        .footer-nav { display: flex; gap: 60px; flex: 1; justify-content: flex-end; }
        .f-col { display: flex; flex-direction: column; gap: 8px; text-align: left; }
        .f-label { font-size: 0.6rem; color: var(--neon); letter-spacing: 2px; font-weight: 800; margin-bottom: 10px; }
        .f-link { font-size: 0.85rem; color: white !important; opacity: 0.3; text-decoration: none; transition: 0.3s; }
        .f-link:hover { opacity: 1; color: var(--neon) !important; }
        .copyright { margin-top: 80px; opacity: 0.1; font-size: 0.5rem; letter-spacing: 5px; text-align: center; width: 100%; }

        /* --- PIN VERDE LAMPEGGIANTE --- */
        .blinking-pin {
            background-color: var(--neon);
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--white);
            box-shadow: 0 0 15px var(--neon);
            animation: pulse-neon 1.5s infinite;
        }

        @keyframes pulse-neon {
            0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(63, 240, 0, 0.7); }
            70% { transform: scale(1.2); box-shadow: 0 0 0 15px rgba(63, 240, 0, 0); }
            100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(63, 240, 0, 0); }
        }

        .custom-div-icon {
            background: transparent;
            border: none;
        }

        /* RESPONSIVE & BREAKPOINTS CORRETTI */
        @media (max-width: 768px) {
            .auth-header-icon, .user-profile-dropdown { right: 15px; }
            .filter-section { flex-direction: column; align-items: stretch; }
            .btn-create { width: 100%; }
            
            /* Stili responsive del footer inserito */
            .footer-container { flex-direction: column; text-align: center; }
            .footer-brand { text-align: center; margin-bottom: 20px; }
            .footer-nav { justify-content: center; text-align: center; width: 100%; }
            .f-col { align-items: center; text-align: center; }
        }
    </style>
</head>

        function closeM() { document.getElementById("m").style.width = "0"; }

        function toggleUserMenu(event) {
            event.stopPropagation();
            const menu = document.getElementById("userMenu");
            if(menu) menu.classList.toggle("show");
        }

        window.addEventListener('click', function(event) {
            const menu = document.getElementById("userMenu");
            if (menu && menu.classList.contains("show")) {
                if (!event.target.matches('.avatar-btn') && !event.target.closest('.nv-dropdown-menu')) {
                    menu.classList.remove("show");
                }
            }
        });

        function setupUserMenu(user) {
            const authBtn = document.getElementById('authHeaderBtn');
            const fullName = user.user_metadata?.full_name || user.email.split('@')[0];
            const initials = fullName.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();

            authBtn.className = "user-profile-dropdown"; 
            authBtn.innerHTML = `
                <div class="avatar-btn" id="userAvatar" onclick="toggleUserMenu(event)">${initials}</div>
                <div class="nv-dropdown-menu" id="userMenu">
                    <div class="user-menu-header">
                        <span class="user-menu-name" id="menuUserName">${fullName}</span>
                    </div>
                    <div class="nv-dropdown-item" onclick="openUserPanel('info')">
                        <i class="fa-solid fa-user-gear"></i> Info Profilo
                    </div>
                    <div class="nv-dropdown-item" onclick="openUserPanel('matches')">
                        <i class="fa-solid fa-calendar-days"></i> I miei Match
                    </div>
                    <div class="nv-dropdown-item btn-logout-new" onclick="handleLogout()">
                        <i class="fa-solid fa-power-off"></i> Scollega
                    </div>
                </div>
            `;
        }

        async function openUserPanel(type) {
            const menu = document.getElementById("userMenu");
            if (menu) menu.classList.remove("show");
            
            const panel = document.getElementById("userOffcanvas");
            const title = document.getElementById("offcanvasTitle");
            const body = document.getElementById("offcanvasBody");

            body.innerHTML = `<div class="text-center py-5 opacity-50"><i class="fa-solid fa-spinner fa-spin fa-2x" style="color:var(--neon)"></i></div>`;
            panel.classList.add("open");

            if (!currentUser) return;

            if (type === 'info') {
                title.innerText = "Info Profilo";
                const fullName = currentUser.user_metadata?.full_name || currentUser.email.split('@')[0];
                const phone = currentUser.user_metadata?.phone || "Non configurato";
                const prov = currentUser.user_metadata?.province || "Non impostata";
                
                body.innerHTML = `
                    <div class="profile-data-box">
                        <div class="profile-label">Nome Completo</div>
                        <div class="profile-value">${fullName}</div>
                        <div class="profile-label">Indirizzo Email</div>
                        <div class="profile-value">${currentUser.email}</div>
                        <div class="profile-label">Numero WhatsApp</div>
                        <div class="profile-value">${phone}</div>
                        <div class="profile-label">Provincia di Base</div>
                        <div class="profile-value">${prov}</div>
                    </div>
                `;
            } 
            else if (type === 'matches') {
                title.innerText = "I miei Match";
                const { data: myMatches, error } = await dbClient.from('matches').select('*').eq('user_id', currentUser.id).order('date_time', { ascending: false });

                if (error || !myMatches || myMatches.length === 0) {
                    body.innerHTML = `<p class="text-center opacity-40 mt-5 small">Nessun match caricato al momento.</p>`;
                    return;
                }

                body.innerHTML = "";
                myMatches.forEach(m => {
                    let formatted = "Data non disponibile";
                    if(m.date_time) {
                        const d = new Date(m.date_time);
                        formatted = d.toLocaleDateString('it-IT') + " alle " + d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                    }
                    const div = document.createElement("div");
                    div.className = "my-match-item";
                    div.innerHTML = `
                        <div class="my-match-club">${m.club || 'Club'}</div>
                        <div class="my-match-time"><i class="fa-regular fa-calendar-days me-1"></i> ${formatted}</div>
                        <button class="btn-delete-match" onclick="deleteMatchFromPanel(${m.id}, this)">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    `;
                    body.appendChild(div);
                });
            }
        }

        function closeUserPanel() { document.getElementById("userOffcanvas").classList.remove("open"); }

        async function deleteMatchFromPanel(id, element) {
            if (confirm("Vuoi rimuovere questo match dal radar?")) {
                const { error } = await dbClient.from('matches').delete().eq('id', id);
                if (!error) { 
                    element.parentElement.remove(); 
                    loadMatches(); 
                } else {
                    alert("Errore durante l'eliminazione.");
                }
            }
        }

        async function handleLogout() {
            if (confirm("Vuoi davvero uscire dal radar?")) {
                await dbClient.auth.signOut();
                window.location.href = "login.html";
            }
        }

        function initMap() {
            map = L.map('radarMap', { zoomControl: false }).setView([45.65, 9.5], 8);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO'
            }).addTo(map);
            markerLayer = L.layerGroup().addTo(map);
        }

        window.onload = async function() {
            if (!dbClient) return;
            initMap();

            const { data: { session } } = await dbClient.auth.getSession();
            if (!session) {
                window.location.href = "login.html";
            } else {
                currentUser = session.user;
                setupUserMenu(currentUser); 
                
                const userProvince = currentUser.user_metadata?.province;
                if (userProvince) {
                    document.getElementById("geoFilter").value = userProvince;
                    if(PROVINCE_COORDS[userProvince]) map.setView(PROVINCE_COORDS[userProvince], 9);
                }
                loadMatches();
            }
        }

        function searchClub(query) {
            clearTimeout(searchTimeout);
            const resultsBox = document.getElementById("autocompleteResults");
            const feedback = document.getElementById("locationFeedback");
            
            if (query.length < 3) {
                resultsBox.style.display = "none";
                return;
            }

            const userProv = currentUser?.user_metadata?.province || "MI";
            document.getElementById("matchProvince").value = userProv;

            searchTimeout = setTimeout(async () => {
                const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + " Lombardia")}&countrycodes=it&addressdetails=1&limit=5`;
                
                try {
                    const response = await fetch(url, { 
                        headers: { 
                            'Accept-Language': 'it',
                            'User-Agent': 'NeveraSportsApp/1.0 (info@neverasports.com)'
                        } 
                    });
                    const data = await response.json();
                    
                    if (!data || data.length === 0) {
                        resultsBox.innerHTML = `<div class="autocomplete-item" style="opacity:0.6;">Centro non in lista? Clicca qui per inserirlo senza mappa</div>`;
                        resultsBox.onclick = () => {
                            document.getElementById("matchClub").value = query;
                            document.getElementById("matchLat").value = "";
                            document.getElementById("matchLng").value = "";
                            feedback.style.display = "block";
                            feedback.innerText = "Posizione manuale - Il pin non apparirà sulla mappa";
                            resultsBox.style.display = "none";
                        };
                        resultsBox.style.display = "block";
                    } else {
                        resultsBox.innerHTML = "";
                        data.forEach(place => {
                            const div = document.createElement("div");
                            div.className = "autocomplete-item";
                            div.innerText = place.display_name;
                            div.onclick = () => {
                                document.getElementById("matchClub").value = place.name || place.display_name.split(",")[0];
                                document.getElementById("matchLat").value = place.lat;
                                document.getElementById("matchLng").value = place.lon;
                                feedback.style.display = "block";
                                feedback.innerText = "Posizione rilevata con successo!";
                                resultsBox.style.display = "none";
                            };
                            resultsBox.appendChild(div);
                        });
                        resultsBox.style.display = "block";
                    }
                } catch (e) {
                    console.error("Errore ricerca:", e);
                }
            }, 500);
        }

        async function loadMatches() {
            if (!dbClient) return;
            
            const grid = document.getElementById("matchesGrid");
            const filter = document.getElementById("geoFilter").value;
            grid.innerHTML = `<div class="text-center w-100 py-5"><i class="fa-solid fa-spinner fa-spin fa-2x" style="color:var(--neon)"></i></div>`;
            
            // Centra la mappa in base alla provincia
            if (filter !== "ALL" && PROVINCE_COORDS[filter]) {
                map.setView(PROVINCE_COORDS[filter], 9);
            } else if (filter === "ALL") {
                map.setView([45.65, 9.5], 8); // Lombardia centrale
            }

            // Query Supabase
            let query = dbClient.from('matches').select('*').order('date_time', { ascending: true });
            if (filter !== "ALL") query = query.eq('province', filter);

            const { data: matches, error } = await query;
            
            markerLayer.clearLayers(); 
            grid.innerHTML = "";

            if (error || !matches || matches.length === 0) {
                grid.innerHTML = `<div class="text-center w-100 mt-5"><h5 class="opacity-50 text-uppercase">Nessun match trovato per questa zona.</h5></div>`;
                return;
            }

            // Pin lampeggiante
            const blinkingIcon = L.divIcon({
                className: 'custom-div-icon',
                html: "<div class='blinking-pin'></div>",
                iconSize: [16, 16],
                iconAnchor: [8, 8],
                popupAnchor: [0, -10]
            });

            matches.forEach(m => {
                const d = new Date(m.date_time);
                const formattedDate = d.toLocaleDateString('it-IT') + " - " + d.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
                
                const card = document.createElement("div");
                card.className = "match-card";
                card.innerHTML = `
                    <div class="match-badge">${m.level || 'Intermedio'}</div>
                    <h3 class="match-club">${m.club}</h3>
                    <div class="match-info"><i class="fa-regular fa-clock"></i> ${formattedDate}</div>
                    <div class="players-needed">
                        Giocatori mancanti: <span class="players-count">${m.missing_players}</span>
                    </div>
                    <div class="action-buttons-wrapper">
                        ${m.playtomic_link ? `<a href="${m.playtomic_link}" target="_blank" class="btn-playtomic"><i class="fa-solid fa-bolt me-2"></i>ISCRIVITI SU PLAYTOMIC</a>` : ''}
                    </div>
                `;
                grid.appendChild(card);

                if (m.lat && m.lng) {
                    L.marker([m.lat, m.lng], { icon: blinkingIcon })
                     .bindPopup(`<b>${m.club}</b><br>Mancano: ${m.missing_players}`)
                     .addTo(markerLayer);
                }
            });
        }

        // --- FUNZIONE PER PUBBLICARE IL MATCH ---
        async function createMatch(event) {
            event.preventDefault();
            
            if (!currentUser) {
                alert("Sessione scaduta, effettua nuovamente l'accesso.");
                return;
            }

            const btn = document.getElementById("publishBtn");
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> PUBBLICAZIONE...';
            btn.disabled = true;

            const club = document.getElementById("matchClub").value;
            const province = document.getElementById("matchProvince").value;
            const lat = document.getElementById("matchLat").value;
            const lng = document.getElementById("matchLng").value;
            const dateTime = document.getElementById("matchDate").value;
            const missingPlayers = document.getElementById("matchPlayers").value;
            const level = document.getElementById("matchLevel").value;
            const playtomicLink = document.getElementById("matchPlaytomic").value;

            const matchData = {
                user_id: currentUser.id,
                club: club,
                province: province,
                lat: lat ? parseFloat(lat) : null,
                lng: lng ? parseFloat(lng) : null,
                date_time: dateTime,
                missing_players: parseInt(missingPlayers),
                level: level,
                playtomic_link: playtomicLink
            };

            const { data, error } = await dbClient.from('matches').insert([matchData]);

            btn.innerHTML = originalText;
            btn.disabled = false;

            if (error) {
                console.error("Errore salvataggio:", error);
                alert("Si è verificato un errore durante la pubblicazione del match.");
            } else {
                // Chiude la modale Bootstrap
                const modalElement = document.getElementById('newMatchModal');
                const modalInstance = bootstrap.Modal.getInstance(modalElement);
                if (modalInstance) {
                    modalInstance.hide();
                }

                // Resetta il form
                document.getElementById("newMatchForm").reset();
                document.getElementById("locationFeedback").style.display = "none";
                document.getElementById("matchLat").value = "";
                document.getElementById("matchLng").value = "";

                // Ricarica la griglia e la mappa
                loadMatches();
            }
        }
    </script>
</body>
</html>
