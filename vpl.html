<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volt Padel League | Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-league.css">
</head>
<body>

    <header class="league-header" onclick="toggleMenu()">
        <div class="header-content">
            <span class="volt-bar"></span>
            <h1>VOLT PADEL <span class="volt-accent">LEAGUE</span></h1>
        </div>
    </header>

    <div id="sideMenu" class="menu-overlay">
        <span class="close-btn" onclick="event.stopPropagation(); toggleMenu()">&times;</span>
        <nav class="menu-links">
            <a href="index.html">HOME</a>
            <a href="index.html#eventi">EVENTI</a>
            <a href="sponsor.html">SPONSOR</a>
            <a href="community.html">COMMUNITY</a>
        </nav>
    </div>

    <div class="container">
        <nav class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab(event, 'info')">Info & Regolamento</button>
            <button class="tab-btn" onclick="switchTab(event, 'ranking')">Classifica</button>
        </nav>

        <section id="info" class="tab-content active">
            <div class="info-layout">
                <div class="pdf-box">
                    <div class="pdf-text">
                        <h3>REGOLAMENTO UFFICIALE</h3>
                        <p>Consulta le regole della Volt Padel League.</p>
                    </div>
                    <a href="assets/regolamento.pdf" target="_blank" class="btn-pdf">APRI PDF</a>
                </div>
                
            </div>
        </section>

        <section id="ranking" class="tab-content">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>TEAM</th>
                            <th>PUNTI</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="rank-number">01</td>
                            <td><strong></strong></td>
                            <td class="pts-cell">1000</td>
                          
                        </tr>
                        <tr>
                            <td class="rank-number">02</td>
                            <td><strong></strong></td>
                            <td class="pts-cell">700</td>
                         
                        </tr>
                        <tr>
                            <td class="rank-number">03</td>
                            <td><strong></strong></td>
                            <td class="pts-cell">500</td>
                          
                        </tr>
                        <tr>
                            <td class="rank-number">04</td>
                            <td><strong></strong></td>
                            <td class="pts-cell">450</td>
                          
                        </tr>
                        <tr>
                            <td class="rank-number">05</td>
                            <td><strong></strong></td>
                            <td class="pts-cell">200</td>
                          
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        // Funzione per il Menu Hamburger
        function toggleMenu() {
            document.getElementById("sideMenu").classList.toggle("open");
        }

        // Funzione per i Tab
        function switchTab(event, tabId) {
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(c => c.classList.remove('active'));
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
