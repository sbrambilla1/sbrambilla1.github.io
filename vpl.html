<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volt Padel League | Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style-league.css">
</head>
<body>

    <div class="container">
        <header class="league-header">
            <h1>VOLT PADEL <span class="volt-accent">LEAGUE</span></h1>
        </header>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">NEVERA SPORTS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="eventi.html">Eventi</a></li>
                    <li class="nav-item"><a class="nav-link" href="community.html">Community</a></li>
                    <li class="nav-item"><a class="nav-link" href="sponsor.html">Sponsor</a></li>
                    <li class="nav-item"><a class="nav-link" href="iniziative.html">Iniziative</a></li>
                </ul>
            </div>
        </div>
    </nav>

        <nav class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab(event, 'info')">Info & Regolamento</button>
            <button class="tab-btn" onclick="switchTab(event, 'ranking')">Classifica</button>
        </nav>

        <section id="info" class="tab-content active">
            <div class="info-layout">
                <div class="pdf-box">
                    <div class="pdf-text">
                        <h3>REGOLAMENTO UFFICIALE</h3>
                        <p>Consulta il regolamento della Volt Padel League.</p>
                    </div>
                    <a href="/assets/regolamento.pdf" target="_blank" class="btn-pdf">Apri PDF</a>
                </div>
                
                
            </div>
        </section>

        <section id="ranking" class="tab-content">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>PLAYER</th>
                            <th>PUNTI</th>
                           
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="rank-number">01</td>
                            <td><strong></strong></td>
                            <td class="pts-cell">18</td>
                           
                        </tr>
                        <tr>
                            <td class="rank-number">02</td>
                            <td><strong></strong></td>
                            <td class="pts-cell">15</td>
                           
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        function switchTab(event, tabId) {
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(c => c.classList.remove('active'));
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
