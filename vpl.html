<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volt Padel League | NEVERA SPORTS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- RESET & LAYOUT --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', sans-serif;
            color: white;
            background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), url('images/vballs.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
            
            /* Queste 3 righe spingono il footer in fondo */
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
        }

        /* --- HEADER --- */
        .league-header {
            padding: 40px 0;
            text-align: center;
        }
        .logo-trigger { height: 80px; width: auto; cursor: pointer; transition: 0.3s; }
        .logo-trigger:hover { transform: scale(1.1); filter: drop-shadow(0 0 15px #CEFF05); }

        /* --- CONTENUTO (Si espande per occupare lo spazio) --- */
        .main-content { 
            flex: 1; /* Fondamentale: occupa tutto lo spazio verticale vuoto */
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        .nv-title { font-weight: 900; letter-spacing: 10px; text-transform: uppercase; font-size: 3rem; margin-bottom: 40px; }

        /* TABS */
        .tabs-nav { display: flex; justify-content: center; gap: 15px; margin-bottom: 40px; }
        .tab-btn {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; padding: 12px 30px; border-radius: 50px;
            font-weight: 700; text-transform: uppercase; cursor: pointer; transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .tab-btn.active { background: #CEFF05; color: #000; border-color: #CEFF05; box-shadow: 0 0 20px rgba(206, 255, 5, 0.4); }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }

        /* BOX GLASS STYLE */
        .glass-box {
            background: rgba(0, 0, 0, 0.5); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(206, 255, 5, 0.2); 
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 50px;
        }

        .btn-pdf {
            background: #CEFF05; color: black; padding: 12px 30px; border-radius: 50px;
            text-decoration: none; font-weight: 900; text-transform: uppercase; display: inline-block;
        }

        /* TABELLA */
        table { width: 100%; border-collapse: collapse; }
        th { color: #CEFF05; padding: 15px; border-bottom: 2px solid rgba(206, 255, 5, 0.3); }
        td { padding: 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }

        /* --- FOOTER (Spostato in basso) --- */
        .nv-footer { 
            padding: 50px 0;
            text-align: center;
            background: rgba(0,0,0,0.6); /* Leggero scurimento per leggibilità */
            backdrop-filter: blur(5px);
            width: 100%;
        }
        .footer-text { opacity: 0.5; letter-spacing: 4px; font-size: 0.7rem; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header class="league-header">
        <img src="images/logo.png" alt="Nevera Logo" class="logo-trigger" onclick="location.href='index.html'">
    </header>

    <div class="main-content">
        <h1 class="nv-title">VOLT PADEL LEAGUE</h1>

        <nav class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab(event, 'info')">Info & Regolamento</button>
            <button class="tab-btn" onclick="switchTab(event, 'ranking')">Classifica</button>
        </nav>

        <section id="info" class="tab-content active">
            <div class="glass-box">
                <h3 style="margin-bottom: 15px;">REGOLAMENTO UFFICIALE</h3>
                <p style="margin-bottom: 25px; opacity: 0.8;">Scopri il regolamento della Volt Padel League.</p>
                <a href="assets/regolamento.pdf" target="_blank" class="btn-pdf">APRI</a>
            </div>
        </section>

        <section id="ranking" class="tab-content">
            <div class="glass-box">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>GIOCATORE</th>
                            <th>PUNTI</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td style="color: #CEFF05;">01</td><td></td><td style="color: #F8F9FA;">1000</td></tr>
                        <tr><td style="color: #CEFF05;">02</td><td></td><td style="color: #F8F9FA;">750</td></tr>
                        <tr><td style="color: #CEFF05;">03</td><td></td><td style="color: #F8F9FA;">500</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <footer class="nv-footer">
        <p class="footer-text">&copy; 2026 NEVERA SPORTS | BORN UNDER PRESSURE</p>
    </footer>

    <script>
        function switchTab(event, tabId) {
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(c => c.classList.remove('active'));
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
