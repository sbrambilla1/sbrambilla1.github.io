<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>LOGIN | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="images/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --white: #FDFDFD;
            --font-title: 'Archivo Black', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        html, body {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--dark);
            color: var(--white);
            font-family: var(--font-body);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(4, 4, 4, 0.75), rgba(4, 4, 4, 0.95)), url('images/image_c3c605.jpg');
            background-size: cover; background-position: center; z-index: 0;
        }

        .auth-wrapper {
            position: relative; z-index: 10;
            min-height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 40px 20px;
        }

        .logo-login {
            height: 90px; margin-bottom: 30px;
            transition: transform 0.4s ease;
        }
        .logo-login:hover { transform: scale(1.05); filter: drop-shadow(0 0 15px var(--neon)); }

        .auth-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 40px;
            max-width: 450px; width: 100%;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: left;
        }

        .auth-box h2 {
            font-family: var(--font-title);
            font-size: 1.8rem; text-transform: uppercase;
            letter-spacing: -1px; margin-bottom: 5px;
        }

        .auth-box .subtitle {
            font-size: 0.8rem; opacity: 0.5;
            margin-bottom: 30px; text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group { margin-bottom: 20px; }
        
        .form-group label {
            font-size: 0.75rem; font-weight: 600; opacity: 0.6;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 8px; display: block;
        }

        .form-group input, .form-group select {
            background: var(--dark) !important;
            border: 1px solid rgba(255, 255, 255, 0.12) !important;
            color: white !important;
            padding: 14px 18px; border-radius: 14px;
            width: 100%; outline: none; font-size: 0.95rem;
            transition: 0.3s ease;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(63, 240, 0, 0.1); }

        /* Nascondi i campi extra all'inizio */
        .register-only { display: none; }

        .btn-auth {
            background: var(--neon); color: var(--dark);
            font-family: var(--font-title); font-size: 0.85rem;
            text-transform: uppercase; letter-spacing: 1px;
            padding: 15px; border-radius: 50px; border: none;
            width: 100%; font-weight: bold; margin-top: 15px;
            transition: 0.3s; cursor: pointer;
        }
        .btn-auth:hover { transform: scale(1.02); background: #35cc00; box-shadow: 0 0 20px rgba(63, 240, 0, 0.3); }

        .switch-mode {
            text-align: center; margin-top: 25px;
            font-size: 0.85rem; color: rgba(255, 255, 255, 0.5);
        }
        .switch-mode a { color: var(--neon); text-decoration: none; font-weight: 600; cursor: pointer; }
        .switch-mode a:hover { text-underline-position: under; text-decoration: underline; }
        
        .msg-info {
            padding: 12px; border-radius: 12px; font-size: 0.85rem;
            margin-bottom: 20px; display: none; text-align: center;
        }
        .msg-error { background: rgba(255, 68, 68, 0.1); border: 1px solid rgba(255, 68, 68, 0.3); color: #FF6666; }
        .msg-success { background: rgba(63, 240, 0, 0.1); border: 1px solid rgba(63, 240, 0, 0.3); color: var(--neon); }
    </style>
</head>
<body>

    <div id="bg"></div>

    <div class="auth-wrapper">
        <a href="index.html"><img src="images/logo.png" class="logo-login" alt="Nevera Logo"></a>
        
        <div class="auth-box">
            <div id="statusMsg" class="msg-info"></div>

            <h2 id="authTitle">ACCEDI</h2>
            <p id="authSubtitle" class="subtitle">Inserisci le tue credenziali</p>

            <form id="authForm" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label>Indirizzo Email</label>
                    <input type="email" id="email" placeholder="es. giocatore@nevera.it" required>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <div class="form-group register-only">
                    <label>Numero di Telefono</label>
                    <input type="tel" id="phone" placeholder="es. 3331234567">
                </div>

                <div class="form-group register-only">
                    <label>Dove giochi di solito? (Provincia)</label>
                    <select id="province">
                        <option value="" disabled selected>Seleziona Provincia</option>
                        <option value="BG">Bergamo</option>
                        <option value="BS">Brescia</option>
                        <option value="CO">Como</option>
                        <option value="LC">Lecco</option>
                        <option value="MB">Monza e Brianza</option>
                        <option value="MI">Milano</option>
                        <option value="VA">Varese</option>
                        </select>
                </div>

                <button type="submit" id="submitBtn" class="btn-auth">ENTRA</button>
            </form>

            <div class="switch-mode">
                <span id="switchText">Non hai un account?</span> 
                <a id="switchLink" onclick="toggleMode()">Registrati ora</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://ennpbtrthwdxsvdbqbmn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVubnBidHJ0aHdkeHN2ZGJxYm1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNjU0NzUsImV4cCI6MjA5NDY0MTQ3NX0.JL-w7qkp6bktVJMrJ7O0Uw1phxaBpBc9BiP3cH8Q4-0";
        const dbClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

        let isLoginMode = true;

        function showMessage(text, isError = true) {
            const msgBox = document.getElementById("statusMsg");
            msgBox.innerText = text;
            msgBox.className = "msg-info " + (isError ? "msg-error" : "msg-success");
            msgBox.style.display = "block";
        }

        function toggleMode() {
            isLoginMode = !isLoginMode;
            const title = document.getElementById("authTitle");
            const subtitle = document.getElementById("authSubtitle");
            const submitBtn = document.getElementById("submitBtn");
            const switchText = document.getElementById("switchText");
            const switchLink = document.getElementById("switchLink");
            const msgBox = document.getElementById("statusMsg");
            const extraFields = document.querySelectorAll(".register-only");

            msgBox.style.display = "none";

            if (isLoginMode) {
                title.innerText = "ACCEDI";
                subtitle.innerText = "Inserisci le tue credenziali";
                submitBtn.innerText = "ENTRA";
                switchText.innerText = "Non hai un account?";
                switchLink.innerText = "Registrati ora";
                extraFields.forEach(f => f.style.display = "none");
                document.getElementById("phone").removeAttribute("required");
                document.getElementById("province").removeAttribute("required");
            } else {
                title.innerText = "REGISTRATI";
                subtitle.innerText = "Crea il tuo profilo Nevera Sports";
                submitBtn.innerText = "CREA ACCOUNT";
                switchText.innerText = "Hai già un account?";
                switchLink.innerText = "Accedi qui";
                extraFields.forEach(f => f.style.display = "block");
                document.getElementById("phone").setAttribute("required", "required");
                document.getElementById("province").setAttribute("required", "required");
            }
        }

        async function handleAuth(event) {
            event.preventDefault();
            if (!dbClient) return;

            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const msgBox = document.getElementById("statusMsg");
            msgBox.style.display = "none";

            if (isLoginMode) {
                const { data, error } = await dbClient.auth.signInWithPassword({ email, password });
                if (error) {
                    showMessage("Errore: " + error.message, true);
                } else {
                    window.location.href = "radar.html";
                }
            } else {
                const phone = document.getElementById("phone").value;
                const province = document.getElementById("province").value;

                // Registrazione con salvataggio dei metadati (Telefono e Provincia)
                const { data, error } = await dbClient.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            phone: phone,
                            province: province
                        }
                    }
                });
                
                if (error) {
                    showMessage("Errore di registrazione: " + error.message, true);
                } else {
                    if (data.user && data.session === null) {
                        showMessage("Registrazione effettuata! Ti abbiamo inviato un'email di conferma. Controlla la tua casella postale prima di accedere.", false);
                        document.getElementById("email").value = "";
                        document.getElementById("password").value = "";
                        document.getElementById("phone").value = "";
                        document.getElementById("province").value = "";
                        toggleMode();
                    } else {
                        window.location.href = "radar.html";
                    }
                }
            }
        }

        window.onload = async function() {
            if (dbClient) {
                const { data: { session } } = await dbClient.auth.getSession();
                if (session) { window.location.href = "radar.html"; }
            }
        }
    </script>
</body>
</html>
