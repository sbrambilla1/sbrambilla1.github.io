<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>EVENTI - NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">

    <style>
        /* RESET TOTALE */
        html, body {
            height: 100%;
            background-color: #000 !important;
            margin: 0;
            overflow: hidden; 
        }

        /* NAVBAR */
        .navbar {
            background: transparent !important;
            z-index: 1000;
            padding: 20px 0;
        }

        .main-logo {
            height: 45px;
            cursor: pointer;
        }

        /* WRAPPER DI CENTRATURA */
        .wrapper-centrato {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            padding: 20px;
        }

        /* --- LA CORNICE VERTICALE FORZATA --- */
        .event-poster-box {
            display: block;
            /* Qui decidiamo le proporzioni verticali (es. 2:3) */
            width: 380px;         /* Larghezza fissa su Desktop */
            height: 570px;        /* Altezza fissa su Desktop */
            
            max-width: 85vw;      /* Su mobile non supera l'85% della larghezza */
            max-height: 70vh;     /* Su mobile non supera il 70% dell'altezza */
            
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(170, 240, 209, 0.2);
            border: 2px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
            position: relative;
        }

        .event-poster-box:hover {
            transform: scale(1.02);
            border-color: #AAF0D1;
        }

        /* L'IMMAGINE DENTRO LA CORNICE */
        .event-poster-box img {
            width: 100%;
            height: 100%;
            /* FONDAMENTALE: Taglia i lati dell'immagine originale 
               per farla diventare verticale senza schiacciarla */
            object-fit: cover; 
            object-position: center; 
        }

        /* MENU OVERLAY */
        .full-screen-overlay {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            background-color: #000;
            transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay-content a {
            font-size: 2.8rem;
            color: #fff;
            text-decoration: none;
            font-weight: 800;
            margin: 15px 0;
            display: block;
            text-align: center;
        }

        .closebtn {
            position: absolute;
            top: 30px;
            right: 45px;
            font-size: 60px;
            color: #fff;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            /* Su mobile rendiamo la cornice un po' più flessibile ma sempre verticale */
            .event-poster-box {
                width: 300px;
                height: 450px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar fixed-top">
        <div class="container justify-content-center">
            <a href="javascript:void(0)" onclick="openNav()">
                <img src="images/logo.png" alt="Nevera Logo" class="main-logo">
            </a>
        </div>
    </nav>

    <div id="myNav" class="full-screen-overlay">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div class="overlay-content">
            <a href="index.html" onclick="closeNav()">HOME</a>
            <a href="eventi.html" onclick="closeNav()">EVENTI</a>
            <a href="sponsor.html" onclick="closeNav()">SPONSOR</a>
            <a href="community.html" onclick="closeNav()">COMMUNITY</a>
            <a href="iniziative.html" onclick="closeNav()">INIZIATIVE</a>
        </div>
    </div>

    <div class="wrapper-centrato">
        <a href="vpl.html" class="event-poster-box">
            <img src="images/vplcs.png" alt="VOLT PADEL LEAGUE">
        </a>
    </div>

    <script>
        function openNav() { document.getElementById("myNav").style.width = "100%"; }
        function closeNav() { document.getElementById("myNav").style.width = "0%"; }
    </script>

</body>
</html>
