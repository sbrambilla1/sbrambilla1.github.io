<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>EVENTI | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --white: #FDFDFD;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            text-align: center;
        }

        /* Sfondo Originale */
        #bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('images/image_c3c605.jpg');
            background-size: cover; background-position: center; z-index: -1;
        }

        /* Header & Logo */
        header { padding: 50px 0; }
        .logo { height: 80px; cursor: pointer; transition: 0.3s; }
        .logo:hover { filter: drop-shadow(0 0 15px var(--neon)); transform: scale(1.05); }

        /* Menu Overlay */
        .overlay {
            height: 100%; width: 0; position: fixed; z-index: 999;
            top: 0; left: 0; background-color: var(--dark); 
            overflow: hidden; transition: 0.5s; 
        }
        .overlay-content { position: relative; top: 25%; width: 100%; text-align: center; }
        .overlay a { 
            font-family: 'Archivo Black', sans-serif; padding: 15px; text-decoration: none; 
            font-size: 30px; color: white; display: block; transition: 0.3s; text-transform: uppercase;
        }
        .overlay a:hover { color: var(--neon); }
        .closebtn { position: absolute; top: 20px; right: 45px; font-size: 60px; color: var(--neon); text-decoration: none; }

        /* Titoli Sezione */
        h1 { 
            font-family: 'Archivo Black', sans-serif; 
            font-size: 50px; 
            margin: 20px 0 5px 0; 
            text-transform: uppercase; 
        }
        .sub { 
            color: var(--neon); 
            font-weight: bold; 
            letter-spacing: 5px; 
            margin-bottom: 60px; 
            text-transform: uppercase; 
            font-size: 14px;
        }

        /* Griglia Eventi Originale */
        .event-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 100px 20px;
        }

        .event-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: left;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .event-card:hover {
            border-color: var(--neon);
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(10px);
        }

        .event-info h3 {
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.2rem;
            margin: 0 0 5px 0;
            text-transform: uppercase;
        }

        .event-info p {
            margin: 0;
            font-size: 0.9rem;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .event-status {
            font-family: 'Archivo Black', sans-serif;
            font-size: 0.8rem;
            padding: 10px 20px;
            border-radius: 10px;
            background: var(--neon);
            color: var(--dark);
            text-transform: uppercase;
            text-decoration: none;
            transition: 0.3s;
        }

        .event-status:hover {
            background: var(--white);
            color: var(--dark);
        }

        /* Footer */
        footer {
            padding: 60px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0,0,0,0.2);
        }
        .copy { opacity: 0.2; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }

        @media (max-width: 768px) {
            .event-card { flex-direction: column; text-align: center; gap: 20px; }
            h1 { font-size: 35px; }
        }
    </style>
</head>
<body>

    <div id="bg"></div>

    <header>
        <img src="images/logo.png" class="logo" onclick="openNav()" alt="Nevera Logo">
    </header>

    <div id="myNav" class="overlay">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div class="overlay-content">
            <a href="index.html">HOME</a>
            <a href="eventi.html">EVENTI</a>
            <a href="community.html">COMMUNITY</a>
            <a href="sponsor.html">SPONSOR</a>
            <a href="iniziative.html">INIZIATIVE</a>
        </div>
    </div>

    <h1>EVENTI</h1>
    <div class="sub">Next Tournaments</div>

    <div class="event-container">
        
        <div class="event-card">
            <div class="event-info">
                <h3>Nevera Padel Cup</h3>
                <p>24 Aprile 2026 • City Padel Milano</p>
            </div>
            <a href="#" class="event-status">Iscriviti</a>
        </div>

        <div class="event-card">
            <div class="event-info">
                <h3>Open Day Tennis</h3>
                <p>15 Maggio 2026 • Nevera Hub</p>
            </div>
            <a href="#" class="event-status">Dettagli</a>
        </div>

        <div class="event-card">
            <div class="event-info">
                <h3>Summer Slam 2026</h3>
                <p>Giugno 2026 • Coming Soon</p>
            </div>
            <span style="opacity: 0.4; font-family: 'Archivo Black'; font-size: 0.8rem;">COMING SOON</span>
        </div>

    </div>

    <footer>
        <div class="copy">© 2026 NEVERA SPORTS | BORN UNDER PRESSURE</div>
    </footer>

    <script>
        function openNav() { document.getElementById("myNav").style.width = "100%"; }
        function closeNav() { document.getElementById("myNav").style.width = "0"; }
    </script>

</body>
</html>
