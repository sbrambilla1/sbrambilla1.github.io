<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>EVENTI | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="images/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* STILI SPECIFICI PER LA CARD LOCANDINA */
        .event-main-container {
            margin: 0 auto;
            max-width: 550px;
            padding: 20px;
        }

        .card-interactive {
            position: relative;
            width: 100%;
            border-radius: 40px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: var(--dark);
            transition: var(--transition-smooth);
        }

        .locandina-img {
            width: 100%;
            display: block;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card-overlay-actions {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.4s;
            backdrop-filter: blur(8px);
            padding: 20px;
        }

        .card-interactive:hover .card-overlay-actions { opacity: 1; }
        .card-interactive:hover .locandina-img { transform: scale(1.08); }

        /* Bottoni custom per la card */
        .btn-card {
            width: 85%;
            margin: 10px 0;
            text-align: center;
        }

        @media (max-width: 768px) {
            .card-overlay-actions { 
                opacity: 1; 
                background: rgba(0, 0, 0, 0.6); 
                position: relative; 
                backdrop-filter: none;
            }
            .card-interactive { border-radius: 30px; }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="bg-overlay"></div>

    <header class="nav-fix">
        <img src="images/logo.png" alt="Nevera Logo" class="logo-trigger" onclick="openM()">
    </header>

    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" class="nv-close" onclick="closeM()">&times;</a>
        <div class="nv-links">
            <a href="index.html" onclick="closeM()">HOME</a>
            <a href="eventi.html" onclick="closeM()">EVENTI</a>
            <a href="community.html" onclick="closeM()">COMMUNITY</a>
            <a href="sponsor.html" onclick="closeM()">PARTNERS</a>
            <a href="iniziative.html" onclick="closeM()">INIZIATIVE</a>
        </div>
    </div>

    <main class="main-wrapper container">
        <h1 class="nv-title">EVENTI</h1>
        <p class="nv-subtitle">Born Under Pressure</p>

        <div class="event-main-container">
            <div class="card-interactive">
                <img src="images/vplopen.png" class="locandina-img" alt="Volt Padel League">
                
                <div class="card-overlay-actions">
                    <a href="https://app.playtomic.io/tournaments/7530c9eb-ab87-4b04-9d3e-98edf3b00080?utm_source=manager" target="_blank" class="btn-revolution btn-card">
                     Iscriviti
                    </a>
                    <a href="vpl.html" class="btn-revolution btn-card" style="background: transparent; border: 2px solid white; color: white;">
                    Ranking & Regolamento
                    </a>
                </div>
            </div>
        </div>

        <div class="join-section">
            <h2 style="font-family: var(--font-title);">DON'T MISS OUT!</h2>
            <p>Resta aggiornato sui tornei e le clinic ufficiali Nevera.</p>
            <a href="https://chat.whatsapp.com/GItl3C5mrgxJxXAPhHHRFh" class="btn-revolution">
                Entra nel Club
            </a>
        </div>
    </main>

    <footer class="nv-footer">
                <div class="row">
                <div class="col-12 text-center">
                    <p class="copy-text">© 2026 NEVERA SPORTS | BORN UNDER PRESSURE</p>
                </div>
            </div>
      
    </footer>

    <script>
        lucide.createIcons();
        function openM() { document.getElementById("m").style.width = "100%"; }
        function closeM() { document.getElementById("m").style.width = "0"; }
    </script>

</body>
</html>
