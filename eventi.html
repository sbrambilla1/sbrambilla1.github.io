<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>EVENTI | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --white: #FDFDFD;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            text-align: center;
        }

        /* Sfondo Originale */
        #bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)), url('images/image_c3c605.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Header e Logo (Menu Trigger) */
        #header { padding: 50px 0; }
        .logo { height: 80px; cursor: pointer; transition: 0.3s; }
        .logo:hover { filter: drop-shadow(0 0 15px var(--neon)); }

        /* Menu Overlay Originale */
        .overlay {
            height: 100%; width: 0; position: fixed; z-index: 999;
            top: 0; left: 0; background-color: var(--dark); 
            overflow-x: hidden; transition: 0.5s; 
        }
        .overlay-content { position: relative; top: 25%; width: 100%; text-align: center; }
        .overlay a { 
            font-family: 'Archivo Black', sans-serif; padding: 15px; text-decoration: none; 
            font-size: 30px; color: white; display: block; transition: 0.3s; text-transform: uppercase;
        }
        .overlay a:hover { color: var(--neon); }
        .closebtn { position: absolute; top: 20px; right: 45px; font-size: 60px; color: var(--neon); text-decoration: none; }

        /* Titoli Originali */
        h1 { 
            font-family: 'Archivo Black', sans-serif; 
            font-size: 50px; 
            margin: 20px 0 5px 0; 
            text-transform: uppercase; 
        }
        .sub { 
            color: var(--neon); 
            font-weight: bold; 
            letter-spacing: 5px; 
            margin-bottom: 40px; 
            text-transform: uppercase; 
            font-size: 14px;
        }

        /* Contenitore Locandina Identico a Ieri */
        .container {
            max-width: 650px;
            margin: 0 auto;
            padding: 0 20px 100px 20px;
        }

        .locandina {
            width: 100%;
            border-radius: 30px; /* Smussatura originale */
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s;
            cursor: pointer;
        }

        .locandina:hover {
            border-color: var(--neon);
            transform: scale(1.01);
            box-shadow: 0 0 20px rgba(63, 240, 0, 0.2);
        }

        /* Footer Semplice Originale */
        footer {
            padding: 50px 0;
        }
        .copy { opacity: 0.2; font-size: 10px; letter-spacing: 3px; }

        @media (max-width: 768px) {
            h1 { font-size: 35px; }
            .container { max-width: 90%; }
        }
    </style>
</head>
<body>

    <div id="bg"></div>

    <div id="header">
        <img src="images/logo.png" class="logo" onclick="openNav()">
    </div>

    <div id="myNav" class="overlay">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div class="overlay-content">
            <a href="index.html">HOME</a>
            <a href="eventi.html">EVENTI</a>
            <a href="community.html">COMMUNITY</a>
            <a href="sponsor.html">SPONSOR</a>
            <a href="iniziative.html">INIZIATIVE</a>
        </div>
    </div>

    <h1>EVENTI</h1>
    <div class="sub">Volt Padel League</div>

    <div class="container">
        <a href="https://tuolink-volt.it">
            <img src="images/locandina_volt.jpg" class="locandina">
        </a>
    </div>

    <footer>
        <div class="copy">© 2026 NEVERA SPORTS | BORN UNDER PRESSURE</div>
    </footer>

    <script>
        function openNav() { document.getElementById("myNav").style.width = "100%"; }
        function closeNav() { document.getElementById("myNav").style.width = "0"; }
    </script>

</body>
</html>
