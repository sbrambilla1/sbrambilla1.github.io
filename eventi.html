<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>EVENTI - NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/main.css">

    <style>
        /* FORZIAMO LA VISIBILITÀ - Questo sovrascrive eventuali errori nel main.css */
        html, body {
            background-color: #000 !important;
            margin: 0 !important;
            padding: 0 !important;
            height: 100% !important;
            display: block !important; /* Forza l'apparizione del body */
            opacity: 1 !important;
            visibility: visible !important;
        }

        /* NAVBAR */
        .navbar {
            background: transparent !important;
            z-index: 1000 !important;
            display: flex !important;
            visibility: visible !important;
        }

        .main-logo {
            height: 50px !important;
            width: auto !important;
            cursor: pointer;
        }

        /* WRAPPER CENTRATO */
        .wrapper-centrato {
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            min-height: 100vh !important;
            width: 100% !important;
            visibility: visible !important;
            position: relative !important;
            z-index: 10 !important;
        }

        .event-poster-box {
            display: block !important;
            max-width: 900px;
            width: 90%;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .event-poster-box img {
            width: 100% !important;
            height: auto !important;
            display: block !important;
        }

        /* OVERLAY MENU - Deve stare a larghezza 0 finché non clicchi */
        .full-screen-overlay {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 9999 !important;
            top: 0;
            left: 0;
            background-color: #000 !important;
            overflow-x: hidden;
            transition: 0.5s;
            display: flex !important;
            align-items: center;
            justify-content: center;
        }

        .overlay-content a {
            font-size: 2.5rem;
            color: white;
            text-decoration: none;
            display: block;
            margin: 20px;
            font-weight: bold;
        }

        .closebtn {
            position: absolute;
            top: 20px;
            right: 45px;
            font-size: 60px;
            color: white;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <nav class="navbar fixed-top">
        <div class="container justify-content-center">
            <a href="javascript:void(0)" onclick="openNav()">
                <img src="images/logo.png" alt="Nevera Logo" class="main-logo">
            </a>
        </div>
    </nav>

    <div id="myNav" class="full-screen-overlay">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div class="overlay-content text-center">
            <a href="index.html">HOME</a>
            <a href="eventi.html">EVENTI</a>
            <a href="sponsor.html">SPONSOR</a>
            <a href="community.html">COMMUNITY</a>
            <a href="iniziative.html">INIZIATIVE</a>
        </div>
    </div>

    <div class="wrapper-centrato">
        <a href="vpl.html" class="event-poster-box">
            <img src="images/vplcs.png" alt="VOLT PADEL LEAGUE">
        </a>
    </div>

    <script>
        function openNav() {
            document.getElementById("myNav").style.width = "100%";
        }
        function closeNav() {
            document.getElementById("myNav").style.width = "0%";
        }
    </script>
</body>
</html>
