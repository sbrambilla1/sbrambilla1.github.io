<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>EVENTI - NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">

    <style>
        /* Sfondo e struttura base */
        body, html {
            height: 100%;
            background-color: #000;
            margin: 0;
            overflow-x: hidden;
        }

        /* Navbar */
        .navbar {
            background: transparent !important;
            padding: 20px 0;
            z-index: 1000;
        }

        .main-logo {
            height: 45px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .main-logo:hover { transform: scale(1.1); }

        /* Overlay Menu */
        .full-screen-overlay {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            background-color: #000;
            overflow: hidden;
            transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay-content a {
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            display: block;
            margin: 15px 0;
        }

        .closebtn {
            position: absolute;
            top: 30px;
            right: 45px;
            font-size: 60px;
            color: #fff;
            text-decoration: none;
        }

        /* --- CENTRATURA PERFETTA DEL BANNER --- */
        .wrapper-centrato {
            min-height: 100vh; /* Occupa tutta l'altezza dello schermo */
            display: flex;
            align-items: center; /* Centra verticalmente */
            justify-content: center; /* Centra orizzontalmente */
            padding: 80px 20px; /* Spazio di sicurezza per navbar e footer */
        }

        .event-poster-box {
            position: relative;
            display: block;
            max-width: 1000px; /* Larghezza massima del banner */
            width: 100%;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(170, 240, 209, 0.1); /* Leggero bagliore color menta */
            transition: transform 0.4s ease, box-shadow 0.4s ease;
        }

        .event-poster-box:hover {
            transform: scale(1.02);
            box-shadow: 0 0 80px rgba(170, 240, 209, 0.2);
        }

        .event-poster-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Footer in basso */
        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
        }

        @media (max-width: 768px) {
            .overlay-content a { font-size: 2rem; }
            .wrapper-centrato { padding: 100px 15px; }
        }
    </style>
</head>
<body>

    <nav class="navbar fixed-top">
        <div class="container justify-content-center">
            <a class="navbar-brand" href="javascript:void(0)" onclick="openNav()">
                <img src="images/logo.png" alt="Nevera Logo" class="main-logo">
            </a>
        </div>
    </nav>

    <div id="myNav" class="full-screen-overlay">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div class="overlay-content text-center">
            <a href="index.html" onclick="closeNav()">HOME</a>
            <a href="eventi.html" onclick="closeNav()">EVENTI</a>
            <a href="sponsor.html" onclick="closeNav()">SPONSOR</a>
            <a href="community.html" onclick="closeNav()">COMMUNITY</a>
            <a href="iniziative.html" onclick="closeNav()">INIZIATIVE</a>
        </div>
    </div>

    <div class="wrapper-centrato">
        <a href="vpl.html" class="event-poster-box">
            <img src="images/vplcs.png" alt="VOLT PADEL LEAGUE">
        </a>
    </div>

    <footer class="text-center">
        <p class="mb-0 text-secondary" style="font-size: 0.7rem; letter-spacing: 3px; opacity: 0.5;">
            &copy; 2026 NEVERA SPORTS
        </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function openNav() { document.getElementById("myNav").style.width = "100%"; }
        function closeNav() { document.getElementById("myNav").style.width = "0%"; }
    </script>

</body>
</html>
