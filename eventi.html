<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>EVENTI | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --white: #FDFDFD;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            text-align: center;
        }

        /* Sfondo Originale */
        #bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('images/image_c3c605.jpg');
            background-size: cover; background-position: center; z-index: -1;
        }

        /* Header & Logo interattivo */
        header { padding: 50px 0; }
        .logo { height: 80px; cursor: pointer; transition: 0.3s; }
        .logo:hover { filter: drop-shadow(0 0 15px var(--neon)); transform: scale(1.05); }

        /* Menu Overlay Originale */
        .overlay {
            height: 100%; width: 0; position: fixed; z-index: 999;
            top: 0; left: 0; background-color: var(--dark); 
            overflow: hidden; transition: 0.5s; 
        }
        .overlay-content { position: relative; top: 25%; width: 100%; text-align: center; }
        .overlay a { 
            font-family: 'Archivo Black', sans-serif; padding: 15px; text-decoration: none; 
            font-size: 30px; color: white; display: block; transition: 0.3s; text-transform: uppercase;
        }
        .overlay a:hover { color: var(--neon); }
        .closebtn { position: absolute; top: 20px; right: 45px; font-size: 60px; color: var(--neon); text-decoration: none; }

        /* Titoli */
        h1 { 
            font-family: 'Archivo Black', sans-serif; 
            font-size: 45px; 
            margin: 20px 0 5px 0; 
            text-transform: uppercase; 
        }
        .sub { 
            color: var(--neon); 
            font-weight: bold; 
            letter-spacing: 5px; 
            margin-bottom: 40px; 
            text-transform: uppercase; 
            font-size: 14px;
        }

        /* LA LOCANDINA (Struttura Originale) */
        .poster-container {
            position: relative;
            z-index: 10;
            max-width: 600px;
            margin: 0 auto 100px auto;
            padding: 0 20px;
        }

        .event-poster {
            width: 100%;
            border-radius: 25px; /* Smussatura coerente con la community */
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 50px rgba(0,0,0,0.6);
            transition: 0.4s ease;
            cursor: pointer;
        }

        .event-poster:hover {
            transform: scale(1.02);
            border-color: var(--neon);
            box-shadow: 0 0 30px rgba(63, 240, 0, 0.2);
        }

        /* Footer Sobrio */
        footer {
            padding: 60px 0;
            background: rgba(0,0,0,0.4);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .copy { opacity: 0.2; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; }

        @media (max-width: 768px) {
            h1 { font-size: 32px; }
            .poster-container { max-width: 95%; }
        }
    </style>
</head>
<body>

    <div id="bg"></div>

    <header>
        <img src="images/logo.png" class="logo" onclick="openNav()" alt="Nevera Logo">
    </header>

    <div id="myNav" class="overlay">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div class="overlay-content">
            <a href="index.html">HOME</a>
            <a href="eventi.html">EVENTI</a>
            <a href="community.html">COMMUNITY</a>
            <a href="sponsor.html">SPONSOR</a>
            <a href="iniziative.html">INIZIATIVE</a>
        </div>
    </div>

    <h1>EVENTI</h1>
    <div class="sub">Volt Padel League</div>

    <div class="poster-container">
        <a href="https://tuolink-volt-league.it">
            <img src="images/locandina_volt.jpg" class="event-poster" alt="Volt Padel League">
        </a>
        <p style="margin-top: 30px; font-weight: 700; font-size: 12px; letter-spacing: 2px; opacity: 0.5; text-transform: uppercase;">
            Clicca sulla locandina per scoprire i dettagli e iscriverti
        </p>
    </div>

    <footer>
        <div class="copy">© 2026 NEVERA SPORTS | BORN UNDER PRESSURE</div>
    </footer>

    <script>
        function openNav() { document.getElementById("myNav").style.width = "100%"; }
        function closeNav() { document.getElementById("myNav").style.width = "0"; }
    </script>

</body>
</html>
