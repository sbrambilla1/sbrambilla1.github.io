<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>EVENTI - NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">

    <style>
        /* RESET TOTALE */
        html, body {
            height: 100%;
            background-color: #000 !important;
            margin: 0;
            overflow: hidden; /* Blocca lo scroll per centrare tutto */
        }

        /* NAVBAR */
        .navbar {
            background: transparent !important;
            z-index: 1000;
            padding: 20px 0;
        }

        .main-logo {
            height: 45px;
            cursor: pointer;
        }

        /* CENTRATURA DEL POSTER */
        .wrapper-centrato {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100%;
            padding: 20px;
        }

        /* IL TRUCCO PER IL POSTER VERTICALE */
        .event-poster-box {
            display: block;
            /* Definiamo noi la forma verticale */
            width: 400px;         /* Larghezza stretta */
            height: 600px;        /* Altezza lunga */
            max-width: 90vw;      /* Non esce dallo schermo su mobile */
            max-height: 70vh;     /* Non esce dallo schermo in altezza */
            
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(170, 240, 209, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease;
        }

        .event-poster-box:hover {
            transform: scale(1.03);
        }

        .event-poster-box img {
            width: 100%;
            height: 100%;
            /* FONDAMENTALE: Taglia i lati dell'immagine se è orizzontale 
               per farla stare nel rettangolo verticale senza deformarsi */
            object-fit: cover; 
            object-position: center;
        }

        /* MENU OVERLAY */
        .full-screen-overlay {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            background-color: #000;
            transition: 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay-content a {
            font-size: 3rem;
            color: #fff;
            text-decoration: none;
            font-weight: 800;
            margin: 15px 0;
            display: block;
        }

        .closebtn {
            position: absolute;
            top: 30px;
            right: 45px;
            font-size: 60px;
            color: #fff;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .event-poster-box {
                width: 85%;
                height: 500px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar fixed-top">
        <div class="container justify-content-center">
            <a href="javascript:void(0)" onclick="openNav()">
                <img src="images/logo.png" alt="Nevera Logo" class="main-logo">
            </a>
        </div>
    </nav>

    <div id="myNav" class="full-screen-overlay">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div class="overlay-content text-center">
            <a href="index.html" onclick="closeNav()">HOME</a>
            <a href="eventi.html" onclick="closeNav()">EVENTI</a>
            <a href="sponsor.html" onclick="closeNav()">SPONSOR</a>
            <a href="community.html" onclick="closeNav()">COMMUNITY</a>
            <a href="iniziative.html" onclick="closeNav()">INIZIATIVE</a>
        </div>
    </div>

    <div class="wrapper-centrato">
        <a href="vpl.html" class="event-poster-box">
            <img src="images/vplcs.png" alt="VOLT PADEL LEAGUE">
        </a>
    </div>

    <script>
        function openNav() { document.getElementById("myNav").style.width = "100%"; }
        function closeNav() { document.getElementById("myNav").style.width = "0%"; }
    </script>

</body>
</html>
