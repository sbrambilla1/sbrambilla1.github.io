<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>EVENTI | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="images/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --white: #FDFDFD;
            --font-title: 'Archivo Black', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        html, body {
            margin: 0; padding: 0;
            background-color: var(--dark);
            color: var(--white);
            font-family: var(--font-body);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* SFONDO E OVERLAY */
        #bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(4, 4, 4, 0.6), rgba(4, 4, 4, 0.9)), url('images/image_c3c605.jpg');
            background-size: cover; background-position: center; z-index: 0;
        }

        /* HEADER */
        header { position: relative; padding: 60px 0 40px 0; text-align: center; z-index: 100; }
        .logo-trigger { 
            height: 85px; cursor: pointer; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .logo-trigger:hover { transform: scale(1.1); filter: drop-shadow(0 0 15px var(--neon)); }

        /* MENU OVERLAY */
        .nv-menu {
            height: 100%; width: 0; position: fixed; z-index: 9999;
            top: 0; left: 0; background-color: rgba(4, 4, 4, 0.98); 
            overflow: hidden; transition: 0.5s; 
            display: flex; align-items: center; justify-content: center;
        }
        .nv-links a { 
            font-family: var(--font-title); font-size: 2.5rem; color: var(--white); 
            text-decoration: none; display: block; margin: 20px; text-transform: uppercase; 
        }
        .nv-links a:hover { color: var(--neon); transform: scale(1.05); }
        .nv-close { position: absolute; top: 30px; right: 45px; font-size: 50px; color: var(--neon); text-decoration: none; }

        /* MAIN CONTENT */
        .main-wrapper { position: relative; z-index: 10; padding: 40px 20px 80px 20px; text-align: center; }
        
        .nv-title { font-family: var(--font-title); font-size: clamp(2.5rem, 8vw, 4.5rem); text-transform: uppercase; letter-spacing: -2px; margin: 0; line-height: 1; }
        .nv-subtitle { color: var(--neon); font-weight: 700; text-transform: uppercase; letter-spacing: 12px; margin-bottom: 60px; font-size: 0.75rem; }

        /* CARD EVENTO LUXURY */
        #main { margin: 0 auto; max-width: 600px; }
        
        .card-container {
            position: relative;
            width: 100%;
            border-radius: 35px; /* Arrotondamento coerente */
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
        }

        .locandina {
            width: 100%;
            display: block;
            transition: 0.8s ease;
        }

        /* Overlay con i Bottoni */
        .card-actions {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(4, 4, 4, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.4s;
            backdrop-filter: blur(8px);
            padding: 20px;
        }

        .card-container:hover .card-actions { opacity: 1; }
        .card-container:hover .locandina { transform: scale(1.05); }

        /* Bottoni Evento */
        .btn-ev {
            font-family: var(--font-title);
            text-decoration: none !important;
            padding: 20px 35px;
            border-radius: 50px;
            margin: 12px 0;
            width: 85%;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-neon { background-color: var(--neon); color: var(--dark); border: none; }
        .btn-neon:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(63, 240, 0, 0.4); color: var(--dark); }

        .btn-outline { background-color: transparent; color: white; border: 1px solid rgba(255, 255, 255, 0.3); }
        .btn-outline:hover { border-color: var(--neon); color: var(--neon); }

        /* FOOTER A GRIGLIA (STILE HOME) */
        .nv-footer { 
            position: relative; z-index: 10; padding: 100px 20px 60px; 
            background-color: var(--dark); 
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .footer-container {
            max-width: 1050px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: flex-start;
            flex-wrap: wrap; gap: 50px; text-align: left;
        }
        .footer-brand { flex: 1; min-width: 200px; }
        .footer-logo-mini { height: 75px; opacity: 0.5; margin-bottom: 15px; }
        .footer-nav { display: flex; gap: 60px; }
        .f-col { display: flex; flex-direction: column; gap: 10px; }
        .f-label { font-size: 0.6rem; color: var(--neon); letter-spacing: 2px; font-weight: 800; margin-bottom: 10px; }
        .f-link { font-size: 0.85rem; color: white !important; opacity: 0.3; transition: 0.3s; }
        .f-link:hover { opacity: 1; color: var(--neon) !important; }
        .copyright { margin-top: 80px; opacity: 0.15; font-size: 0.55rem; letter-spacing: 5px; text-align: center; width: 100%; }

        @media (max-width: 768px) {
            .card-actions { 
                position: relative; opacity: 1; 
                background: rgba(255, 255, 255, 0.02); 
                backdrop-filter: none; 
                padding: 30px 15px;
            }
            .footer-container { flex-direction: column; text-align: center; }
            .footer-nav { width: 100%; justify-content: space-around; }
            .footer-brand { width: 100%; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div id="bg"></div>

    <header>
        <img src="images/logo.png" class="logo-trigger" onclick="openM()" alt="Nevera Logo">
    </header>

    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" class="nv-close" onclick="closeM()">&times;</a>
        <div class="nv-links">
            <a href="index.html" onclick="closeM()">HOME</a>
            <a href="eventi.html" onclick="closeM()">EVENTI</a>
            <a href="community.html" onclick="closeM()">COMMUNITY</a>
            <a href="partners.html" onclick="closeM()">PARTNERS</a>
            <a href="iniziative.html" onclick="closeM()">INIZIATIVE</a>
        </div>
    </div>

    <main class="main-wrapper container">
        <h1 class="nv-title">EVENTI</h1>
        <p class="nv-subtitle">Born Under Pressure</p>

        <div id="main">
            <div class="card-container">
                <img src="images/vplopen.png" class="locandina" alt="Volt Padel League">
                
                <div class="card-actions">
                    <a href="https://playtomic.io/tournaments/9441b6be-7c11-4cc1-b4c9-0250de2236a0?utm_campaign=share&utm_source=app_ios" target="_blank" class="btn-ev btn-neon">
                        <i class="fa-solid fa-pen-to-square"></i> Iscriviti ora
                    </a>
                    <a href="vpl.html" class="btn-ev btn-outline">
                        <i class="fa-solid fa-ranking-star"></i> Ranking & Regolamento
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer class="nv-footer">
        <div class="footer-container">
            <div class="footer-brand">
                <img src="images/logo.png" class="footer-logo-mini">
                <p style="font-size:0.6rem; opacity:0.2; letter-spacing:3px; font-weight:700;">PRECISION IN PERFORMANCE.</p>
            </div>
            
            <div class="footer-nav">
                <div class="f-col">
                    <span class="f-label">NAVIGAZIONE</span>
                    <a href="index.html" class="f-link">HOME</a>
                    <a href="eventi.html" class="f-link">EVENTI</a>
                    <a href="community.html" class="f-link">COMMUNITY</a>
                </div>
                <div class="f-col">
                    <span class="f-label">SOCIAL</span>
                    <a href="https://www.instagram.com/neverasports.it/" class="f-link">INSTAGRAM</a>
                    <a href="https://chat.whatsapp.com/GItl3C5mrgxJxXAPhHHRFh" class="f-link">WHATSAPP</a>
                </div>
            </div>
        </div>
        <p class="copyright">© 2026 NEVERA SPORTS | BORN UNDER PRESSURE</p>
    </footer>

    <script>
        function openM() { document.getElementById("m").style.width = "100%"; }
        function closeM() { document.getElementById("m").style.width = "0"; }
    </script>

</body>
</html>
