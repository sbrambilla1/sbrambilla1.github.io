<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>EVENTI - NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">

    <style>
        /* RESET E STRUTTURA */
        html, body {
            height: 100%;
            background-color: #000 !important;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Evita lo scroll se il banner è centrato */
        }

        /* NAVBAR */
        .navbar {
            background: transparent !important;
            z-index: 1000;
        }

        .main-logo {
            height: 45px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* WRAPPER PER CENTRATURA VERTICALE */
        .wrapper-centrato {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Tutta l'altezza dello schermo */
            width: 100%;
            padding: 80px 20px 40px 20px; /* Spazio per navbar e footer */
        }

        /* IL BANNER VERTICALE */
        .event-poster-box {
            display: block;
            height: 100%; /* Si adatta all'altezza del wrapper */
            max-height: 750px; /* Limite massimo per non farlo sgranare su desktop */
            aspect-ratio: 9 / 16; /* Forza il formato verticale */
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(170, 240, 209, 0.15);
            transition: transform 0.4s ease;
        }

        .event-poster-box:hover {
            transform: scale(1.02);
        }

        .event-poster-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Riempie il box senza deformarsi */
            display: block;
        }

        /* MENU OVERLAY */
        .full-screen-overlay {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            background-color: #000;
            overflow-x: hidden;
            transition: 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay-content a {
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            display: block;
            margin: 15px 0;
        }

        .closebtn {
            position: absolute;
            top: 30px;
            right: 45px;
            font-size: 60px;
            color: #fff;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            .event-poster-box {
                width: 85%; /* Su mobile occupa più larghezza */
                height: auto;
                aspect-ratio: 9 / 16;
            }
            .overlay-content a { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <nav class="navbar fixed-top">
        <div class="container justify-content-center">
            <a href="javascript:void(0)" onclick="openNav()">
                <img src="images/logo.png" alt="Nevera Logo" class="main-logo">
            </a>
        </div>
    </nav>

    <div id="myNav" class="full-screen-overlay">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div class="overlay-content text-center">
            <a href="index.html">HOME</a>
            <a href="eventi.html">EVENTI</a>
            <a href="sponsor.html">SPONSOR</a>
            <a href="community.html">COMMUNITY</a>
            <a href="iniziative.html">INIZIATIVE</a>
        </div>
    </div>

    <div class="wrapper-centrato">
        <a href="vpl.html" class="event-poster-box">
            <img src="images/vplcs.png" alt="VOLT PADEL LEAGUE">
        </a>
    </div>

    <script>
        function openNav() {
            document.getElementById("myNav").style.width = "100%";
        }
        function closeNav() {
            document.getElementById("myNav").style.width = "0%";
        }
    </script>

</body>
</html>
