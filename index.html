<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>NEVERA SPORTS | Official Home</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* --- BRAND PALETTE --- */
        :root {
            --neon-green: #3FF000;
            --matte-black: #040404;
            --pure-white: #FDFDFD;
            --font-title: 'Archivo Black', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
        }

        /* --- RESET & BACKGROUND --- */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--matte-black);
            color: var(--pure-white);
            font-family: var(--font-body);
            display: flex;
            flex-direction: column;
        }

        /* Sfondo fisso (Fix iPad) */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('images/image_c3c605.jpg');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        /* --- HEADER --- */
        .nav-fix { position: relative; padding: 40px 0; text-align: center; z-index: 100; }
        .logo-trigger { height: 80px; cursor: pointer; transition: 0.3s; }

        /* --- MENU OVERLAY --- */
        .nv-menu {
            height: 100%; width: 0; position: fixed; z-index: 9999;
            top: 0; left: 0; background-color: var(--matte-black); 
            overflow: hidden; transition: 0.5s; 
            display: flex; align-items: center; justify-content: center;
        }
        .nv-links a { 
            font-family: var(--font-title); font-size: 2.5rem; color: var(--pure-white); 
            text-decoration: none; display: block; margin: 25px; text-transform: uppercase; 
        }
        .nv-links a:hover { color: var(--neon-green); }
        .nv-close { position: absolute; top: 30px; right: 45px; font-size: 50px; color: var(--neon-green); text-decoration: none; }

        /* --- CONTENT --- */
        .main-wrapper {
            position: relative; z-index: 10; flex: 1;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;
        }

        .nv-title { 
            font-family: var(--font-title); font-size: 4rem; text-transform: uppercase; 
            letter-spacing: -2px; margin-bottom: 0; 
        }
        .nv-subtitle { 
            color: var(--neon-green); font-weight: 700; text-transform: uppercase; 
            letter-spacing: 5px; font-size: 1.1rem; margin-bottom: 60px; 
        }

        /* --- BANNER QUADRATI (Centrati) --- */
        .home-card {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 10px; 
            text-decoration: none !important; color: white !important; 
            transition: 0.3s; height: 100%;
        }
        .home-card:hover { 
            background: var(--neon-green); color: var(--matte-black) !important; 
            border-color: var(--neon-green); 
        }
        .home-card i { font-size: 2.5rem; margin-bottom: 20px; color: var(--neon-green); transition: 0.3s; }
        .home-card:hover i { color: var(--matte-black); }
        .home-card h3 { 
            font-family: var(--font-title); font-size: 0.85rem; 
            text-transform: uppercase; letter-spacing: 2px; margin: 0; 
        }

        /* --- FOOTER --- */
        .nv-footer { 
            position: relative; z-index: 10; padding: 50px 20px; text-align: center; 
            border-top: 1px solid rgba(255,255,255,0.1); background: var(--matte-black);
        }
        .contact-link { color: var(--pure-white); text-decoration: none; margin: 0 15px; font-weight: 700; font-size: 0.9rem; }
        .contact-link:hover { color: var(--neon-green); }
        .footer-text { opacity: 0.3; font-size: 0.65rem; letter-spacing: 3px; margin-top: 30px; text-transform: uppercase; }

        @media (max-width: 768px) {
            .nv-title { font-size: 2.5rem; }
            .nv-subtitle { font-size: 0.9rem; letter-spacing: 3px; }
            .home-card { padding: 40px 10px; }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <header class="nav-fix">
        <img src="images/logo.png" alt="Nevera Logo" class="logo-trigger" onclick="openM()">
    </header>

    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" class="nv-close" onclick="closeM()">&times;</a>
        <div class="nv-links">
            <a href="index.html" onclick="closeM()">HOME</a>
            <a href="eventi.html" onclick="closeM()">EVENTI</a>
            <a href="community.html" onclick="closeM()">COMMUNITY</a>
            <a href="sponsor.html" onclick="closeM()">SPONSOR</a>
            <a href="iniziative.html" onclick="closeM()">INIZIATIVE</a>
        </div>
    </div>

    <div class="main-wrapper container">
        <h1 class="nv-title">NEVERA</h1>
        <p class="nv-subtitle">Born Under Pressure</p>

        <div class="row g-4 w-100" style="max-width: 1050px;">
            <div class="col-6 col-md-3">
                <a href="eventi.html" class="home-card">
                    <i class="fa-solid fa-trophy"></i>
                    <h3>Eventi</h3>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="community.html" class="home-card">
                    <i class="fa-solid fa-users"></i>
                    <h3>Community</h3>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="sponsor.html" class="home-card">
                    <i class="fa-solid fa-handshake"></i>
                    <h3>Sponsor</h3>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="iniziative.html" class="home-card">
                    <i class="fa-solid fa-lightbulb"></i>
                    <h3>Iniziative</h3>
                </a>
            </div>
        </div>
    </div>

    <footer class="nv-footer">
        <div class="contact-links">
            <a href="mailto:info@neverasports.it" class="contact-link">EMAIL</a>
            <a href="#" class="contact-link">WHATSAPP</a>
        </div>
        <p class="footer-text">© 2026 NEVERA SPORTS | ALL RIGHTS RESERVED</p>
    </footer>

    <script>
        function openM() { document.getElementById("m").style.width = "100%"; }
        function closeM() { document.getElementById("m").style.width = "0"; }
    </script>

</body>
</html>
