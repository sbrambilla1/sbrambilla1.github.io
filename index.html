<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>NEVERA SPORTS | Official Home</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
   <style>
    /* --- RESET --- */
    html, body {
        margin: 0; padding: 0;
        width: 100%; height: 100%;
        background-color: #000; /* Nero di base se l'immagine sparisce */
        font-family: 'Inter', sans-serif;
        color: #fff;
    }

    /* --- IL FIX: LAYER SFONDO --- */
    .bg-layer {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        /* 1. Controlla che il percorso sia esatto */
        /* 2. Il gradiente deve essere semi-trasparente (0.4 e 0.6) non 1.0 */
        background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('images/homebg.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        z-index: 1; /* Lo mettiamo a 1 */
        transform: translateZ(0);
        -webkit-transform: translateZ(0);
    }

    /* --- TUTTO IL RESTO DEVE AVERE Z-INDEX PIÙ ALTO --- */
    .nav-fix {
        position: fixed;
        top: 0; width: 100%;
        padding: 30px 0; 
        z-index: 100; /* Sopra lo sfondo */
        text-align: center;
        background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    }

    .main-wrapper {
        position: relative; /* Necessario per lo z-index */
        z-index: 10; /* Sopra lo sfondo */
        min-height: 100vh;
        display: flex; flex-direction: column;
        justify-content: center; align-items: center;
        padding: 120px 20px 60px;
        text-align: center;
    }

    /* --- EFFETTO VETRO CARD --- */
    .home-card {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: rgba(255, 255, 255, 0.08); /* Più chiaro per vederlo */
        -webkit-backdrop-filter: blur(15px);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 20px;
        padding: 40px 20px;
        text-decoration: none !important;
        transition: 0.4s ease;
        height: 100%;
    }

    /* --- TITOLI --- */
    .nv-title { font-weight: 900; letter-spacing: 12px; font-size: 4rem; text-transform: uppercase; position: relative; }
    .nv-subtitle { color: #AAF0D1; letter-spacing: 5px; text-transform: uppercase; font-size: 1.1rem; margin-bottom: 50px; position: relative; }

    /* --- MENU OVERLAY --- */
    .nv-menu {
        height: 100%; width: 0; position: fixed; 
        z-index: 9999; /* Il livello più alto di tutti */
        top: 0; left: 0; background-color: rgba(0,0,0,0.95); 
        overflow: hidden; transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); 
        display: flex; align-items: center; justify-content: center;
    }
</style>

</head>
<body>

    <div class="bg-layer"></div>

    <div class="nav-fix">
        <div class="logo-nav-container" onclick="openM()">
            <img src="images/logo.png" alt="Nevera Logo" class="logo-trigger">
        </div>
    </div>

    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" class="nv-close" onclick="closeM()">&times;</a>
        <div class="nv-links">
            <a href="index.html" onclick="closeM()">HOME</a>
            <a href="vpl.html" onclick="closeM()">VOLT LEAGUE</a>
            <a href="community.html" onclick="closeM()">COMMUNITY</a>
            <a href="sponsor.html" onclick="closeM()">SPONSOR</a>
        </div>
    </div>

    <div class="main-wrapper container">
        <h1 class="nv-title">NEVERA</h1>
        <p class="nv-subtitle">Born Under Pressure</p>

        <div class="row g-4 justify-content-center w-100" style="max-width: 1000px;">
            <div class="col-6 col-md-3">
                <a href="vpl.html" class="home-card">
                    <i class="fa-solid fa-trophy"></i>
                    <h3>League</h3>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="community.html" class="home-card">
                    <i class="fa-solid fa-users"></i>
                    <h3>Community</h3>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="sponsor.html" class="home-card">
                    <i class="fa-solid fa-handshake"></i>
                    <h3>Sponsor</h3>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="iniziative.html" class="home-card">
                    <i class="fa-solid fa-lightbulb"></i>
                    <h3>Iniziative</h3>
                </a>
            </div>
        </div>
    </div>

    <footer class="nv-footer">
        <p class="footer-text">&copy; 2026 NEVERA SPORTS | ALL RIGHTS RESERVED</p>
    </footer>

    <script>
        function openM() { document.getElementById("m").style.width = "100%"; }
        function closeM() { document.getElementById("m").style.width = "0"; }
    </script>
</body>
</html>
