<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEVERA SPORTS | Home</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --neon: #3FF000;
            --dark: #000000;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; text-decoration: none !important; }

        body {
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            text-align: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* SFONDO ORIGINALE RIPRISTINATO */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('immagini/solidblack.png') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }

        /* HEADER */
        .nav-fix { padding: 50px 0; }
        .logo-main { height: 65px; width: auto; cursor: pointer; transition: 0.3s; }
        .logo-main:hover { transform: scale(1.05); }

        /* HERO - TITOLO SOLIDO */
        .nv-title { 
            font-family: 'Archivo Black', sans-serif;
            font-size: clamp(3.5rem, 12vw, 7.5rem); 
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: -3px;
            margin-top: 20px;
        }

        .nv-subtitle { 
            font-weight: 700;
            color: var(--neon);
            letter-spacing: 12px;
            text-transform: uppercase; 
            font-size: 0.75rem; 
            margin: 30px 0 80px 0; 
            display: block;
        }

        /* CARD LUXURY CENTRATE */
        .cards-container {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 25px; max-width: 1200px; margin: 0 auto 80px; padding: 0 20px;
        }

        .home-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 40px; /* Ritorniamo alle card morbide del video */
            padding: 60px 25px;
            width: 270px;
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .home-card:hover {
            border-color: var(--neon);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-10px);
        }

        .home-card i {
            font-size: 35px;
            margin-bottom: 25px;
            color: var(--white);
            opacity: 0.4;
            transition: 0.3s;
        }

        .home-card:hover i { opacity: 1; color: var(--neon); }

        .home-card h3 { 
            font-size: 0.75rem; 
            letter-spacing: 4px; 
            font-weight: 800;
            color: white !important;
            opacity: 0.6;
        }

        /* BANNER VOLT LEAGUE RIPRISTINATO */
        .vpl-wrapper { 
            width: 100%; 
            max-width: 1050px; 
            margin: 80px auto 120px; 
            padding: 0 20px;
        }
        .vpl-banner { 
            border-radius: 45px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .vpl-banner img { width: 100%; display: block; }

        /* FOOTER MINI LUXURY */
        .nv-footer {
            padding: 100px 40px 60px;
            border-top: 1px solid rgba(255,255,255,0.05);
            text-align: left;
            background: rgba(0,0,0,0.3);
        }

        .footer-grid {
            max-width: 1100px; margin: 0 auto;
            display: flex; justify-content: space-between; flex-wrap: wrap; gap: 60px;
        }

        .footer-logo-mini {
            height: 25px; /* Logo piccolo ma visibile */
            opacity: 0.5;
            margin-bottom: 20px;
        }

        .f-col { display: flex; flex-direction: column; gap: 15px; }
        .f-label { font-size: 0.6rem; color: var(--neon); letter-spacing: 3px; font-weight: 800; margin-bottom: 10px; }
        .f-link { font-size: 0.85rem; color: white !important; opacity: 0.4; transition: 0.3s; }
        .f-link:hover { opacity: 1; color: var(--neon) !important; }

        .footer-bottom {
            margin-top: 100px; text-align: center;
            font-size: 0.55rem; letter-spacing: 8px; opacity: 0.15;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <header class="nav-fix">
        <img src="immagini/logo-white.png" class="logo-main" alt="Nevera Sports">
    </header>

    <div class="main-content">
        <h1 class="nv-title">NEVERA</h1>
        <span class="nv-subtitle">BORN UNDER PRESSURE</span>

        <div class="cards-container">
            <a href="eventi.html" class="home-card">
                <i class="fas fa-crosshairs"></i>
                <h3>EVENTI</h3>
            </a>
            <a href="community.html" class="home-card">
                <i class="fas fa-circle-nodes"></i>
                <h3>COMMUNITY</h3>
            </a>
            <a href="partners.html" class="home-card">
                <i class="fas fa-microchip"></i>
                <h3>PARTNERS</h3>
            </a>
            <a href="iniziative.html" class="home-card">
                <i class="fas fa-bolt-lightning"></i>
                <h3>INIZIATIVE</h3>
            </a>
        </div>

        <div class="vpl-wrapper">
            <div class="vpl-banner">
                <img src="immagini/volt-league.gif" alt="Volt League">
            </div>
        </div>
    </div>

    <footer class="nv-footer">
        <div class="footer-grid">
            <div class="footer-brand">
                <img src="immagini/logo-white.png" class="footer-logo-mini">
                <p style="font-size: 0.65rem; opacity: 0.2; letter-spacing: 2px;">NETWORK CREATED BY PLAYERS.</p>
            </div>
            
            <div class="f-col">
                <span class="f-label">NAVIGAZIONE</span>
                <a href="index.html" class="f-link">HOME</a>
                <a href="eventi.html" class="f-link">EVENTI</a>
                <a href="community.html" class="f-link">COMMUNITY</a>
            </div>

            <div class="f-col">
                <span class="f-label">SOCIAL</span>
                <a href="#" class="f-link">INSTAGRAM</a>
                <a href="#" class="f-link">DISCORD</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2026 NEVERA SPORTS | ALL RIGHTS RESERVED</p>
        </div>
    </footer>

</body>
</html>
