<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>NEVERA SPORTS | Official Website</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 1. RESET & BASICS --- */
        html, body {
            background-image: url('images/homebg.jpg');
            margin: 0; padding: 0;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif; /* O un sans-serif pulito */
            color: white;
            scroll-behavior: smooth;
        }

        /* --- 2. NAVBAR & LOGO (80px) --- */
        .nav-fix {
            position: fixed;
            top: 0; width: 100%;
            padding: 40px 0; z-index: 5000;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
        }
        .logo-nav-container { display: inline-block; cursor: pointer; transition: 0.3s; }
        .logo-trigger { 
            height: 80px; width: auto; transition: 0.3s;
            filter: drop-shadow(0 0 0px rgba(170, 240, 209, 0));
        }
        .logo-nav-container:hover .logo-trigger {
            transform: scale(1.08);
            filter: drop-shadow(0 0 20px rgba(170, 240, 209, 0.6));
        }

        /* --- 3. MENU OVERLAY --- */
        .nv-menu {
            height: 100%; width: 0; position: fixed; z-index: 9999;
            top: 0; left: 0; background-color: rgba(0,0,0,0.98); overflow: hidden;
            transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); 
            display: flex; align-items: center; justify-content: center;
        }
        .nv-links a { 
            font-size: 2.5rem; color: #fff; text-decoration: none; 
            display: block; margin: 25px; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 5px; transition: 0.3s;
        }
        .nv-links a:hover { color: #AAF0D1; transform: scale(1.1); }
        .nv-close { position: absolute; top: 30px; right: 45px; font-size: 50px; color: #fff; text-decoration: none; }

        /* --- 4. CONTENUTO CENTRALE --- */
        .main-wrapper { padding-top: 220px; min-height: 80vh; text-align: center; }
        .nv-title { font-weight: 900; letter-spacing: 8px; text-transform: uppercase; font-size: 3.5rem; }
        .nv-subtitle { color: #AAF0D1; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 40px; }
        .nv-line { width: 60px; height: 2px; background-color: #AAF0D1; margin: 0 auto 50px auto; }

        /* Card Stile Home */
        .home-card {
            display: block; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 40px 20px; text-decoration: none !important; transition: 0.4s; height: 100%;
        }
        .home-card:hover { border-color: #AAF0D1; background: rgba(170, 240, 209, 0.05); transform: translateY(-10px); }
        .home-card i { font-size: 2.5rem; color: #fff; margin-bottom: 20px; transition: 0.3s; }
        .home-card:hover i { color: #AAF0D1; }
        .home-card h3 { font-size: 1rem; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 2px; }

        /* --- 5. FOOTER & FORM --- */
        .nv-footer { background-color: #080808; padding: 80px 0 30px 0; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 100px; }
        .contact-form-box { background: rgba(255,255,255,0.02); padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .nv-input { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 12px; padding: 15px; color: white; outline: none; transition: 0.3s; margin-bottom: 15px;
        }
        .nv-input:focus { border-color: #AAF0D1; background: rgba(170, 240, 209, 0.05); }
        .nv-btn-submit { 
            background: #AAF0D1; color: #000; border: none; padding: 12px 40px; 
            border-radius: 50px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .nv-btn-submit:hover { background: white; transform: scale(1.05); }
        .footer-bottom { margin-top: 60px; opacity: 0.3; font-size: 0.7rem; text-align: center; letter-spacing: 3px; }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .nv-title { font-size: 2rem; }
            .logo-trigger { height: 60px; }
            .main-wrapper { padding-top: 180px; }
            .nv-links a { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="nav-fix">
        <div class="logo-nav-container" onclick="openM()">
            <img src="images/logo.png" alt="Nevera Logo" class="logo-trigger">
        </div>
    </div>

    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" class="nv-close" onclick="closeM()">&times;</a>
        <div class="nv-links">
            <a href="index.html" onclick="closeM()">Home</a>
            <a href="eventi.html" onclick="closeM()">Eventi</a>
            <a href="community.html" onclick="closeM()">Community</a>
            <a href="sponsor.html" onclick="closeM()">Sponsor</a>
            <a href="iniziative.html" onclick="closeM()">Iniziative</a>
        </div>
    </div>

    <div class="main-wrapper container">
        <h1 class="nv-title">NEVERA</h1>
        <p class="nv-subtitle">Born Under Pressure</p>
        
        <div class="row g-4 justify-content-center">
            <div class="col-6 col-md-3">
                <a href="eventi.html" class="home-card">
                    <i class="fa-solid fa-trophy"></i>
                    <h3>Eventi</h3>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="community.html" class="home-card">
                    <i class="fa-solid fa-users"></i>
                    <h3>Community</h3>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="sponsor.html" class="home-card">
                    <i class="fa-solid fa-handshake"></i>
                    <h3>Sponsor</h3>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="iniziative.html" class="home-card">
                    <i class="fa-solid fa-lightbulb"></i>
                    <h3>Iniziative</h3>
                </a>
            </div>
        </div>
    </div>

    <footer class="nv-footer">
        <div class="container">
            <div class="row g-5">
                <div class="col-lg-5 text-center text-lg-start">
                    <img src="images/logo.png" alt="Nevera" style="height: 50px; margin-bottom: 20px;">
                    <p style="opacity: 0.6;">info@neverasports.it</p>
                    <div class="mt-4">
                        <a href="https://instagram.com/neverasports.it" target="_blank" style="color:white; font-size: 1.5rem;"><i class="fa-brands fa-instagram"></i></a>
                    </div>
                </div>
                <div class="col-lg-7">
                    <div class="contact-form-box">
                        <h4 style="text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px;">Get In Touch</h4>
                        <form action="mailto:info@neverasports.it">
                            <div class="row">
                                <div class="col-md-6"><input type="text" class="nv-input" placeholder="Nome"></div>
                                <div class="col-md-6"><input type="email" class="nv-input" placeholder="Email"></div>
                                <div class="col-12"><textarea class="nv-input" rows="3" placeholder="Messaggio"></textarea></div>
                                <div class="col-12 text-end"><button type="submit" class="nv-btn-submit">Invia</button></div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                &copy; 2026 NEVERA SPORTS. ALL RIGHTS RESERVED.
            </div>
        </div>
    </footer>

    <script>
        function openM() { document.getElementById("m").style.width = "100%"; }
        function closeM() { document.getElementById("m").style.width = "0"; }
    </script>
</body>
</html>
