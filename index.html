<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEVERA SPORTS | Official</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --neon: #3FF000;
            --dark: #000000;
            --white: #ffffff;
            --font-grotesk: 'Inter', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; text-decoration: none !important; }

        body {
            background-color: var(--dark);
            color: var(--white);
            font-family: var(--font-grotesk);
            text-align: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* SFONDO PROFONDO */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0a0a0a 0%, #000000 100%);
            z-index: -2;
        }

        /* HEADER */
        .nav-fix { padding: 50px 0; }
        .logo-main { height: 60px; width: auto; cursor: pointer; }

        /* HERO - GROTESK SOLID */
        .nv-title { 
            font-family: 'Archivo Black', sans-serif; /* Ritorno al solido */
            font-size: clamp(3.5rem, 12vw, 7.5rem); 
            text-transform: uppercase;
            line-height: 1;
            letter-spacing: -3px;
            margin-top: 20px;
        }

        .nv-subtitle { 
            font-weight: 600;
            color: var(--neon);
            letter-spacing: 12px;
            text-transform: uppercase; 
            font-size: 0.7rem; 
            margin: 25px 0 90px 0; 
            display: block;
            opacity: 0.8;
        }

        /* CARD LUXURY - PULITE E CENTRATE */
        .cards-container {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 25px; max-width: 1200px; margin: 0 auto 120px; padding: 0 20px;
        }

        .home-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 70px 30px;
            width: 270px;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .home-card:hover {
            border-color: var(--neon);
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-8px);
        }

        .home-card i {
            font-size: 30px;
            margin-bottom: 30px;
            color: var(--white);
            opacity: 0.3;
            transition: 0.3s;
        }

        .home-card:hover i { opacity: 1; color: var(--neon); }

        .home-card h3 { 
            font-size: 0.7rem; 
            letter-spacing: 4px; 
            font-weight: 700;
            color: white !important;
            opacity: 0.5;
        }

        /* FOOTER NUOVO - MINIMAL LUXURY */
        .nv-footer {
            padding: 100px 40px 50px;
            border-top: 1px solid rgba(255,255,255,0.03);
            text-align: left;
        }

        .footer-grid {
            max-width: 1100px; margin: 0 auto;
            display: flex; justify-content: space-between; flex-wrap: wrap; gap: 60px;
        }

        .footer-logo-mini {
            height: 25px; /* Dimensione mini ma visibile */
            width: auto;
            opacity: 0.5;
            margin-bottom: 20px;
        }

        .f-tagline { font-size: 0.6rem; opacity: 0.2; letter-spacing: 3px; font-weight: 600; }

        .f-col { display: flex; flex-direction: column; gap: 12px; }
        
        .f-label { 
            font-size: 0.6rem; color: var(--neon); letter-spacing: 3px; 
            margin-bottom: 15px; font-weight: 800;
        }

        .f-link {
            font-size: 0.8rem; color: white !important;
            opacity: 0.3; transition: 0.3s;
        }

        .f-link:hover { opacity: 1; color: var(--neon) !important; transform: translateX(3px); }

        .footer-bottom {
            margin-top: 80px; text-align: center;
            font-size: 0.5rem; letter-spacing: 6px; opacity: 0.1;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <header class="nav-fix">
        <img src="immagini/logo-white.png" class="logo-main" alt="Nevera Sports">
    </header>

    <h1 class="nv-title">NEVERA</h1>
    <span class="nv-subtitle">Born Under Pressure</span>

    <div class="cards-container">
        <a href="eventi.html" class="home-card">
            <i class="fas fa-crosshairs"></i>
            <h3>EVENTI</h3>
        </a>
        <a href="community.html" class="home-card">
            <i class="fas fa-circle-nodes"></i>
            <h3>COMMUNITY</h3>
        </a>
        <a href="partners.html" class="home-card">
            <i class="fas fa-microchip"></i>
            <h3>PARTNERS</h3>
        </a>
        <a href="iniziative.html" class="home-card">
            <i class="fas fa-bolt-lightning"></i>
            <h3>INIZIATIVE</h3>
        </a>
    </div>

    <footer class="nv-footer">
        <div class="footer-grid">
            <div>
                <img src="immagini/logo-white.png" class="footer-logo-mini" alt="Nevera Mini">
                <p class="f-tagline">PRECISION IN PERFORMANCE.</p>
            </div>
            
            <div class="f-col">
                <span class="f-label">NAVIGAZIONE</span>
                <a href="index.html" class="f-link">HOME</a>
                <a href="eventi.html" class="f-link">EVENTI</a>
                <a href="community.html" class="f-link">COMMUNITY</a>
            </div>

            <div class="f-col">
                <span class="f-label">SOCIAL</span>
                <a href="#" class="f-link">INSTAGRAM</a>
                <a href="#" class="f-link">DISCORD</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>© 2026 NEVERA SPORTS | ALL RIGHTS RESERVED</p>
        </div>
    </footer>

</body>
</html>
