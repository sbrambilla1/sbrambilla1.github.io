<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>NEVERA SPORTS | Home</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root { --neon: #3FF000; --dark: #040404; --white: #FDFDFD; --font-title: 'Archivo Black', sans-serif; --font-body: 'Inter', sans-serif; }
        * { box-sizing: border-box; }
        
        /* SPLASH SCREEN FIXATO */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--dark); display: flex;
            justify-content: center; align-items: center; z-index: 99999;
            transition: opacity 0.6s ease, visibility 0.6s;
        }
        .splash-logo { height: 100px; animation: rotateLogo 2s infinite linear; }
        @keyframes rotateLogo { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .splash-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        html, body { margin: 0; padding: 0; background-color: var(--dark); color: var(--white); font-family: var(--font-body); overflow-x: hidden; }

        /* HEADER & NAV */
        .hero-section { position: relative; width: 100%; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        .bg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('images/play.png'); background-size: cover; background-position: center top; z-index: 1; }
        .bg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(4, 4, 4, 0.7) 0%, transparent 30%, rgba(4, 4, 4, 1) 100%); z-index: 2; }
        
        .nav-fix { position: absolute; top: 0; left: 0; width: 100%; padding: 40px; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .logo-trigger { height: 85px; cursor: pointer; transition: 0.3s; }
        .logo-trigger:hover { transform: scale(1.1); filter: drop-shadow(0 0 10px var(--neon)); }

        /* USER MENU */
        .user-menu-container { position: relative; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--neon); display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(0,0,0,0.5); font-family: var(--font-title); font-size: 0.9rem; color: var(--neon); }
        .nv-dropdown-menu { position: absolute; top: 60px; right: 0; background: #0c0c0c; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; width: 220px; padding: 10px; display: none; z-index: 1000; }
        .nv-dropdown-menu.show { display: block; }
        .nv-dropdown-item { padding: 12px; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 10px; cursor: pointer; border-radius: 10px; }
        .nv-dropdown-item:hover { background: rgba(255,255,255,0.05); color: var(--neon); }

        /* ALTRI ELEMENTI */
        .nv-menu { height: 100%; width: 0; position: fixed; z-index: 9999; top: 0; left: 0; background: #040404; display: flex; align-items: center; justify-content: center; transition: 0.5s; overflow: hidden; }
        .nv-links a { font-family: var(--font-title); font-size: 2.5rem; color: #fff; text-decoration: none; display: block; margin: 20px; text-transform: uppercase; }
        .nv-title { font-family: var(--font-title); font-size: 5rem; text-transform: uppercase; letter-spacing: -3px; z-index: 10; margin: 0; }
        
        .main-wrapper { position: relative; z-index: 10; background: var(--dark); padding: 80px 0; }
        .home-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 40px; border-radius: 30px; text-align: center; color: white; text-decoration: none; transition: 0.3s; }
        .home-card:hover { border-color: var(--neon); transform: translateY(-10px); }
    </style>
</head>
<body>

    <!-- SPLASH SCREEN -->
    <div id="splash-screen">
        <img src="images/logo.png" alt="Loading" class="splash-logo">
    </div>

    <!-- UI -->
    <section class="hero-section">
        <div class="bg-layer"></div>
        <div class="bg-overlay"></div>
        
        <header class="nav-fix">
            <div style="width: 45px;"></div> <!-- Spacer -->
            <img src="images/logo.png" class="logo-trigger" onclick="openM()">
            <div id="authHeaderBtn" class="user-menu-container"></div>
        </header>

        <div class="hero-content text-center">
            <h1 class="nv-title">NEVERA</h1>
            <p style="color: var(--neon); letter-spacing: 10px;">BORN UNDER PRESSURE</p>
        </div>
    </section>

    <!-- MENU MOBILE -->
    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" style="position:absolute; top:30px; right:45px; font-size:50px; color:var(--neon);" onclick="closeM()">&times;</a>
        <div class="nv-links">
            <a href="index.html">HOME</a>
            <a href="eventi.html">EVENTI</a>
        </div>
    </div>

    <main class="main-wrapper">
        <div class="container">
            <div class="row g-4 justify-content-center">
                <div class="col-6 col-md-3"><a href="eventi.html" class="home-card"><i class="fa-solid fa-crown fa-2x"></i><br>Eventi</a></div>
                <div class="col-6 col-md-3"><a href="community.html" class="home-card"><i class="fa-solid fa-users fa-2x"></i><br>Community</a></div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 1. SPLASH SCREEN FIX (FAIL-SAFE)
        function hideSplash() {
            const splash = document.getElementById('splash-screen');
            if (splash) splash.classList.add('splash-hidden');
        }
        // Rimuovi subito quando la pagina è pronta o dopo 3 secondi forzati
        window.addEventListener('load', hideSplash);
        setTimeout(hideSplash, 3000); 

        // 2. NAV & MENU
        function openM() { document.getElementById("m").style.width = "100%"; }
        function closeM() { document.getElementById("m").style.width = "0"; }

        // 3. AUTH LOGIC (Supabase)
        const SUPABASE_URL = "https://ennpbtrthwdxsvdbqbmn.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVubnBidHJ0aHdkeHN2ZGJxYm1uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNjU0NzUsImV4cCI6MjA5NDY0MTQ3NX0.JL-w7qkp6bktVJMrJ7O0Uw1phxaBpBc9BiP3cH8Q4-0";
        const dbClient = window.supabase ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY) : null;

        document.addEventListener("DOMContentLoaded", async () => {
            const authBtn = document.getElementById('authHeaderBtn');
            if (!dbClient) return;

            try {
                const { data: { session } } = await dbClient.auth.getSession();
                if (session) {
                    const name = session.user.user_metadata?.full_name || "User";
                    const initials = name.substring(0, 2).toUpperCase();
                    authBtn.innerHTML = `
                        <div class="user-avatar" onclick="document.getElementById('userMenu').classList.toggle('show')">${initials}</div>
                        <div class="nv-dropdown-menu" id="userMenu">
                            <div class="nv-dropdown-item" onclick="location.href='index.html'">Dashboard</div>
                            <div class="nv-dropdown-item" onclick="dbClient.auth.signOut(); location.reload();">Scollega</div>
                        </div>
                    `;
                } else {
                    authBtn.innerHTML = `<div class="user-avatar" onclick="location.href='login.html'"><i class="fa-regular fa-user"></i></div>`;
                }
            } catch (e) {
                console.error("Auth error:", e);
            }
        });
    </script>
</body>
</html>
