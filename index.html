<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>NEVERA SPORTS | Home</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --white: #FDFDFD;
        }

        body {
            margin: 0; background-color: var(--dark);
            color: var(--white); font-family: 'Space Grotesk', sans-serif;
            display: flex; flex-direction: column; min-height: 100vh;
        }

        /* Sfondo originale con overlay */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('images/image_c3c605.jpg');
            background-size: cover; background-position: center; z-index: 0;
        }

        /* Nav & Logo */
        .nav-fix { position: relative; padding: 40px 0; text-align: center; z-index: 10; }
        .logo-trigger { height: 75px; cursor: pointer; }

        /* Content */
        .main-wrapper { position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        
        .nv-title { font-family: 'Archivo Black', sans-serif; font-size: 4rem; text-transform: uppercase; letter-spacing: -2px; margin: 0; }
        .nv-subtitle { color: var(--neon); font-weight: 700; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 50px; font-size: 1rem; }

        /* Banner originali */
        .home-card {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 10px; text-decoration: none !important; color: white !important;
            transition: 0.3s; height: 100%;
        }
        .home-card:hover { background: var(--neon); color: var(--dark) !important; border-color: var(--neon); }
        .home-card i { font-size: 2.5rem; margin-bottom: 15px; color: var(--neon); }
        .home-card:hover i { color: var(--dark); }
        .home-card h3 { font-family: 'Archivo Black', sans-serif; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin: 0; }

        /* Footer */
        .nv-footer { position: relative; z-index: 10; padding: 40px; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); }
        .footer-link { color: white; text-decoration: none; margin: 0 15px; font-weight: 700; font-size: 0.8rem; }
        .footer-link:hover { color: var(--neon); }

        @media (max-width: 768px) { .nv-title { font-size: 2.8rem; } }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <header class="nav-fix"><img src="images/logo.png" class="logo-trigger"></header>

    <main class="main-wrapper container">
        <h1 class="nv-title">NEVERA</h1>
        <p class="nv-subtitle">Born Under Pressure</p>

        <div class="row g-4 w-100" style="max-width: 1000px;">
            <div class="col-6 col-md-3"><a href="eventi.html" class="home-card"><i class="fa-solid fa-trophy"></i><h3>Eventi</h3></a></div>
            <div class="col-6 col-md-3"><a href="community.html" class="home-card"><i class="fa-solid fa-users"></i><h3>Community</h3></a></div>
            <div class="col-6 col-md-3"><a href="sponsor.html" class="home-card"><i class="fa-solid fa-handshake"></i><h3>Sponsor</h3></a></div>
            <div class="col-6 col-md-3"><a href="iniziative.html" class="home-card"><i class="fa-solid fa-lightbulb"></i><h3>Iniziative</h3></a></div>
        </div>
    </main>

    <footer class="nv-footer">
        <a href="mailto:info@neverasports.it" class="footer-link">EMAIL</a>
        <a href="#" class="footer-link">WHATSAPP</a>
        <p style="opacity: 0.3; font-size: 0.6rem; margin-top: 20px;">© 2026 NEVERA SPORTS</p>
    </footer>
</body>
</html>
