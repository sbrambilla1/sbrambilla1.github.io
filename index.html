<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>NEVERA SPORTS | Home</title>
    <meta charset="utf-8" />
    
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="apple-touch-icon" href="images/logo.png">
    <link rel="icon" sizes="192x192" href="images/logo.png">
    
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --white: #FDFDFD;
            --font-title: 'Archivo Black', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        /* --- 1. STILE SPLASH SCREEN ANIMATO --- */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.6s ease, visibility 0.6s;
        }

        .splash-logo {
            height: 100px;
            width: auto;
            animation: rotateLogo 2s infinite cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        @keyframes rotateLogo {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .splash-hidden {
            opacity: 0;
            visibility: hidden;
        }

        /* --- STILE SITO GENERALE --- */
        html, body {
            margin: 0; padding: 0;
            background-color: var(--dark);
            color: var(--white);
            font-family: var(--font-body);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- SEZIONE HERO (FOTO A TUTTO SCHERMO) --- */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .bg-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('images/play.png'); 
            background-size: cover; 
            background-position: center top;
            z-index: 1;
        }

        .bg-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, 
                rgba(4, 4, 4, 0.7) 0%, 
                transparent 30%, 
                transparent 70%, 
                rgba(4, 4, 4, 1) 100%);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            margin-top: 80px;
        }

        /* HEADER AGGIORNATO PER ALLINEAMENTO PERFETTO COASSIALE */
        .nav-fix { 
            position: absolute; 
            top: 0; 
            width: 100%; 
            padding: 40px 40px 80px 40px; 
            z-index: 100;
            background: linear-gradient(to bottom, rgba(4, 4, 4, 0.9) 0%, transparent 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Elementi civetta laterali interni a flex per forzare il logo al centro millimetrico */
        .nav-fix-spacer {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .nav-fix-center {
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-fix-right {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .logo-trigger { 
            height: 85px; 
            cursor: pointer; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .logo-trigger:hover { 
            transform: scale(1.1); 
            filter: drop-shadow(0 0 15px var(--neon)); 
        }

        /* ICONA DI LOGIN RICALIBRATA DENTRO IL FLEX DI DESTRA */
        .auth-header-icon {
            font-size: 1.4rem;
            color: var(--white);
            cursor: pointer;
            transition: 0.3s;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }
        .auth-header-icon:hover {
            color: var(--neon);
            border-color: var(--neon);
            box-shadow: 0 0 15px rgba(63, 240, 0, 0.2);
        }

        /* MENU OVERLAY */
        .nv-menu {
            height: 100%; width: 0; position: fixed; z-index: 9999;
            top: 0; left: 0; background-color: rgba(4, 4, 4, 0.98); 
            overflow: hidden; transition: 0.5s; 
            display: flex; align-items: center; justify-content: center;
        }
        .nv-links a { font-family: var(--font-title); font-size: 2.5rem; color: var(--white); text-decoration: none; display: block; margin: 20px; text-transform: uppercase; }
        .nv-links a:hover { color: var(--neon); }
        .nv-close { position: absolute; top: 30px; right: 45px; font-size: 50px; color: var(--neon); text-decoration: none; }

        /* --- SEZIONE CONTENUTI (SOTTO LA FOTO) --- */
        .main-wrapper { 
            position: relative; 
            z-index: 10; 
            background-color: var(--dark); 
            padding: 80px 0 40px 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        .nv-title { font-family: var(--font-title); font-size: clamp(3.5rem, 12vw, 6rem); text-transform: uppercase; letter-spacing: -3px; margin: 0; line-height: 0.9; }
        .nv-subtitle { color: var(--neon); font-weight: 700; text-transform: uppercase; letter-spacing: 12px; margin-bottom: 20px; font-size: 0.8rem; }

        /* CARDS */
        .home-card {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 60px 10px; text-decoration: none !important; color: white !important;
            transition: 0.4s; height: 100%;
            backdrop-filter: blur(10px);
        }
        .home-card:hover { border-color: var(--neon); transform: translateY(-10px); background: rgba(63, 240, 0, 0.05); }
        .home-card i { font-size: 2.5rem; margin-bottom: 20px; color: var(--white); opacity: 0.7; }
        .home-card:hover i { color: var(--neon); opacity: 1; }
        .home-card h3 { font-family: var(--font-body); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 800; margin: 0; }

        /* BANNER & SEZIONI */
        .banner-vpl-wrapper { width: 100%; max-width: 1100px; margin: 40px auto 40px auto; padding: 0 15px; }
        .vpl-gif-banner { display: block; border-radius: 40px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.1); }
        .vpl-gif-banner img { width: 100%; height: auto; display: block; }

        .join-section {
            width: 100%; max-width: 1100px; margin: 40px auto; padding: 80px 30px;
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 50px;
        }
        .btn-revolution {
            font-family: var(--font-title); background: var(--neon); color: var(--dark);
            padding: 20px 40px; border-radius: 50px; text-decoration: none !important;
            display: inline-block; font-size: 0.85rem; transition: 0.3s; text-transform: uppercase;
        }
        .btn-revolution:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(63, 240, 0, 0.4); color: var(--dark); }

        /* --- STILI BANNER CON IMMAGINE RADAR / MAPPA --- */
        .nv-radar-banner {
            width: 100%;
            max-width: 1100px;
            margin: 80px auto 40px auto;
            padding: 0 15px;
            position: relative;
            z-index: 10;
        }

        .radar-banner-inside {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            padding: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
            text-align: left;
            backdrop-filter: blur(15px);
            overflow: hidden;
            position: relative;
        }

        .radar-banner-text {
            flex: 1.2;
            max-width: 550px;
        }

        .radar-tag {
            color: var(--neon);
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #FF3333;
            border-radius: 50%;
            display: inline-block;
            animation: pulseAlpha 1.5s infinite;
            box-shadow: 0 0 10px #FF3333;
        }

        .radar-banner-text h2 {
            font-family: var(--font-title);
            font-size: clamp(2.2rem, 5vw, 3.8rem);
            line-height: 0.95;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .radar-banner-text p {
            opacity: 0.5;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 35px;
            font-weight: 400;
        }

        /* Contenitore Immagine Mappa / Finder */
        .radar-banner-graphic {
            flex: 0.8;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
        }

        .radar-image-container {
            width: 100%;
            max-width: 340px;
            aspect-ratio: 1 / 1;
            border-radius: 35px;
            overflow: hidden;
            border: 1px solid rgba(63, 240, 0, 0.2);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4), 0 0 20px rgba(63, 240, 0, 0.05);
            position: relative;
        }

        .radar-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .radar-banner-inside:hover .radar-image-container img {
            transform: scale(1.05);
        }

        /* Overlay scuro sopra l'immagine per dar profondità cyberpunk */
        .radar-image-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(4, 4, 4, 0.4) 0%, transparent 100%);
            pointer-events: none;
        }

        @keyframes pulseAlpha {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* ANIMAZIONE FRECCIA */
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
        .bounce { animation: bounce 2s infinite; }

        /* FOOTER */
        .nv-footer { padding: 100px 20px 60px; border-top: 1px solid rgba(255, 255, 255, 0.05); background: var(--dark); position: relative; z-index: 10; }
        .footer-container { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 40px; }
        .footer-brand { flex: 1; text-align: left; min-width: 250px; }
        .footer-logo-mini { height: 70px; opacity: 0.4; margin-bottom: 15px; }
        .footer-nav { display: flex; gap: 60px; flex: 1; justify-content: flex-end; }
        .f-col { display: flex; flex-direction: column; gap: 8px; text-align: left; }
        .f-label { font-size: 0.6rem; color: var(--neon); letter-spacing: 2px; font-weight: 800; margin-bottom: 10px; }
        .f-link { font-size: 0.85rem; color: white !important; opacity: 0.3; text-decoration: none; transition: 0.3s; }
        .f-link:hover { opacity: 1; color: var(--neon) !important; }
        .copyright { margin-top: 80px; opacity: 0.1; font-size: 0.5rem; letter-spacing: 5px; text-align: center; width: 100%; }

        /* RESPONSIVE */
        @media (max-width: 991px) {
            .radar-banner-inside {
                flex-direction: column-reverse;
                padding: 40px 30px;
                text-align: center;
                gap: 40px;
            }
            .radar-banner-text {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .radar-tag { justify-content: center; }
            .radar-image-container { max-width: 280px; }
        }

        @media (max-width: 768px) {
            .bg-layer { background-position: 42% center; }
            .footer-container { flex-direction: column; text-align: center; }
            .footer-brand { text-align: center; margin-bottom: 20px; }
            .footer-nav { justify-content: center; text-align: center; width: 100%; }
            .f-col { align-items: center; text-align: center; }
            .btn-action, .btn-join { font-size: 0.7rem !important; }
            .nav-fix { padding: 30px 20px; }
            .logo-trigger { height: 65px; }
        }

        /* --- SPECIFICHE E STILI STRUTTURALI MENU UTENTE A DESTRA --- */
        .user-profile-dropdown { position: relative; display: flex; align-items: center; justify-content: center; }
        
        .avatar-btn {
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-title); font-size: 0.85rem; color: var(--neon);
            cursor: pointer; text-transform: uppercase; border: 2px solid var(--neon);
            background: rgba(4, 4, 4, 0.8);
        }

        .nv-dropdown-menu {
            position: absolute; top: 55px; right: 0;
            background: rgba(12, 12, 12, 0.98); border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px; width: 240px; padding: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8); backdrop-filter: blur(15px);
            z-index: 1000; display: none; opacity: 0;
            transform: translateY(-10px); transition: opacity 0.3s, transform 0.3s;
        }
        .nv-dropdown-menu.show { display: block; opacity: 1; transform: translateY(0); }
        .user-menu-header { border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 10px; margin-bottom: 10px; text-align: left; }
        .user-menu-name { font-family: var(--font-title); font-size: 0.85rem; text-transform: uppercase; margin: 0; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        
        .nv-dropdown-item {
            display: flex; align-items: center; gap: 12px; padding: 12px; color: rgba(255,255,255,0.6);
            font-size: 0.8rem; font-weight: 600; text-decoration: none; border-radius: 10px; transition: 0.2s; cursor: pointer; text-align: left;
        }
        .nv-dropdown-item:hover { background: rgba(255,255,255,0.04); color: var(--neon); }
        .nv-dropdown-item i { width: 16px; font-size: 0.9rem; }
        .btn-logout-new { border-top: 1px solid rgba(255,255,255,0.05); color: #FF4444 !important; margin-top: 5px; padding-top: 12px; }
        .btn-logout-new:hover { background: rgba(255, 68, 68, 0.05); color: #FF4444; }

        /* PANNELLO STRUTTURALE LATERALE DESTRO (DASHBOARD) */
        .nv-offcanvas {
            position: fixed; top: 0; right: -450px; width: 100%; max-width: 420px; height: 100%;
            background: rgba(8, 8, 8, 0.96); border-left: 1px solid rgba(255,255,255,0.05);
            z-index: 10050; backdrop-filter: blur(20px);
            transition: right 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            padding: 40px 30px; display: flex; flex-direction: column; text-align: left; color: white;
        }
        .nv-offcanvas.open { right: 0; box-shadow: -15px 0 40px rgba(0,0,0,0.8); }
        .nv-offcanvas-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; }
        .nv-offcanvas-title { font-family: var(--font-title); font-size: 1.2rem; text-transform: uppercase; color: white; margin: 0; }
        .btn-close-offcanvas { background: none; border: none; color: var(--neon); font-size: 1.5rem; cursor: pointer; }
        .nv-offcanvas-body { flex: 1; overflow-y: auto; padding-right: 5px; }

        .profile-data-box { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; }
        .profile-label { font-size: 0.6rem; font-weight: 800; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
        .profile-value { font-size: 0.95rem; font-weight: 600; color: white; margin-bottom: 15px; }
        .profile-value:last-child { margin-bottom: 0; }

        .my-match-item { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 18px; padding: 15px; margin-bottom: 15px; position: relative; }
        .my-match-club { font-weight: 700; font-size: 0.85rem; text-transform: uppercase; color: white; padding-right: 30px; }
        .my-match-time { font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 5px; }
        .btn-delete-match { position: absolute; top: 15px; right: 15px; background: none; border: none; color: rgba(255,68,68,0.5); transition: 0.2s; font-size: 0.9rem; cursor: pointer; }
        .btn-delete-match:hover { color: #FF4444; transform: scale(1.1); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="images/logo.png" alt="Nevera Loading" class="splash-logo">
    </div>

    <section class="hero-section">
        <div class="bg-layer"></div>
        <div class="bg-overlay"></div>
        
        <header class="nav-fix">
            <div class="nav-fix-spacer"></div> 
            <div class="nav-fix-center">
                <img src="images/logo.png" alt="Nevera Logo" class="logo-trigger" onclick="openM()">
            </div>
            
            <div class="nav-fix-right">
                <div id="authHeaderBtn" class="auth-header-icon">
                    <i class="fa-regular fa-user"></i>
                </div>
            </div>
        </header>

        <div class="hero-content">
            <h1 class="nv-title">NEVERA</h1>
            <p class="nv-subtitle">Born Under Pressure</p>
            <div style="margin-top: 30px; opacity: 0.5;">
                <i class="fa-solid fa-chevron-down bounce" style="font-size: 1.5rem;"></i>
            </div>
        </div>
    </section>

    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" class="nv-close" onclick="closeM()">&times;</a>
        <div class="nv-links">
            <a href="index.html" onclick="closeM()">HOME</a>
            <a href="eventi.html" onclick="closeM()">EVENTI</a>
            <a href="community.html" onclick="closeM()">COMMUNITY</a>
            <a href="radar.html" onclick="closeM()">FINDER</a>
            <a href="partners.html" onclick="closeM()">SPONSOR</a>
            <a href="iniziative.html" onclick="closeM()">INIZIATIVE</a>
        </div>
    </div>

    <div class="nv-offcanvas" id="userOffcanvas">
        <div class="nv-offcanvas-header">
            <h5 class="nv-offcanvas-title" id="offcanvasTitle">Dashboard</h5>
            <button class="btn-close-offcanvas" onclick="closeUserPanel()">&times;</button>
        </div>
        <div class="nv-offcanvas-body" id="offcanvasBody"></div>
    </div>

    <main class="main-wrapper">
        <div class="container d-flex
