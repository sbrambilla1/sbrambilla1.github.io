<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEVERA SPORTS | Home</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- RESET DEFINITIVO (Uccide il blu e centra tutto) --- */
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --white: #fdfdfd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none !important; /* Rimuove sottolineature blu */
        }

        /* Forza i link a ereditare il colore del testo (Bianco) */
        a, a:visited, a:active {
            color: inherit !important;
        }

        body {
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            text-align: center;
        }

        /* --- SFONDO --- */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark) url('immagini/solidblack.png') no-repeat center center;
            background-size: cover; z-index: -2;
        }

        /* --- HEADER & MENU --- */
        .nav-fix { padding: 50px 0; }
        .logo-trigger { height: 65px; cursor: pointer; display: inline-block; }

        .nv-menu {
            position: fixed; top: 0; left: 0; width: 0; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 9999;
            overflow: hidden; transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; align-items: center; justify-content: center;
        }

        .nv-links a { 
            font-family: 'Archivo Black', sans-serif; font-size: 2.5rem; 
            color: white !important; display: block; margin: 25px; text-transform: uppercase;
        }

        /* --- HERO --- */
        .nv-title { 
            font-family: 'Archivo Black', sans-serif; 
            font-size: clamp(3rem, 10vw, 6.5rem); 
            text-transform: uppercase; letter-spacing: -3px; line-height: 0.9;
            margin-top: 20px;
        }

        .nv-subtitle { 
            color: var(--neon); letter-spacing: 10px; text-transform: uppercase; 
            font-size: 0.8rem; margin: 25px 0 80px 0; display: block; font-weight: 700;
        }

        /* --- CARD GRID (CENTRATA AL MILLIMETRO) --- */
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center; /* Centra le card orizzontalmente */
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto 100px auto;
            padding: 0 20px;
        }

        .home-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 35px;
            padding: 60px 25px;
            width: 270px; /* Dimensione fissa per mantenere l'ordine */
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.4s ease;
        }

        .home-card:hover {
            border-color: var(--neon);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-8px);
        }

        .home-card i { font-size: 35px; color: white; opacity: 0.4; margin-bottom: 25px; }
        .home-card h3 { 
            font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; 
            opacity: 0.6; font-weight: 700; color: white !important;
        }
        .home-card:hover h3 { opacity: 1; color: var(--neon) !important; }

        /* --- BANNER GIF --- */
        .vpl-banner { max-width: 1050px; margin: 0 auto 100px; padding: 0 20px; }
        .vpl-banner img { width: 100%; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); }

        /* --- FOOTER (RIPULITO E MINI) --- */
        .nv-footer { 
            padding: 80px 20px; 
            border-top: 1px solid rgba(255, 255, 255, 0.05); 
            background: rgba(0,0,0,0.4);
            text-align: left;
        }

        .footer-grid { 
            max-width: 1100px; margin: 0 auto;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 50px;
        }

        .footer-logo { height: 30px; width: auto; margin-bottom: 25px; opacity: 0.6; }
        .footer-head { color: var(--neon); font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; font-weight: 700; }
        .footer-link { display: block; color: white !important; opacity: 0.4; margin-bottom: 12px; font-size: 0.85rem; }
        .footer-link:hover { opacity: 1; color: var(--neon) !important; }

        /* --- POPUP JOIN THE CLUB --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.94); backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center; z-index: 10000;
        }
        .modal-content {
            background: var(--dark); border: 1px solid rgba(255,255,255,0.1);
            padding: 60px 40px; border-radius: 40px; text-align: center; max-width: 480px;
        }
        .btn-modal { 
            background: var(--neon); color: black !important; padding: 18px 45px; 
            border-radius: 100px; font-family: 'Archivo Black'; font-size: 0.8rem; display: inline-block; margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <header class="nav-fix">
        <img src="immagini/logo-white.png" class="logo-trigger" onclick="openNav()" alt="Nevera">
    </header>

    <div id="myNav" class="nv-menu">
        <span style="position:absolute; top:30px; right:45px; font-size:45px; cursor:pointer; color:var(--neon)" onclick="closeNav()">&times;</span>
        <div class="nv-links">
            <a href="index.html">Home</a>
            <a href="eventi.html">Eventi</a>
            <a href="community.html">Community</a>
            <a href="partners.html">Partners</a>
            <a href="iniziative.html">Iniziative</a>
        </div>
    </div>

    <div class="main-wrapper">
        <h1 class="nv-title">NEVERA</h1>
        <span class="nv-subtitle">BORN UNDER PRESSURE</span>

        <div class="cards-container">
            <a href="eventi.html" class="home-card">
                <i class="fa-solid fa-calendar-days"></i>
                <h3>EVENTI</h3>
            </a>
            <a href="community.html" class="home-card">
                <i class="fa-solid fa-users"></i>
                <h3>COMMUNITY</h3>
            </a>
            <a href="partners.html" class="home-card">
                <i class="fa-solid fa-handshake"></i>
                <h3>PARTNERS</h3>
            </a>
            <a href="iniziative.html" class="home-card">
                <i class="fa-solid fa-bolt"></i>
                <h3>INIZIATIVE</h3>
            </a>
        </div>

        <div class="vpl-banner">
            <img src="immagini/volt-league.gif" alt="Volt League">
        </div>
    </div>

    <footer class="nv-footer">
        <div class="footer-grid">
            <div>
                <img src="immagini/logo-white.png" class="footer-logo" alt="Nevera">
                <p style="opacity: 0.3; font-size: 0.8rem; line-height: 1.6;">Network creato dai giocatori, per i giocatori.</p>
            </div>
            <div>
                <h4 class="footer-head">Naviga</h4>
                <a href="index.html" class="footer-link">Home</a>
                <a href="eventi.html" class="footer-link">Eventi</a>
            </div>
            <div>
                <h4 class="footer-head">Social</h4>
                <div style="display:flex; gap:15px;">
                    <a href="#" class="footer-link"><i class="fa-brands fa-instagram"></i></a>
                    <a href="#" class="footer-link"><i class="fa-brands fa-discord"></i></a>
                </div>
            </div>
        </div>
    </footer>

    <div id="popup" class="modal-overlay">
        <div class="modal-content">
            <h2 style="font-family:'Archivo Black'; margin-bottom:15px;">JOIN THE CLUB</h2>
            <p style="opacity:0.6; margin-bottom:30px;">Entra nell'ecosistema ufficiale Nevera Sports.</p>
            <a href="#" class="btn-modal" onclick="closePopup()">ENTRA ORA</a>
        </div>
    </div>

    <script>
        function openNav() { document.getElementById("myNav").style.width = "100%"; }
        function closeNav() { document.getElementById("myNav").style.width = "0%"; }
        
        // Popup dopo 3 secondi
        window.onload = () => {
            setTimeout(() => { document.getElementById("popup").style.display = "flex"; }, 3000);
        };
        function closePopup() { document.getElementById("popup").style.display = "none"; }
    </script>

</body>
</html>
