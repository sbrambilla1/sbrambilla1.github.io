<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>NEVERA SPORTS | Official Home</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root { --neon: #3FF000; --dark: #040404; --white: #FDFDFD; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--dark); color: var(--white); font-family: 'Space Grotesk', sans-serif; display: flex; flex-direction: column; }
        
        /* Fix Sfondo iPad */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('images/image_c3c605.jpg'); background-size: cover; background-position: center; z-index: 0; }

        /* Nav & Logo */
        .nav-fix { position: relative; padding: 40px 0; text-align: center; z-index: 100; }
        .logo-trigger { height: 80px; cursor: pointer; transition: 0.3s; }
        .logo-trigger:hover { transform: scale(1.1); filter: drop-shadow(0 0 15px var(--neon)); }

        /* Menu Overlay */
        .nv-menu { height: 100%; width: 0; position: fixed; z-index: 9999; top: 0; left: 0; background-color: var(--dark); overflow: hidden; transition: 0.5s; display: flex; align-items: center; justify-content: center; }
        .nv-links a { font-family: 'Archivo Black', sans-serif; font-size: 2.5rem; color: var(--white); text-decoration: none; display: block; margin: 25px; text-transform: uppercase; }
        .nv-links a:hover { color: var(--neon); }
        .nv-close { position: absolute; top: 30px; right: 45px; font-size: 50px; color: var(--neon); text-decoration: none; }

        /* Main Content */
        .main-wrapper { position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .nv-title { font-family: 'Archivo Black', sans-serif; font-size: 4rem; letter-spacing: -2px; margin-bottom: 0; text-transform: uppercase; }
        .nv-subtitle { color: var(--neon); letter-spacing: 5px; font-weight: 700; text-transform: uppercase; margin-bottom: 50px; }

        /* Banner Cards */
        .home-card { display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 45px 10px; text-decoration: none !important; color: white !important; transition: 0.3s; height: 100%; }
        .home-card:hover { background: var(--neon); color: var(--dark) !important; border-color: var(--neon); }
        .home-card i { font-size: 2.5rem; margin-bottom: 20px; color: var(--neon); }
        .home-card:hover i { color: var(--dark); }
        .home-card h3 { font-family: 'Archivo Black', sans-serif; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin: 0; }

        /* Footer */
        .nv-footer { position: relative; z-index: 10; padding: 40px; text-align: center; border-top: 4px solid var(--neon); }
        .contact-link { color: var(--white); text-decoration: none; margin: 0 15px; font-weight: 700; font-size: 0.9rem; }
        .contact-link:hover { color: var(--neon); }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <header class="nav-fix"><img src="images/logo.png" class="logo-trigger" onclick="openM()"></header>

    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" class="nv-close" onclick="closeM()">&times;</a>
        <div class="nv-links">
            <a href="index.html">HOME</a>
            <a href="eventi.html">EVENTI</a>
            <a href="community.html">COMMUNITY</a>
            <a href="sponsor.html">SPONSOR</a>
            <a href="iniziative.html">INIZIATIVE</a>
        </div>
    </div>

    <div class="main-wrapper container">
        <h1 class="nv-title">NEVERA</h1>
        <p class="nv-subtitle">Born Under Pressure</p>
        <div class="row g-4 w-100" style="max-width: 1000px;">
            <div class="col-6 col-md-3"><a href="eventi.html" class="home-card"><i class="fa-solid fa-trophy"></i><h3>Eventi</h3></a></div>
            <div class="col-6 col-md-3"><a href="community.html" class="home-card"><i class="fa-solid fa-users"></i><h3>Community</h3></a></div>
            <div class="col-6 col-md-3"><a href="sponsor.html" class="home-card"><i class="fa-solid fa-handshake"></i><h3>Sponsor</h3></a></div>
            <div class="col-6 col-md-3"><a href="iniziative.html" class="home-card"><i class="fa-solid fa-lightbulb"></i><h3>Iniziative</h3></a></div>
        </div>
    </div>

    <footer class="nv-footer">
        <div class="mb-3">
            <a href="mailto:info@neverasports.it" class="contact-link">EMAIL</a>
            <a href="#" class="contact-link">WHATSAPP</a>
        </div>
        <p style="opacity: 0.4; font-size: 0.7rem;">© 2026 NEVERA SPORTS | ALL RIGHTS RESERVED</p>
    </footer>

    <script>
        function openM() { document.getElementById("m").style.width = "100%"; }
        function closeM() { document.getElementById("m").style.width = "0"; }
    </script>
</body>
</html>
