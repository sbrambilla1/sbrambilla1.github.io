<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>NEVERA SPORTS | Official Home</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* --- RESET TOTALE --- */
        html, body {
            margin: 0; padding: 0;
            width: 100%; min-height: 100vh;
            background-color: #000 !important; /* Se l'immagine fallisce, resta nero */
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        /* --- SFONDO FISSO PER TUTTI (iPad incluso) --- */
        body {
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('images/homebg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: scroll; /* Cambiato da fixed a scroll per iPad */
        }

        /* Per PC e Tablet grandi (non iOS) forziamo il fixed */
        @media (min-width: 1025px) {
            body { background-attachment: fixed; }
        }

        /* --- LOGO E NAV --- */
        .nav-fix {
            position: relative; /* Non fixed per ora, così non copre nulla */
            padding: 40px 0;
            text-align: center;
            z-index: 10;
        }
        .logo-trigger { height: 80px; width: auto; cursor: pointer; }

        /* --- CONTENT --- */
        .main-wrapper {
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
        }

        .nv-title { font-weight: 900; letter-spacing: 12px; font-size: 3.5rem; text-transform: uppercase; margin-bottom: 0; }
        .nv-subtitle { color: #AAF0D1; letter-spacing: 5px; text-transform: uppercase; font-size: 1rem; margin-bottom: 50px; }

        /* --- CARDS VETRO --- */
        .home-card {
            display: block;
            background: rgba(255, 255, 255, 0.1);
            -webkit-backdrop-filter: blur(15px);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px 10px;
            text-decoration: none !important;
            color: white !important;
            transition: 0.3s;
        }
        .home-card:hover { transform: translateY(-5px); border-color: #AAF0D1; }
        .home-card i { font-size: 2rem; margin-bottom: 15px; display: block; }
        .home-card h3 { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        /* --- FOOTER --- */
        footer { padding: 40px; text-align: center; opacity: 0.4; font-size: 0.7rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="nav-fix">
        <img src="images/logo.png" alt="Logo" class="logo-trigger" onclick="location.reload()">
    </div>

    <div class="main-wrapper container">
        <h1 class="nv-title">NEVERA</h1>
        <p class="nv-subtitle">Born Under Pressure</p>

        <div class="row g-4 w-100" style="max-width: 900px;">
            <div class="col-6 col-md-3">
                <a href="vpl.html" class="home-card">
                    <i class="fa-solid fa-trophy"></i>
                    <h3>League</h3>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="community.html" class="home-card">
                    <i class="fa-solid fa-users"></i>
                    <h3>Community</h3>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="sponsor.html" class="home-card">
                    <i class="fa-solid fa-handshake"></i>
                    <h3>Sponsor</h3>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="iniziative.html" class="home-card">
                    <i class="fa-solid fa-lightbulb"></i>
                    <h3>Iniziative</h3>
                </a>
            </div>
        </div>
    </div>

    <footer>&copy; 2026 NEVERA SPORTS</footer>

    <script>
        const img = new Image();
        img.src = "images/homebg.jpg";
        img.onerror = function() {
            alert("ERRORE: L'immagine 'images/homebg.jpg' non è stata trovata! Controlla il nome del file e la cartella.");
        };
    </script>

</body>
</html>
