<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">

    <style>
        /* --- RESET VELO NERO --- */
        body {
            background-color: #000; /* O il colore del tuo sfondo */
            margin: 0;
            overflow-x: hidden;
        }

        /* --- NAVBAR --- */
        .navbar {
            background: transparent !important;
            padding: 20px 0;
            z-index: 1000;
        }

        .main-logo {
            height: 50px; /* Dimensione logo menu */
            width: auto;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .main-logo:hover {
            transform: scale(1.1);
        }

        /* --- OVERLAY MENU (FIXED) --- */
        .full-screen-overlay {
            height: 100%;
            width: 100%;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            background-color: rgba(0,0,0,0.98);
            
            /* Inizia invisibile e spostato */
            opacity: 0;
            visibility: hidden;
            transform: translateY(-100%); 
            transition: all 0.5s cubic-bezier(0.7, 0, 0.3, 1);
            
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Classe che attiva il menu */
        .full-screen-overlay.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .overlay-content a {
            font-size: 3rem;
            font-weight: 800;
            color: white;
            text-decoration: none;
            display: block;
            margin: 15px 0;
            transition: 0.3s;
            text-align: center;
        }

        .overlay-content a:hover {
            color: #AAF0D1;
        }

        .closebtn {
            position: absolute;
            top: 30px;
            right: 45px;
            font-size: 60px;
            color: white;
            text-decoration: none;
        }

        /* Contenuto Pagina */
        .hero-section {
            padding: 150px 0 100px;
            text-align: center;
            color: white;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

<div id="myNav" class="full-screen-overlay">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <div class="overlay-content">
        <a href="index.html" onclick="closeNav()">HOME</a>
        <a href="eventi.html" onclick="closeNav()">EVENTI</a>
        <a href="sponsor.html" onclick="closeNav()">SPONSOR</a>
        <a href="community.html" onclick="closeNav()">COMMUNITY</a>
        <a href="iniziative.html" onclick="closeNav()">INIZIATIVE</a>
    </div>
</div>

<nav class="navbar fixed-top">
    <div class="container justify-content-center">
        <a class="navbar-brand" href="javascript:void(0)" onclick="openNav()">
            <img src="images/logo.png" alt="Nevera Logo" class="main-logo">
        </a>
    </div>
</nav>

<div class="hero-section">
    <div class="container">
        <h1 class="display-1 fw-bold">NEVERA SPORTS</h1>
        <p class="fs-4" style="color: #AAF0D1; letter-spacing: 5px;">BORN UNDER PRESSURE</p>
        
        <div style="margin-top: 50px; opacity: 0.7; animation: bounce 2s infinite;">
            <i class="fa-solid fa-chevron-down" style="color: #AAF0D1; font-size: 1.5rem;"></i>
        </div>
    </div>
</div>

<footer id="footer" class="py-5 text-center">
    <div class="container">
        <div class="row justify-content-center mb-4">
            <div class="col-auto"><a href="eventi.html" class="text-white mx-3 fw-bold text-decoration-none">EVENTI</a></div>
            <div class="col-auto"><a href="community.html" class="text-white mx-3 fw-bold text-decoration-none">COMMUNITY</a></div>
            <div class="col-auto"><a href="sponsor.html" class="text-white mx-3 fw-bold text-decoration-none">SPONSOR</a></div>
            <div class="col-auto"><a href="iniziative.html" class="text-white mx-3 fw-bold text-decoration-none">INIZIATIVE</a></div>
        </div>
        <div class="social-links">
            <a href="https://www.instagram.com/neverasports.it/" class="text-white mx-2"><i class="fab fa-instagram fa-lg"></i></a>
            <a href="https://t.me/neverasports" class="text-white mx-2"><i class="fab fa-telegram fa-lg"></i></a>
            <a href="mailto:info@neverasports.it" class="text-white mx-2"><i class="fa-solid fa-envelope fa-lg"></i></a>
        </div>
        <p class="mt-4" style="font-size: 0.8rem; color: #666;">&copy; 2026 NEVERA SPORTS</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function openNav() {
    document.getElementById("myNav").classList.add("open");
}

function closeNav() {
    document.getElementById("myNav").classList.remove("open");
}
</script>

</body>
</html>
