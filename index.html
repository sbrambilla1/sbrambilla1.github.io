<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>NEVERA SPORTS | Official Home</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* --- RESET & LAYOUT --- */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* SFONDO FISSO (Fix iPad/iPhone) */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('images/homebg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 0;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
        }

        /* --- NAVBAR --- */
        .nav-fix { position: relative; padding: 40px 0; text-align: center; z-index: 100; }
        .logo-trigger { height: 80px; width: auto; cursor: pointer; transition: 0.3s; }

        /* --- MENU OVERLAY --- */
        .nv-menu {
            height: 100%; width: 0; position: fixed; z-index: 9999;
            top: 0; left: 0; background-color: rgba(0,0,0,0.98); 
            overflow: hidden; transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); 
            display: flex; align-items: center; justify-content: center;
        }
        .nv-links a { font-size: 2.5rem; color: #fff; text-decoration: none; display: block; margin: 25px; font-weight: 900; text-transform: uppercase; letter-spacing: 5px; }
        .nv-links a:hover { color: #AAF0D1; }
        .nv-close { position: absolute; top: 30px; right: 45px; font-size: 50px; color: #fff; text-decoration: none; }

        /* --- CONTENT WRAPPER --- */
        .main-wrapper {
            position: relative; z-index: 10; flex: 1;
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px 20px;
        }

        .nv-title { font-weight: 900; letter-spacing: 12px; font-size: 4rem; text-transform: uppercase; margin-bottom: 0; }
        .nv-subtitle { color: #AAF0D1; letter-spacing: 5px; text-transform: uppercase; font-size: 1.1rem; margin-bottom: 60px; }

        /* --- CARD BANNER (Centrate) --- */
        .home-card {
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centra verticalmente */
            align-items: center;     /* Centra orizzontalmente */
            background: rgba(255, 255, 255, 0.05);
            -webkit-backdrop-filter: blur(15px); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px;
            padding: 50px 10px; 
            text-decoration: none !important; color: white !important; 
            transition: 0.3s ease;
            height: 100%; /* Fa sì che tutte le card abbiano la stessa altezza */
        }
        .home-card:hover { transform: translateY(-10px); border-color: #AAF0D1; background: rgba(170, 240, 209, 0.05); }
        .home-card i { font-size: 2.8rem; margin-bottom: 20px; display: block; }
        .home-card h3 { font-size: 0.9rem; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; margin: 0; }

        /* --- FOOTER CONTATTI --- */
        .nv-footer { 
            position: relative; z-index: 10; 
            padding: 50px 20px; text-align: center; 
            background: rgba(0,0,0,0.8); 
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .contact-info { margin-bottom: 25px; }
        .contact-info a { color: #AAF0D1; text-decoration: none; margin: 0 15px; font-weight: 600; font-size: 0.9rem; transition: 0.3s; }
        .contact-info a:hover { color: white; }
        .social-icons a { color: white; font-size: 1.5rem; margin: 0 15px; transition: 0.3s; }
        .social-icons a:hover { color: #AAF0D1; }
        .footer-text { opacity: 0.3; font-size: 0.65rem; letter-spacing: 3px; margin-top: 30px; text-transform: uppercase; }

        @media (max-width: 768px) {
            .nv-title { font-size: 2.2rem; letter-spacing: 6px; }
            .logo-trigger { height: 65px; }
            .home-card { padding: 40px 10px; }
            .contact-info a { display: block; margin: 10px 0; }
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <header class="nav-fix">
        <img src="images/logo.png" alt="Nevera Logo" class="logo-trigger" onclick="openM()">
    </header>

    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" class="nv-close" onclick="closeM()">&times;</a>
        <div class="nv-links">
            <a href="index.html" onclick="closeM()">HOME</a>
            <a href="eventi.html" onclick="closeM()">EVENTI</a>
            <a href="sponsor.html" onclick="closeM()">SPONSOR</a>
            <a href="community.html" onclick="closeM()">COMMUNITY</a>
            <a href="iniziative.html" onclick="closeM()">INIZIATIVE</a>
        </div>
    </div>

    <div class="main-wrapper container">
        <h1 class="nv-title">NEVERA</h1>
        <p class="nv-subtitle">Born Under Pressure</p>

        <div class="row g-4 w-100" style="max-width: 1100px;">
            <div class="col-6 col-md-3">
                <a href="eventi.html" class="home-card">
                    <i class="fa-solid fa-trophy"></i>
                    <h3>Eventi</h3>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="community.html" class="home-card">
                    <i class="fa-solid fa-users"></i>
                    <h3>Community</h3>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="sponsor.html" class="home-card">
                    <i class="fa-solid fa-handshake"></i>
                    <h3>Sponsor</h3>
                </a>
            </div>
            <div class="col-6 col-md-3">
                <a href="iniziative.html" class="home-card">
                    <i class="fa-solid fa-lightbulb"></i>
                    <h3>Iniziative</h3>
                </a>
            </div>
        </div>
    </div>

    <footer class="nv-footer">
        <div class="contact-info">
            <a href="mailto:info@neverasports.it"><i class="fa-regular fa-envelope"></i> info@neverasports.it</a>
            
        </div>
        <div class="social-icons">
            <a href="https://www.instagram.com/neverasports.it/"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://t.me/NEVERASPORTS"><i class="fa-brands fa-telegram"></i></a>
            
        </div>
        <p class="footer-text">&copy; 2026 NEVERA SPORTS | ALL RIGHTS RESERVED</p>
    </footer>

    <script>
        function openM() { document.getElementById("m").style.width = "100%"; }
        function closeM() { document.getElementById("m").style.width = "0"; }
    </script>

</body>
</html>
