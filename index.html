<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEVERA SPORTS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Bricolage+Grotesque:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --neon: #3FF000;
            --dark: #000000;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; text-decoration: none !important; }

        body {
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Bricolage Grotesque', sans-serif;
            text-align: center;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* SFONDO PULITO */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark);
            z-index: -2;
        }

        /* HEADER */
        .nav-fix { padding: 40px 0; }
        .logo-trigger { height: 50px; cursor: pointer; filter: brightness(1.1); }

        /* HERO SECTION - MASSIMALISTA */
        .nv-title { 
            font-family: 'Syne', sans-serif;
            font-size: clamp(4rem, 15vw, 10rem); 
            text-transform: uppercase;
            line-height: 0.75;
            letter-spacing: -5px;
            margin-top: 40px;
        }

        .nv-subtitle { 
            font-family: 'Bricolage Grotesque', sans-serif;
            color: var(--neon);
            letter-spacing: 15px;
            text-transform: uppercase; 
            font-size: 0.6rem; 
            font-weight: 800;
            margin: 40px 0 100px 0; 
            display: block;
        }

        /* CARD LUXURY - MINIMALI E SOTTILI */
        .cards-container {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 20px; max-width: 1400px; margin: 0 auto 150px; padding: 0 20px;
        }

        .home-card {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.08); /* Bordo quasi invisibile */
            padding: 80px 40px;
            flex: 1;
            min-width: 280px;
            max-width: 320px;
            transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .home-card:hover {
            border-color: var(--neon);
            background: rgba(63, 240, 0, 0.02);
        }

        /* Icone svuotate per effetto Light */
        .home-card i {
            font-size: 24px;
            margin-bottom: 40px;
            color: transparent !important;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
            transition: 0.4s;
        }

        .home-card:hover i {
            -webkit-text-stroke: 1px var(--neon);
            transform: scale(1.2);
        }

        .home-card h3 { 
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 0.7rem; 
            letter-spacing: 6px; 
            font-weight: 800;
            color: white !important;
            opacity: 0.4;
        }

        .home-card:hover h3 { opacity: 1; color: var(--neon) !important; }

        /* FOOTER NUOVO - TOTAL BLACK LUXURY */
        .nv-footer {
            padding: 150px 60px 60px;
            border-top: 1px solid rgba(255,255,255,0.05);
            text-align: left;
        }

        .footer-grid {
            max-width: 1300px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: flex-start;
            flex-wrap: wrap; gap: 100px;
        }

        .footer-logo-mini {
            height: 15px; /* Logo piccolissimo richiesto */
            opacity: 0.3;
            margin-bottom: 30px;
        }

        .f-col { display: flex; flex-direction: column; gap: 15px; }
        
        .f-label { 
            font-size: 0.55rem; color: var(--neon); letter-spacing: 4px; 
            margin-bottom: 25px; font-weight: 800; opacity: 0.8;
        }

        .f-link {
            font-size: 0.85rem; color: white !important;
            opacity: 0.2; transition: 0.3s; font-weight: 500;
        }

        .f-link:hover { opacity: 1; color: var(--neon) !important; }

        .footer-bottom {
            margin-top: 150px; text-align: center;
            font-size: 0.5rem; letter-spacing: 10px; opacity: 0.1;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <header class="nav-fix">
        <img src="immagini/logo-white.png" class="logo-trigger" alt="Nevera">
    </header>

    <h1 class="nv-title">NEVERA</h1>
    <span class="nv-subtitle">Born Under Pressure</span>

    <div class="cards-container">
        <a href="eventi.html" class="home-card">
            <i class="fas fa-crosshairs"></i>
            <h3>EVENTI</h3>
        </a>
        <a href="community.html" class="home-card">
            <i class="fas fa-circle-nodes"></i>
            <h3>COMMUNITY</h3>
        </a>
        <a href="partners.html" class="home-card">
            <i class="fas fa-microchip"></i>
            <h3>PARTNERS</h3>
        </a>
        <a href="iniziative.html" class="home-card">
            <i class="fas fa-bolt-lightning"></i>
            <h3>INIZIATIVE</h3>
        </a>
    </div>

    <footer class="nv-footer">
        <div class="footer-grid">
            <div>
                <img src="immagini/logo-white.png" class="footer-logo-mini">
                <p style="font-size: 0.6rem; opacity: 0.2; letter-spacing: 2px;">© 2026 OFFICIAL NEVERA SPORTS HUB</p>
            </div>
            
            <div class="f-col">
                <span class="f-label">NAVIGAZIONE</span>
                <a href="#" class="f-link">EVENTI</a>
                <a href="#" class="f-link">COMMUNITY</a>
                <a href="#" class="f-link">INIZIATIVE</a>
            </div>

            <div class="f-col">
                <span class="f-label">NETWORK</span>
                <a href="#" class="f-link">INSTAGRAM</a>
                <a href="#" class="f-link">DISCORD</a>
                <a href="#" class="f-link">TWITCH</a>
            </div>
        </div>
        <div class="footer-bottom">
            <p>DESIGNED FOR THE TOP 1%</p>
        </div>
    </footer>

</body>
</html>
</body>
</html>
