<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>PARTNERS | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <link rel="icon" type="image/png" href="images/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/main.css">

    <style>
        /* Personalizzazioni specifiche per i Banner Partner */
        .nv-card {
            display: block;
            border-radius: 30px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
            transition: var(--transition-smooth);
            position: relative;
            text-decoration: none;
        }

        .nv-card:hover {
            transform: translateY(-12px);
            border-color: var(--neon);
            box-shadow: 0 20px 40px rgba(63, 240, 0, 0.1);
        }

        .nv-card img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .nv-card:hover img {
            transform: scale(1.04);
        }

        .nv-card-partner {
            aspect-ratio: 16 / 9;
        }

        .partner-section-label {
            font-family: var(--font-title);
            font-size: 0.7rem;
            letter-spacing: 5px;
            color: var(--neon);
            text-transform: uppercase;
            margin-bottom: 40px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="bg-overlay"></div>

    <header class="nav-fix">
        <img src="images/logo.png" class="logo-trigger" onclick="openM()" alt="Nevera Logo">
    </header>

    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" class="nv-close" onclick="closeM()">&times;</a>
        <div class="nv-links">
            <a href="index.html" onclick="closeM()">HOME</a>
            <a href="eventi.html" onclick="closeM()">EVENTI</a>
            <a href="community.html" onclick="closeM()">COMMUNITY</a>
            <a href="sponsor.html" onclick="closeM()">PARTNERS</a>
            <a href="iniziative.html" onclick="closeM()">INIZIATIVE</a>
        </div>
    </div>

    <main class="main-wrapper container">
        <h1 class="nv-title">PARTNERS</h1>
        <p class="nv-subtitle">THE ELITE NETWORK</p>

        <div class="row justify-content-center mb-5 mt-5">
            <div class="col-lg-10">
                <a href="https://www.voltpadel.com" target="_blank" class="nv-card">
                    <img src="images/volt-padel-banner.webp" alt="Volt Padel Banner">
                </a>
            </div>
        </div>

        <div class="row justify-content-center g-4 mt-4">
            <div class="col-12"></div>
            
            <div class="col-lg-5 col-md-6">
                <a href="https://www.orya.it" target="_blank" class="nv-card nv-card-partner">
                    <img src="images/orya.png" alt="Orya">
                </a>
            </div>
            
            <div class="col-lg-5 col-md-6">
                <a href="https://x3portres.it/" target="_blank" class="nv-card nv-card-partner">
                    <img src="images/portres.webp" alt="X3 POR TRES">
                </a>
            </div>
        </div>

        <div class="join-section" style="margin-top: 120px;">
            <h2 style="font-family: var(--font-title); font-size: 1.5rem; margin-bottom: 20px;">PORTA IL TUO BRAND IN CAMPO</h2>
            <p style="opacity: 0.6; font-weight: 300; margin-bottom: 40px;">Diventa sponsor NEVERA.</p>
            <a href="mailto:info@neverasports.it" class="btn-revolution">
                CONTATTACI <i class="fa-solid fa-paper-plane" style="margin-left: 10px;"></i>
            </a>
        </div>
    </main>

    <footer class="nv-footer">
        <div class="container text-center">
            <p class="copy-text">© 2026 NEVERA SPORTS | BORN UNDER PRESSURE</p>
        </div>
    </footer>

    <script>
        function openM() { document.getElementById("m").style.width = "100%"; }
        function closeM() { document.getElementById("m").style.width = "0"; }
    </script>

</body>
</html>
