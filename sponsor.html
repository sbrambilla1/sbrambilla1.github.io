<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>PARTNERS - NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">

    <style>
        /* RESET E SFONDO */
        html, body {
            background-color: #000 !important;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* NAVBAR */
        .nav-fix {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 0;
            z-index: 5000;
            text-align: center;
        }
        .logo-trigger { height: 65px; cursor: pointer; }

        /* MENU OVERLAY */
        .nv-menu {
            height: 100%; width: 0; position: fixed; z-index: 9999;
            top: 0; left: 0; background-color: #000; overflow: hidden;
            transition: 0.5s; display: flex; align-items: center; justify-content: center;
        }
        .nv-links a { font-size: 2.5rem; color: #fff; text-decoration: none; display: block; margin: 20px; font-weight: 800; }
        .nv-close { position: absolute; top: 30px; right: 45px; font-size: 50px; color: #fff; text-decoration: none; }

        /* CONTENUTO */
        .nv-content { padding-top: 120px; color: white; text-align: center; }
        .nv-title { font-weight: 900; letter-spacing: 5px; text-transform: uppercase; }
        .nv-line { width: 60px; height: 2px; background-color: #AAF0D1; margin: 0 auto 50px auto; }

        /* --- LOGICA BANNER --- */
        .nv-card {
            display: block;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease-in-out;
            padding: 0 !important; /* Rimuove spazi bianchi */
            text-decoration: none;
            position: relative;
        }

        /* EFFETTO HOVER PER TUTTI */
        .nv-card:hover {
            transform: translateY(-8px);
            border-color: #AAF0D1 !important;
            box-shadow: 0 10px 30px rgba(170, 240, 209, 0.2);
        }

        /* RIEMPIMENTO IMMAGINE */
        .nv-card img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover; /* Riempie senza schiacciare */
        }

        /* Formato rettangolare per i partner piccoli */
        .nv-card-partner {
            aspect-ratio: 3 / 2;
        }
    </style>
</head>
<body>

    <div class="nav-fix">
        <img src="images/logo.png" class="logo-trigger" onclick="openM()">
    </div>

    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" class="nv-close" onclick="closeM()">&times;</a>
        <div class="nv-links">
            <a href="index.html">HOME</a>
            <a href="eventi.html">EVENTI</a>
            <a href="sponsor.html">SPONSOR</a>
            <a href="community.html">COMMUNITY</a>
            <a href="iniziative.html">INIZIATIVE</a>
        </div>
    </div>

    <div class="nv-content container">
        <h1 class="nv-title">PARTNERS</h1>
        <div class="nv-line"></div>

        <div class="row justify-content-center mb-5">
            <div class="col-lg-10">
                <a href="https://www.voltpadel.com" target="_blank" class="nv-card">
                    <img src="images/volt-padel-banner.webp" alt="Volt">
                </a>
            </div>
        </div>

        <div class="row justify-content-center g-4">
            <div class="col-lg-5 col-md-6">
                <a href="https://www.orya.it" target="_blank" class="nv-card nv-card-partner">
                    <img src="images/orya.png" alt="Orya">
                </a>
            </div>
            <div class="col-lg-5 col-md-6">
                <a href="https://www.swappadel.it/" target="_blank" class="nv-card nv-card-partner">
                    <img src="images/SWAP.png" alt="Swap">
                </a>
            </div>
        </div>
    </div>

    <script>
        function openM() { document.getElementById("m").style.width = "100%"; }
        function closeM() { document.getElementById("m").style.width = "0"; }
    </script>
</body>
</html>
