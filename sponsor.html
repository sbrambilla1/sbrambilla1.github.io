<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>PARTNERS - NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">

    <style>
        /* RESET E SFONDO */
        html, body {
            background-color: #000 !important;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* NAVBAR - LOGO MENU INGRANDITO E ANIMATO */
        .nav-fix {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 0; /* Un po' di spazio extra sopra e sotto */
            z-index: 5000;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Contenitore per il logo per gestire l'animazione del bordo */
        .logo-nav-container {
            position: relative;
            cursor: pointer;
            padding: 10px; /* Spazio per il bordo animato */
            border-radius: 50%;
            transition: all 0.4s ease;
        }

        .logo-trigger { 
            height: 65px; /* Grandezza del logo menu */
            width: auto;
            display: block;
            position: relative;
            z-index: 2;
        }

        /* --- L'EFFETTO HOVER "SCOPRI IL MENU" --- */
        .logo-nav-container::before {
            content: '';
            position: absolute;
            inset: -5px; /* Leggermente più grande del logo */
            border: 2px solid #AAF0D1; /* Bordo menta luminoso */
            border-radius: 50%;
            opacity: 0;
            transform: scale(0.8);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 20px rgba(170, 240, 209, 0.3); /* Leggero bagliore */
        }

        .logo-nav-container:hover {
            transform: scale(1.05); /* Piccolo zoom del contenitore */
        }

        .logo-nav-container:hover::before {
            opacity: 1; /* Il bordo appare */
            transform: scale(1); /* Torna a grandezza naturale */
        }

        /* MENU OVERLAY */
        .nv-menu {
            height: 100%; width: 0; position: fixed; z-index: 9999;
            top: 0; left: 0; background-color: #000; overflow: hidden;
            transition: 0.5s; display: flex; align-items: center; justify-content: center;
        }
        .nv-links a { font-size: 2.5rem; color: #fff; text-decoration: none; display: block; margin: 20px; font-weight: 800; }
        .nv-links a:hover { color: #AAF0D1; }
        .nv-close { position: absolute; top: 30px; right: 45px; font-size: 50px; color: #fff; text-decoration: none; }

        /* CONTENUTO */
        .nv-content { padding-top: 180px; color: white; text-align: center; } /* Aumentato padding per il logo più grande */
        .nv-title { font-weight: 900; letter-spacing: 5px; text-transform: uppercase; }
        .nv-line { width: 60px; height: 2px; background-color: #AAF0D1; margin: 0 auto 50px auto; }

        /* --- LOGICA BANNER --- */
        .nv-card {
            display: block;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            padding: 0 !important; 
            text-decoration: none;
            position: relative;
        }

        .nv-card:hover {
            transform: translateY(-10px);
            border-color: #AAF0D1 !important;
            box-shadow: 0 15px 40px rgba(170, 240, 209, 0.2);
        }

        .nv-card img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover; 
            transition: transform 0.6s ease;
        }
        
        .nv-card:hover img {
            transform: scale(1.03); 
        }

        .nv-card-partner {
            aspect-ratio: 3 / 2;
        }

        @media (max-width: 768px) {
            .nv-content { padding-top: 160px; }
            .logo-trigger { height: 50px; } /* Più piccolo su mobile */
        }
    </style>
</head>
<body>

    <div class="nav-fix">
        <div class="logo-nav-container" onclick="openM()">
            <img src="images/logo.png" alt="Nevera Menu Trigger" class="logo-trigger">
        </div>
    </div>

    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" class="nv-close" onclick="closeM()">&times;</a>
        <div class="nv-links text-center">
            <a href="index.html" onclick="closeM()">HOME</a>
            <a href="eventi.html" onclick="closeM()">EVENTI</a>
            <a href="sponsor.html" onclick="closeM()">SPONSOR</a>
            <a href="community.html" onclick="closeM()">COMMUNITY</a>
            <a href="iniziative.html" onclick="closeM()">INIZIATIVE</a>
        </div>
    </div>

    <div class="nv-content container">
        <h1 class="nv-title">PARTNERS</h1>
        <div class="nv-line"></div>

        <div class="row justify-content-center mb-5">
            <div class="col-lg-10">
                <a href="https://www.voltpadel.com" target="_blank" class="nv-card">
                    <img src="images/volt-padel-banner.webp" alt="Volt">
                </a>
            </div>
        </div>

        <div class="row justify-content-center g-4">
            <div class="col-lg-5 col-md-6">
                <a href="https://www.orya.it" target="_blank" class="nv-card nv-card-partner">
                    <img src="images/orya.png" alt="Orya">
                </a>
            </div>
            <div class="col-lg-5 col-md-6">
                <a href="https://www.swappadel.it/" target="_blank" class="nv-card nv-card-partner">
                    <img src="images/SWAP.png" alt="Swap">
                </a>
            </div>
        </div>
    </div>

    <script>
        function openM() { document.getElementById("m").style.width = "100%"; }
        function closeM() { document.getElementById("m").style.width = "0"; }
    </script>
</body>
</html>
