<!DOCTYPE HTML>
<html>
<head>
    <title>SPONSOR | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --white: #FDFDFD;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            text-align: center;
        }

        /* Sfondo Fisso Originale */
        #bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('images/image_c3c605.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Header e Logo (Menu Trigger) */
        #header { padding: 60px 0; }
        .logo { height: 80px; cursor: pointer; transition: 0.3s; }
        .logo:hover { filter: drop-shadow(0 0 10px var(--neon)); }

        /* Menu Overlay Originale */
        .overlay {
            height: 100%; width: 0; position: fixed; z-index: 999;
            top: 0; left: 0; background-color: var(--dark); 
            overflow-x: hidden; transition: 0.5s; 
        }
        .overlay-content { position: relative; top: 25%; width: 100%; text-align: center; }
        .overlay a { 
            font-family: 'Archivo Black', sans-serif; padding: 15px; text-decoration: none; 
            font-size: 35px; color: white; display: block; transition: 0.3s; text-transform: uppercase;
        }
        .overlay a:hover { color: var(--neon); }
        .closebtn { position: absolute; top: 20px; right: 45px; font-size: 60px; color: var(--neon); text-decoration: none; }

        /* Titoli */
        h1 { 
            font-family: 'Archivo Black', sans-serif; 
            font-size: 55px; 
            margin: 20px 0 0 0; 
            text-transform: uppercase; 
        }
        .sub { 
            color: var(--neon); 
            font-weight: bold; 
            letter-spacing: 6px; 
            margin-bottom: 60px; 
            text-transform: uppercase; 
            font-size: 14px;
        }

        /* Griglia Sponsor Originale */
        #main {
            margin: 0 auto;
            max-width: 1000px;
            padding: 20px;
        }

        .sponsor-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            margin-bottom: 100px;
        }

        .sponsor-box {
            width: 220px;
            height: 150px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: 0.3s;
        }

        .sponsor-box img {
            max-width: 100%;
            max-height: 100%;
            filter: grayscale(100%) brightness(1.5);
            transition: 0.3s;
            opacity: 0.7;
        }

        .sponsor-box:hover {
            border-color: var(--neon);
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.05);
        }

        .sponsor-box:hover img {
            filter: grayscale(0%) brightness(1);
            opacity: 1;
        }

        /* Footer */
        #footer { padding: 80px 0; }
        .copy { opacity: 0.3; font-size: 10px; letter-spacing: 4px; }

        @media (max-width: 768px) {
            h1 { font-size: 35px; }
            .sponsor-box { width: 160px; height: 120px; }
        }
    </style>
</head>
<body>

    <div id="bg"></div>

    <div id="header">
        <img src="images/logo.png" class="logo" onclick="openNav()">
    </div>

    <div id="myNav" class="overlay">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div class="overlay-content">
            <a href="index.html">HOME</a>
            <a href="eventi.html">EVENTI</a>
            <a href="community.html">COMMUNITY</a>
            <a href="sponsor.html">SPONSOR</a>
            <a href="iniziative.html">INIZIATIVE</a>
        </div>
    </div>

    <h1>SPONSOR</h1>
    <div class="sub">Official Partners</div>

    <div id="main">
        <div class="sponsor-grid">
            
            <div class="sponsor-box">
                <img src="images/sponsor1.png" alt="Sponsor 1">
            </div>

            <div class="sponsor-box">
                <img src="images/sponsor2.png" alt="Sponsor 2">
            </div>

            <div class="sponsor-box">
                <img src="images/sponsor3.png" alt="Sponsor 3">
            </div>
            
            <div class="sponsor-box">
                <img src="images/sponsor4.png" alt="Sponsor 4">
            </div>

        </div>
    </div>

    <div id="footer">
        <div class="copy">© 2026 NEVERA SPORTS | BORN UNDER PRESSURE</div>
    </div>

    <script>
        function openNav() { document.getElementById("myNav").style.width = "100%"; }
        function closeNav() { document.getElementById("myNav").style.width = "0"; }
    </script>

</body>
</html>

</body>
</html>
