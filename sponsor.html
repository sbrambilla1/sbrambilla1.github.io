<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>PARTNERS - NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">

    <style>
        body {
            background-color: #000 !important;
            margin: 0;
            color: #fff;
        }

        /* NAVBAR */
        .navbar {
            background: transparent !important;
            padding: 20px 0;
            z-index: 1000;
        }

        .main-logo {
            height: 45px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* CONTENITORE SPONSOR */
        .sponsor-section {
            padding-top: 140px; /* Spazio per la navbar */
            padding-bottom: 80px;
        }

        .section-title {
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 10px;
        }

        .divider {
            width: 60px;
            height: 2px;
            background-color: #AAF0D1;
            margin: 0 auto 50px auto;
        }

        /* BOX SPONSOR */
        .sponsor-box {
            display: block;
            text-decoration: none;
            transition: transform 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .sponsor-box:hover {
            transform: translateY(-10px);
            border-color: #AAF0D1;
        }

        .sponsor-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        .partner-card {
            padding: 40px;
            text-align: center;
        }

        .partner-card img {
            max-height: 80px;
            width: auto;
            margin: 0 auto 20px auto;
        }

        .partner-card h3 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            margin: 0;
            letter-spacing: 2px;
        }

        /* OVERLAY MENU */
        .full-screen-overlay {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            background-color: #000;
            transition: 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay-content a {
            font-size: 3rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            display: block;
            margin: 15px 0;
        }
