<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>PARTNERS - NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* RESET GLOBALE - DNA NEVERA */
        html, body {
            background-color: #040404 !important; /* Nero più profondo */
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: 'Space Grotesk', sans-serif;
            color: #FDFDFD;
        }

        /* NAVBAR E LOGO TRIGGER MENU */
        .nav-fix {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 40px 0;
            z-index: 5000;
            text-align: center;
        }

        .logo-nav-container {
            display: inline-block;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logo-trigger { 
            height: 80px; /* Riportato a 80px come richiesto */
            width: auto;
            transition: all 0.3s ease;
        }

        /* Effetto Hover Logo: Glow Neon Nevera */
        .logo-nav-container:hover .logo-trigger {
            transform: scale(1.05);
            filter: drop-shadow(0 0 15px rgba(63, 240, 0, 0.6));
        }

        /* MENU OVERLAY */
        .nv-menu {
            height: 100%; width: 0; position: fixed; z-index: 9999;
            top: 0; left: 0; background-color: #040404; overflow: hidden;
            transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); 
            display: flex; align-items: center; justify-content: center;
        }
        .nv-links a { 
            font-family: 'Archivo Black', sans-serif;
            font-size: 2.5rem; color: #fff; text-decoration: none; 
            display: block; margin: 20px; font-weight: 800; text-align: center;
            transition: 0.3s;
        }
        .nv-links a:hover { color: #3FF000; } /* Verde Neon */
        .nv-close { position: absolute; top: 30px; right: 45px; font-size: 50px; color: #3FF000; text-decoration: none; }

        /* CONTENUTO PAGINA */
        .nv-content { 
            padding-top: 220px;
            text-align: center; 
        }
        .nv-title { 
            font-family: 'Archivo Black', sans-serif;
            font-size: 3.5rem;
            font-weight: 900; 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            margin-bottom: 10px; 
        }
        .nv-line { width: 60px; height: 3px; background-color: #3FF000; margin: 0 auto 50px auto; }

        /* STRUTTURA BANNER (CARD) */
        .nv-card {
            display: block;
            border-radius: 25px; /* Smussatura raccordata con Community/Eventi */
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            padding: 0 !important; 
            text-decoration: none;
            position: relative;
        }

        /* Hover sui Banner */
        .nv-card:hover {
            transform: translateY(-10px);
            border-color: #3FF000 !important;
            box-shadow: 0 15px 40px rgba(63, 240, 0, 0.15);
        }

        .nv-card img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover; 
            transition: transform 0.6s ease;
        }
        
        .nv-card:hover img {
            transform: scale(1.05); 
        }

        /* Proporzioni Card Secondarie */
        .nv-card-partner {
            aspect-ratio: 16 / 9; /* Più cinematico del 3/2 */
        }

        /* Footer Credits */
        .footer-tag {
            opacity: 0.2; 
            letter-spacing: 5px; 
            font-size: 0.7rem; 
            margin-top: 80px; 
            margin-bottom: 50px;
            text-transform: uppercase;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .nv-content { padding-top: 180px; }
            .nv-title { font-size: 2.2rem; }
            .logo-trigger { height: 65px; }
            .nv-links a { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="nav-fix">
        <div class="logo-nav-container" onclick="openM()">
            <img src="images/logo.png" alt="Nevera Menu" class="logo-trigger">
        </div>
    </div>

    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" class="nv-close" onclick="closeM()">&times;</a>
        <div class="nv-links">
            <a href="index.html" onclick="closeM()">HOME</a>
            <a href="eventi.html" onclick="closeM()">EVENTI</a>
            <a href="sponsor.html" onclick="closeM()">SPONSOR</a>
            <a href="community.html" onclick="closeM()">COMMUNITY</a>
            <a href="iniziative.html" onclick="closeM()">INIZIATIVE</a>
        </div>
    </div>

    <div class="nv-content container">
        <h1 class="nv-title">PARTNERS</h1>
        <div class="nv-line"></div>

        <div class="row justify-content-center mb-5">
            <div class="col-lg-10 col-12">
                <a href="https://www.voltpadel.com" target="_blank" class="nv-card">
                    <img src="images/volt-padel-banner.webp" alt="Volt Padel">
                </a>
            </div>
        </div>

        <div class="row justify-content-center g-4">
            <div class="col-lg-5 col-md-6">
                <a href="https://www.orya.it" target="_blank" class="nv-card nv-card-partner">
                    <img src="images/orya.png" alt="Orya">
                </a>
            </div>
            <div class="col-lg-5 col-md-6">
                <a href="https://x3portres.it/" class="nv-card nv-card-partner">
                    <img src="images/x3.webp" alt="X3 POR TRES">
                </a>
            </div>
        </div>

        <p class="footer-tag">BORN UNDER PRESSURE</p>
    </div>

    <script>
        function openM() { document.getElementById("m").style.width = "100%"; }
        function closeM() { document.getElementById("m").style.width = "0"; }
    </script>

</body>
</html>
