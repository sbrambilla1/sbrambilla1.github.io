<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>PARTNERS - NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="assets/css/main.css">

    <style>
        /* RESET AGGRESSIVO PER EVITARE IL NERO */
        html, body {
            background-color: #000 !important;
            margin: 0 !important;
            padding: 0 !important;
            height: 100% !important;
            width: 100% !important;
            display: block !important;
            overflow-x: hidden !important;
        }

        /* NAVBAR SEMPRE VISIBILE */
        .nav-fix {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 0;
            z-index: 5000;
            text-align: center;
            background: transparent;
        }

        .logo-trigger {
            height: 45px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* MENU OVERLAY - 'overlay-nevera' per evitare conflitti */
        .overlay-nevera {
            height: 100%;
            width: 0; /* Parte chiuso */
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            background-color: #000;
            overflow-x: hidden;
            transition: 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .links-nevera a {
            font-size: 2.5rem;
            font-weight: 800;
            color: #fff;
            text-decoration: none;
            display: block;
            margin: 20px 0;
            text-align: center;
        }

        .links-nevera a:hover {
            color: #AAF0D1;
        }

        .close-nevera {
            position: absolute;
            top: 30px;
            right: 45px;
            font-size: 50px;
            color: #fff;
            text-decoration: none;
        }

        /* CONTENUTO PAGINA */
        .content-wrapper {
            padding-top: 120px;
            position: relative;
            z-index: 10;
            color: white;
            text-align: center;
        }

        .section-title {
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .mint-line {
            width: 60px;
            height: 2px;
            background-color: #AAF0D1;
            margin: 0 auto 50px auto;
        }

        /* Stile di base per le card per gestire l'hover via CSS */
        .sponsor-card-base {
            display: block;
            text-decoration: none;
            transition: transform 0.3s ease, border-color 0.3s ease;
            margin-bottom: 20px;
        }

        .sponsor-card-base:hover {
            transform: translateY(-5px);
            border-color: #AAF0D1 !important; /* Sovrascrive lo stile inline di base */
        }
    </style>
</head>
<body>

    <div class="nav-fix">
        <img src="images/logo.png" alt="Nevera" class="logo-trigger" onclick="toggleMenu(1)">
    </div>

    <div id="neveraMenu" class="overlay-nevera">
        <a href="javascript:void(0)" class="close-nevera" onclick="toggleMenu(0)">&times;</a>
        <div class="links-nevera">
            <a href="index.html" onclick="toggleMenu(0)">HOME</a>
            <a href="eventi.html" onclick="toggleMenu(0)">EVENTI</a>
            <a href="sponsor.html" onclick="toggleMenu(0)">SPONSOR</a>
            <a href="community.html" onclick="toggleMenu(0)">COMMUNITY</a>
            <a href="iniziative.html" onclick="toggleMenu(0)">INIZIATIVE</a>
        </div>
    </div>

    <div class="content-wrapper container">
        <h1 class="section-title">PARTNERS</h1>
        <div class="mint-line"></div>

       <div class="row justify-content-center mb-5">
    <div class="col-lg-10 col-12">
        <a href="https://www.voltpadel.com" target="_blank" class="sponsor-card-base" 
           style="display:block; border-radius: 20px; overflow:hidden; border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(255, 255, 255, 0.05); padding: 0 !important;">
            <img src="images/volt-padel-banner.webp" class="img-fluid w-100" alt="Volt Padel" 
                 style="display: block; transition: 0.3s; width: 100%;">
        </a>
    </div>


        <div class="row justify-content-center g-4">
            
            <div class="col-lg-5 col-md-6">
                <a href="https://www.orya.it" target="_blank" class="sponsor-card-base" 
                   style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 0 !important; overflow: hidden; position: relative; aspect-ratio: 3 / 2;">
                    
                    <img src="images/orya.png" alt="Orya" 
                         style="width: 100% !important; height: 100% !important; object-fit: cover !important; object-position: center !important; display: block !important;">
                </a>
            </div>
            
            <div class="col-lg-5 col-md-6">
                <a href="https://www.swappadel.it/" target="_blank" class="sponsor-card-base" 
                   style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 0 !important; overflow: hidden; position: relative; aspect-ratio: 3 / 2;">
                    
                    <img src="images/SWAP.png" alt="Swap" 
                         style="width: 100% !important; height: 100% !important; object-fit: cover !important; object-position: center !important; display: block !important;">
                </a>
            </div>
            
        </div>
    </div>

    <script>
        function toggleMenu(show) {
            document.getElementById("neveraMenu").style.width = show ? "100%" : "0";
        }
    </script>

</body>
</html>
