<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>COMMUNITY | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --footer-bg: #111111;
            --white: #FDFDFD;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            text-align: center;
        }

        /* Sfondo */
        #bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('images/image_c3c605.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Logo interattivo */
        #header { padding: 50px 0; }
        .logo { height: 80px; cursor: pointer; transition: 0.3s; }
        .logo:hover { filter: drop-shadow(0 0 15px var(--neon)); transform: scale(1.05); }

        /* Menu */
        .overlay {
            height: 100%; width: 0; position: fixed; z-index: 999;
            top: 0; left: 0; background-color: var(--dark); 
            overflow-x: hidden; transition: 0.5s; 
        }
        .overlay-content { position: relative; top: 25%; width: 100%; text-align: center; margin-top: 30px; }
        .overlay a { 
            font-family: 'Archivo Black', sans-serif; padding: 15px; text-decoration: none; 
            font-size: 30px; color: white; display: block; transition: 0.3s; 
        }
        .overlay a:hover { color: var(--neon); }
        .closebtn { position: absolute; top: 20px; right: 45px; font-size: 60px; color: var(--neon); text-decoration: none; }

        /* Titoli */
        h1 { font-family: 'Archivo Black', sans-serif; font-size: 50px; margin: 20px 0 5px 0; text-transform: uppercase; }
        .sub { color: var(--neon); font-weight: bold; letter-spacing: 5px; margin-bottom: 50px; text-transform: uppercase; }

        /* Griglia dei Riquadri Originale */
        .container {
            display: block;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .box {
            display: inline-block;
            width: 280px;
            margin: 15px;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; /* Smussatura originale */
            text-decoration: none;
            color: white;
            transition: 0.3s;
            vertical-align: top;
        }

        .box:hover {
            background: var(--neon);
            color: var(--dark);
            border-color: var(--neon);
        }

        .box i { font-size: 50px; margin-bottom: 20px; color: white; transition: 0.3s; }
        .box:hover i { color: var(--dark); }
        .box h3 { font-family: 'Archivo Black', sans-serif; font-size: 16px; margin: 0; text-transform: uppercase; }

        /* Footer con stacco antracite */
        #footer {
            background-color: var(--footer-bg);
            padding: 80px 20px;
            margin-top: 150px;
        }
        .foot-links a { color: white; text-decoration: none; margin: 0 20px; font-weight: bold; }
        .foot-links a:hover { color: var(--neon); }
        .credits { opacity: 0.3; font-size: 10px; margin-top: 30px; letter-spacing: 3px; }

        @media (max-width: 768px) {
            .box { width: 40%; padding: 40px 10px; }
            h1 { font-size: 35px; }
        }
    </style>
</head>
<body>

    <div id="bg"></div>

    <div id="header">
        <img src="images/logo.png" class="logo" onclick="openNav()">
    </div>

    <div id="myNav" class="overlay">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div class="overlay-content">
            <a href="index.html">HOME</a>
            <a href="eventi.html">EVENTI</a>
            <a href="community.html">COMMUNITY</a>
            <a href="sponsor.html">SPONSOR</a>
            <a href="iniziative.html">INIZIATIVE</a>
        </div>
    </div>

    <h1>COMMUNITY</h1>
    <div class="sub">Born Under Pressure</div>

    <div class="container">
        <div class="box">
            <i class="fa-solid fa-users"></i>
            <h3>Membri</h3>
        </div>

        <a href="https://wa.me/tuonumero" class="box">
            <i class="fa-brands fa-whatsapp"></i>
            <h3>WhatsApp</h3>
        </a>

        <div class="box">
            <i class="fa-solid fa-address-card"></i>
            <h3>Tesseramento</h3>
        </div>
    </div>

    <div id="footer">
        <div class="foot-links">
            <a href="mailto:info@neverasports.it">EMAIL</a>
            <a href="#">WHATSAPP</a>
        </div>
        <div class="credits">© 2026 NEVERA SPORTS | ALL RIGHTS RESERVED</div>
    </div>

    <script>
        function openNav() { document.getElementById("myNav").style.width = "100%"; }
        function closeNav() { document.getElementById("myNav").style.width = "0"; }
    </script>

</body>
</html>
