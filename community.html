<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>COMMUNITY | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --footer-bg: #111111;
            --white: #FDFDFD;
        }

        body {
            margin: 0; background-color: var(--dark);
            color: var(--white); font-family: 'Space Grotesk', sans-serif;
        }

        /* Sfondo Originale */
        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('images/image_c3c605.jpg');
            background-size: cover; background-position: center; z-index: 0;
        }

        /* Logo con Hover Neon */
        .nav-fix { position: relative; padding: 40px 0; text-align: center; z-index: 100; }
        .logo-trigger { height: 80px; cursor: pointer; transition: 0.3s; }
        .logo-trigger:hover { 
            transform: scale(1.1); 
            filter: drop-shadow(0 0 15px var(--neon));
        }

        /* Menu Overlay */
        .nv-menu {
            height: 100%; width: 0; position: fixed; z-index: 9999;
            top: 0; left: 0; background-color: var(--dark); 
            overflow: hidden; transition: 0.5s; 
            display: flex; align-items: center; justify-content: center;
        }
        .nv-links a { 
            font-family: 'Archivo Black', sans-serif; font-size: 2.5rem; color: var(--white); 
            text-decoration: none; display: block; margin: 25px; text-transform: uppercase; 
        }
        .nv-links a:hover { color: var(--neon); }
        .nv-close { position: absolute; top: 30px; right: 45px; font-size: 50px; color: var(--neon); text-decoration: none; }

        /* Struttura Centrale Originale */
        .main-wrapper { position: relative; z-index: 10; padding: 50px 20px; text-align: center; }
        .section-title { font-family: 'Archivo Black', sans-serif; font-size: 3.5rem; text-transform: uppercase; margin: 0; }
        .section-subtitle { color: var(--neon); font-weight: 700; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 50px; }

        /* Riquadri Smussati Originali (Icone Bianche) */
        .comm-card {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; /* Smussatura richiesta */
            padding: 60px 10px; text-decoration: none !important; color: white !important;
            transition: 0.3s; height: 100%;
        }
        .comm-card:hover { 
            background: var(--neon); color: var(--dark) !important; 
            border-color: var(--neon); 
        }
        .comm-card i { font-size: 3rem; margin-bottom: 20px; color: var(--white); transition: 0.3s; }
        .comm-card:hover i { color: var(--dark); }
        .comm-card h3 { font-family: 'Archivo Black', sans-serif; font-size: 0.9rem; text-transform: uppercase; margin: 0; }

        /* Footer con stacco antracite in fondo alla pagina */
        .nv-footer { 
            position: relative; z-index: 10; 
            padding: 60px 20px; text-align: center; 
            background-color: var(--footer-bg); 
            margin-top: 100px;
        }
        .footer-link { color: white; text-decoration: none; margin: 0 15px; font-weight: 700; font-size: 0.9rem; }
        .footer-link:hover { color: var(--neon); }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <header class="nav-fix">
        <img src="images/logo.png" class="logo-trigger" onclick="openM()">
    </header>

    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" class="nv-close" onclick="closeM()">&times;</a>
        <div class="nv-links">
            <a href="index.html">HOME</a>
            <a href="eventi.html">EVENTI</a>
            <a href="community.html">COMMUNITY</a>
            <a href="sponsor.html">SPONSOR</a>
            <a href="iniziative.html">INIZIATIVE</a>
        </div>
    </div>

    <main class="main-wrapper container">
        <h1 class="section-title">COMMUNITY</h1>
        <p class="section-subtitle">Born Under Pressure</p>

        <div class="row g-4 justify-content-center">
            <div class="col-6 col-md-4">
                <div class="comm-card">
                    <i class="fa-solid fa-users"></i>
                    <h3>Membri</h3>
                </div>
            </div>
            <div class="col-6 col-md-4">
                <a href="https://wa.me/tuonumero" class="comm-card">
                    <i class="fa-brands fa-whatsapp"></i>
                    <h3>WhatsApp</h3>
                </a>
            </div>
            <div class="col-6 col-md-4">
                <div class="comm-card">
                    <i class="fa-solid fa-address-card"></i>
                    <h3>Tesseramento</h3>
                </div>
            </div>
        </div>
    </main>

    <footer class="nv-footer">
        <div class="mb-3">
            <a href="mailto:info@neverasports.it" class="footer-link">EMAIL</a>
            <a href="#" class="footer-link">WHATSAPP</a>
        </div>
        <p style="opacity: 0.3; font-size: 0.7rem; letter-spacing: 2px;">© 2026 NEVERA SPORTS</p>
    </footer>

    <script>
        function openM() { document.getElementById("m").style.width = "100%"; }
        function closeM() { document.getElementById("m").style.width = "0"; }
    </script>

</body>
</html>
