<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>COMMUNITY | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --footer-bg: #111111;
            --white: #FDFDFD;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        /* Sfondo Fisso Originale */
        #bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('images/image_c3c605.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Header / Logo */
        #header { padding: 50px 0; position: relative; z-index: 10; }
        .logo { height: 80px; cursor: pointer; transition: 0.3s; }
        .logo:hover { filter: drop-shadow(0 0 15px var(--neon)); transform: scale(1.05); }

        /* Menu Overlay */
        .overlay {
            height: 100%; width: 0; position: fixed; z-index: 999;
            top: 0; left: 0; background-color: var(--dark); 
            overflow-x: hidden; transition: 0.5s; 
        }
        .overlay-content { position: relative; top: 20%; width: 100%; text-align: center; }
        .overlay a { 
            font-family: 'Archivo Black', sans-serif; padding: 15px; text-decoration: none; 
            font-size: 35px; color: white; display: block; transition: 0.3s; text-transform: uppercase;
        }
        .overlay a:hover { color: var(--neon); }
        .closebtn { position: absolute; top: 20px; right: 45px; font-size: 60px; color: var(--neon); text-decoration: none; }

        /* Sezione Catchy Centrale */
        .hero-community {
            position: relative;
            z-index: 10;
            padding: 100px 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 { 
            font-family: 'Archivo Black', sans-serif; 
            font-size: clamp(2.5rem, 8vw, 5rem); 
            line-height: 0.9;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .catchy-phrase {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 700;
            color: var(--white);
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        /* Pulsante Unisciti */
        .join-btn {
            display: inline-block;
            font-family: 'Archivo Black', sans-serif;
            background-color: var(--neon);
            color: var(--dark);
            padding: 25px 60px;
            font-size: 1.2rem;
            text-decoration: none;
            text-transform: uppercase;
            border-radius: 50px; /* Molto smussato per staccare dai riquadri */
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 0px rgba(63, 240, 0, 0);
        }

        .join-btn:hover {
            transform: scale(1.1);
            background-color: var(--white);
            box-shadow: 0 10px 30px rgba(63, 240, 0, 0.3);
        }

        /* Footer con stacco antracite */
        #footer {
            position: relative;
            z-index: 10;
            background-color: var(--footer-bg);
            padding: 80px 20px;
            margin-top: 100px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .foot-links a { color: white; text-decoration: none; margin: 0 20px; font-weight: bold; font-size: 0.9rem; }
        .foot-links a:hover { color: var(--neon); }
        .credits { opacity: 0.3; font-size: 10px; margin-top: 30px; letter-spacing: 3px; }

    </style>
</head>
<body>

    <div id="bg"></div>

    <div id="header">
        <img src="images/logo.png" class="logo" onclick="openNav()">
    </div>

    <div id="myNav" class="overlay">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div class="overlay-content">
            <a href="index.html">HOME</a>
            <a href="eventi.html">EVENTI</a>
            <a href="community.html">COMMUNITY</a>
            <a href="sponsor.html">SPONSOR</a>
            <a href="iniziative.html">INIZIATIVE</a>
        </div>
    </div>

    <div class="hero-community">
        <h1>BORN UNDER<br><span style="color: var(--neon);">PRESSURE.</span></h1>
        <p class="catchy-phrase">Non è solo sport. È il tuo nuovo habitat.<br>Entra nel network ufficiale di Nevera.</p>
        
        <a href="https://wa.me/tuonumero" class="join-btn">
            Unisciti alla Community <i class="fa-brands fa-whatsapp" style="margin-left: 10px;"></i>
        </a>
    </div>

    <div id="footer">
        <div class="foot-links">
            <a href="mailto:info@neverasports.it">EMAIL</a>
            <a href="#">INSTAGRAM</a>
            <a href="#">TIKTOK</a>
        </div>
        <div class="credits">© 2026 NEVERA SPORTS | ALL RIGHTS RESERVED</div>
    </div>

    <script>
        function openNav() { document.getElementById("myNav").style.width = "100%"; }
        function closeNav() { document.getElementById("myNav").style.width = "0"; }
    </script>

</body>
</html>
