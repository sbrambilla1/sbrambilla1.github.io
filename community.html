<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>COMMUNITY | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --footer-bg: #111111;
            --white: #FDFDFD;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            text-align: center;
        }

        /* Sfondo Originale */
        #bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('images/image_c3c605.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Logo con Hover Neon */
        #header { padding: 60px 0; }
        .logo { height: 80px; cursor: pointer; transition: 0.3s; }
        .logo:hover { filter: drop-shadow(0 0 15px var(--neon)); transform: scale(1.05); }

        /* Menu Overlay */
        .overlay {
            height: 100%; width: 0; position: fixed; z-index: 999;
            top: 0; left: 0; background-color: var(--dark); 
            overflow-x: hidden; transition: 0.5s; 
        }
        .overlay-content { position: relative; top: 25%; width: 100%; text-align: center; }
        .overlay a { 
            font-family: 'Archivo Black', sans-serif; padding: 15px; text-decoration: none; 
            font-size: 32px; color: white; display: block; transition: 0.3s; text-transform: uppercase;
        }
        .overlay a:hover { color: var(--neon); }
        .closebtn { position: absolute; top: 20px; right: 45px; font-size: 60px; color: var(--neon); text-decoration: none; }

        /* Contenuto Sobrio */
        .content-area {
            position: relative;
            z-index: 10;
            padding: 80px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        h1 { 
            font-family: 'Archivo Black', sans-serif; 
            font-size: 45px; 
            margin-bottom: 10px; 
            text-transform: uppercase; 
            letter-spacing: -1px;
        }

        .catchy-text {
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
            color: rgba(255,255,255,0.8);
        }

        /* Pulsante elegante (non invasivo) */
        .btn-minimal {
            display: inline-block;
            font-family: 'Archivo Black', sans-serif;
            color: var(--neon);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 3px;
            border: 1px solid var(--neon);
            padding: 15px 40px;
            border-radius: 5px; /* Smussatura leggera e sobria */
            transition: 0.3s;
        }

        .btn-minimal:hover {
            background-color: var(--neon);
            color: var(--dark);
        }

        /* Footer con stacco antracite */
        #footer {
            position: relative;
            z-index: 10;
            background-color: var(--footer-bg);
            padding: 70px 20px;
            margin-top: 120px;
        }
        .foot-links a { color: white; text-decoration: none; margin: 0 20px; font-weight: bold; font-size: 13px; letter-spacing: 1px; }
        .foot-links a:hover { color: var(--neon); }
        .copy { opacity: 0.3; font-size: 10px; margin-top: 30px; letter-spacing: 3px; }

    </style>
</head>
<body>

    <div id="bg"></div>

    <div id="header">
        <a href="index.html"><img src="images/logo.png" class="logo"></a>
    </div>

    <div class="content-area">
        <h1>COMMUNITY</h1>
        <p class="catchy-text">Unisciti al network ufficiale di Nevera Sports per rimanere aggiornato su tutti i tornei e le iniziative esclusive.</p>
        
        <a href="https://wa.me/tuonumero" class="btn-minimal">
            Entra nel Gruppo <i class="fa-brands fa-whatsapp" style="margin-left: 8px;"></i>
        </a>
    </div>

    <div id="footer">
        <div class="foot-links">
            <a href="mailto:info@neverasports.it">EMAIL</a>
            <a href="#">WHATSAPP</a>
            <a href="#">INSTAGRAM</a>
        </div>
        <p class="copy">© 2026 NEVERA SPORTS | ALL RIGHTS RESERVED</p>
    </div>

</body>
</html>
