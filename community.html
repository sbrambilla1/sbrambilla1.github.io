<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>COMMUNITY | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --white: #FDFDFD;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('images/image_c3c605.jpg');
            background-size: cover; background-position: center; z-index: -1;
        }

        header { padding-top: 50px; }
        .logo { height: 80px; cursor: pointer; transition: 0.3s; }
        .logo:hover { filter: drop-shadow(0 0 10px var(--neon)); }

        /* MENU OVERLAY ORIGINALE */
        .overlay {
            height: 100%; width: 0; position: fixed; z-index: 999;
            top: 0; left: 0; background-color: var(--dark); 
            overflow: hidden; transition: 0.5s; 
        }
        .overlay-content { position: relative; top: 25%; width: 100%; text-align: center; }
        .overlay a { 
            font-family: 'Archivo Black', sans-serif; padding: 15px; text-decoration: none; 
            font-size: 30px; color: white; display: block; transition: 0.3s; text-transform: uppercase;
        }
        .overlay a:hover { color: var(--neon); }
        .closebtn { position: absolute; top: 20px; right: 45px; font-size: 60px; color: var(--neon); text-decoration: none; }

        /* SEZIONE CENTRALE */
        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 0 20px; }
        
        h1 { 
            font-family: 'Archivo Black', sans-serif; 
            font-size: 45px; 
            margin: 0 0 10px 0; 
            text-transform: uppercase; 
        }

        p { 
            font-size: 16px; 
            margin-bottom: 40px; 
            letter-spacing: 1px; 
            opacity: 0.8;
        }

        /* IL BOTTONE ORIGINALE */
        .btn-join {
            display: inline-block;
            font-family: 'Archivo Black', sans-serif;
            background: transparent;
            color: var(--neon);
            border: 2px solid var(--neon);
            padding: 18px 45px;
            border-radius: 15px; /* Smussatura sobria */
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-join:hover {
            background: var(--neon);
            color: var(--dark);
            transform: scale(1.05);
        }

        footer { padding-bottom: 40px; }
        .copy { font-size: 10px; opacity: 0.3; letter-spacing: 3px; }

    </style>
</head>
<body>

    <div id="bg"></div>

    <header>
        <img src="images/logo.png" class="logo" onclick="openNav()">
    </header>

    <div id="myNav" class="overlay">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div class="overlay-content">
            <a href="index.html">HOME</a>
            <a href="eventi.html">EVENTI</a>
            <a href="community.html">COMMUNITY</a>
            <a href="sponsor.html">SPONSOR</a>
            <a href="iniziative.html">INIZIATIVE</a>
        </div>
    </div>

    <main>
        <h1>COMMUNITY</h1>
        <p>Entra nel network ufficiale su Telegram.</p>
        
        <a href="https://t.me/tuolink" class="btn-join">
            UNISCITI ORA <i class="fa-brands fa-telegram" style="margin-left: 8px;"></i>
        </a>
    </main>

    <footer>
        <div class="copy">© 2026 NEVERA SPORTS</div>
    </footer>

    <script>
        function openNav() { document.getElementById("myNav").style.width = "100%"; }
        function closeNav() { document.getElementById("myNav").style.width = "0"; }
    </script>

</body>
</html>
