<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>COMMUNITY | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --neon: #3FF000;
            --dark: #040404;
            --white: #FDFDFD;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark);
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            text-align: center;
            overflow: hidden; /* Tutto in una schermata come l'originale */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Sfondo */
        #bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('images/image_c3c605.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Header */
        header { padding: 50px 0; }
        .logo { height: 80px; cursor: pointer; transition: 0.3s; }
        .logo:hover { filter: drop-shadow(0 0 15px var(--neon)); transform: scale(1.05); }

        /* Menu Overlay */
        .overlay {
            height: 100%; width: 0; position: fixed; z-index: 999;
            top: 0; left: 0; background-color: var(--dark); 
            overflow: hidden; transition: 0.5s; 
        }
        .overlay-content { position: relative; top: 25%; width: 100%; text-align: center; }
        .overlay a { 
            font-family: 'Archivo Black', sans-serif; padding: 15px; text-decoration: none; 
            font-size: 30px; color: white; display: block; transition: 0.3s; 
        }
        .overlay a:hover { color: var(--neon); }
        .closebtn { position: absolute; top: 20px; right: 45px; font-size: 60px; color: var(--neon); text-decoration: none; }

        /* Sezione Centrale (La tua struttura originale) */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0 20px;
        }

        h1 { 
            font-family: 'Archivo Black', sans-serif; 
            font-size: clamp(2.5rem, 8vw, 50px); 
            margin: 0; 
            text-transform: uppercase; 
        }

        .catchy-text {
            color: var(--neon);
            font-weight: bold;
            letter-spacing: 3px;
            margin: 15px 0 40px 0;
            text-transform: uppercase;
            font-size: 14px;
        }

        /* Il Bottone Unico */
        .join-button {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            font-family: 'Archivo Black', sans-serif;
            padding: 25px 50px;
            border-radius: 20px; /* Smussatura che ti piace */
            font-size: 16px;
            letter-spacing: 2px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .join-button:hover {
            background: var(--neon);
            color: var(--dark);
            border-color: var(--neon);
            transform: scale(1.05);
        }

        /* Footer */
        footer {
            padding: 40px 0;
        }
        .credits { opacity: 0.2; font-size: 9px; letter-spacing: 3px; text-transform: uppercase; }

    </style>
</head>
<body>

    <div id="bg"></div>

    <header>
        <img src="images/logo.png" class="logo" onclick="openNav()">
    </header>

    <div id="myNav" class="overlay">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div class="overlay-content">
            <a href="index.html">HOME</a>
            <a href="eventi.html">EVENTI</a>
            <a href="community.html">COMMUNITY</a>
            <a href="sponsor.html">SPONSOR</a>
            <a href="iniziative.html">INIZIATIVE</a>
        </div>
    </div>

    <div class="main-container">
        <h1>COMMUNITY</h1>
        <div class="catchy-text">Oltre il campo. Dentro il network.</div>

        <a href="https://t.me/tuolink" class="join-button">
            UNISCITI SU TELEGRAM <i class="fa-brands fa-telegram" style="margin-left: 10px;"></i>
        </a>
    </div>

    <footer>
        <div class="credits">© 2026 NEVERA SPORTS | BORN UNDER PRESSURE</div>
    </footer>

    <script>
        function openNav() { document.getElementById("myNav").style.width = "100%"; }
        function closeNav() { document.getElementById("myNav").style.width = "0"; }
    </script>

</body>
</html>
