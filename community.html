<!DOCTYPE HTML>
<html lang="it">
<head>
    <title>COMMUNITY | NEVERA SPORTS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="images/favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">

    <style>
        /* RESET GLOBALE */
        html, body {
            background-color: #000 !important;
            margin: 0; padding: 0;
            overflow-x: hidden;
            font-family: sans-serif;
            color: white;
        }

        /* NAVBAR E LOGO TRIGGER MENU (80px) */
        .nav-fix {
            position: fixed;
            top: 0; width: 100%;
            padding: 40px 0; z-index: 5000;
            text-align: center;
        }
        .logo-nav-container { display: inline-block; cursor: pointer; transition: 0.3s; }
        .logo-trigger { 
            height: 80px; width: auto; transition: 0.3s;
            filter: drop-shadow(0 0 0px rgba(170, 240, 209, 0));
        }
        .logo-nav-container:hover .logo-trigger {
            transform: scale(1.08);
            filter: drop-shadow(0 0 20px rgba(170, 240, 209, 0.8));
        }

        /* MENU OVERLAY */
        .nv-menu {
            height: 100%; width: 0; position: fixed; z-index: 9999;
            top: 0; left: 0; background-color: #000; overflow: hidden;
            transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); 
            display: flex; align-items: center; justify-content: center;
        }
        .nv-links a { font-size: 2.5rem; color: #fff; text-decoration: none; display: block; margin: 20px; font-weight: 800; }
        .nv-links a:hover { color: #AAF0D1; }
        .nv-close { position: absolute; top: 30px; right: 45px; font-size: 50px; color: #fff; text-decoration: none; }

        /* CONTENUTO PAGINA */
        .nv-content { padding-top: 220px; text-align: center; }
        .nv-title { font-weight: 900; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 10px; }
        .nv-line { width: 60px; height: 2px; background-color: #AAF0D1; margin: 0 auto 50px auto; }

        /* BOX BOTTONI */
        .join-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .comm-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 20px;
            text-decoration: none !important;
            font-weight: 800;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.4s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
        }

        /* Stile Instagram */
        .btn-insta { color: #AAF0D1; border-color: rgba(170, 240, 209, 0.2); }
        .btn-insta:hover { 
            background: #AAF0D1; 
            color: #000; 
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(170, 240, 209, 0.3);
        }

        /* Stile Telegram */
        .btn-tele { color: #0088cc; border-color: rgba(0, 136, 204, 0.2); }
        .btn-tele:hover { 
            background: #0088cc; 
            color: #fff; 
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 136, 204, 0.3);
        }

        .comm-btn i { font-size: 2rem; margin-right: 20px; }

        @media (max-width: 768px) {
            .nv-content { padding-top: 180px; }
            .logo-trigger { height: 60px; }
            .comm-btn { font-size: 1rem; padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="nav-fix">
        <div class="logo-nav-container" onclick="openM()">
            <img src="images/logo.png" alt="Nevera Menu" class="logo-trigger">
        </div>
    </div>

    <div id="m" class="nv-menu">
        <a href="javascript:void(0)" class="nv-close" onclick="closeM()">&times;</a>
        <div class="nv-links">
            <a href="index.html" onclick="closeM()">HOME</a>
            <a href="eventi.html" onclick="closeM()">EVENTI</a>
            <a href="sponsor.html" onclick="closeM()">SPONSOR</a>
            <a href="community.html" onclick="closeM()">COMMUNITY</a>
            <a href="iniziative.html" onclick="closeM()">INIZIATIVE</a>
        </div>
    </div>

    <div class="nv-content container">
        <h1 class="nv-title">NEVERA COMMUNITY</h1>
        <div class="nv-line"></div>
        
        <p class="mb-2" style="max-width: 600px; margin: 0 auto; opacity: 0.8; line-height: 1.6; font-size: 1.1rem;">
            Entra nel vivo dell'azione. 
        </p>
        <p style="opacity: 0.5;">Unisciti ai nostri canali ufficiali per non perdere news e tornei.</p>

        <div class="join-container">
            <a href="https://t.me/neverasports" target="_blank" class="comm-btn btn-tele">
                <i class="fa-brands fa-telegram"></i> Hub Telegram
            </a>

            <a href="https://www.instagram.com/neverasports.it" target="_blank" class="comm-btn btn-insta">
                <i class="fa-brands fa-instagram"></i> Instagram 
            </a>
        </div>

        <p class="mt-5 mb-5" style="opacity: 0.3; letter-spacing: 5px; font-size: 0.7rem;">BORN UNDER PRESSURE</p>
    </div>

    <script>
        function openM() { document.getElementById("m").style.width = "100%"; }
        function closeM() { document.getElementById("m").style.width = "0"; }
    </script>

</body>
</html>
